<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Element 10 — Live Opening</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0A0B0D;--volt:#C6FF3A;--green:#3ad13a;--blue:#1F5EFF;--silver:#e9ecee;--mut:#8b9098;--red:#E8332B;--gold:#ffd23a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#05060a;font-family:'Space Grotesk',system-ui,sans-serif;color:#fff;touch-action:none}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:
 radial-gradient(1200px 700px at 50% -10%,rgba(58,209,58,.20),transparent 60%),
 radial-gradient(900px 600px at 85% 110%,rgba(31,94,255,.16),transparent 60%),
 radial-gradient(700px 500px at 10% 100%,rgba(198,255,58,.10),transparent 60%),
 #05060a;overflow:hidden}
#fx{position:absolute;inset:0;pointer-events:none;opacity:.5;background-image:radial-gradient(1px 1px at 20% 30%,#fff,transparent),radial-gradient(1px 1px at 70% 60%,#cfe,transparent),radial-gradient(1px 1px at 40% 80%,#fff,transparent),radial-gradient(1px 1px at 85% 20%,#dfe,transparent),radial-gradient(1px 1px at 55% 45%,#fff,transparent);background-size:auto;animation:tw 6s ease-in-out infinite alternate}
@keyframes tw{from{opacity:.25}to{opacity:.6}}
.brand{position:fixed;top:20px;left:24px;font-family:'Anton',sans-serif;font-size:26px;letter-spacing:.02em;text-transform:uppercase;z-index:40;opacity:.92}
.brand b{background:var(--volt);color:#000;padding:0 8px;border-radius:6px}
.hud{position:fixed;top:22px;right:24px;z-index:40;display:flex;gap:8px;align-items:center;font-size:12px;color:var(--mut)}
.hud .prog{font-family:'Space Mono',monospace;color:#fff;background:rgba(255,255,255,.08);padding:5px 10px;border-radius:999px}
.btn{font-family:'Space Grotesk';font-weight:700;font-size:13px;border:none;border-radius:999px;padding:11px 20px;cursor:pointer;background:var(--volt);color:#000}
.btn.ghost{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.18)}
.hide{display:none!important}
.center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.title{font-family:'Anton',sans-serif;text-transform:uppercase;font-size:clamp(28px,5vw,58px);letter-spacing:.01em;text-align:center;line-height:.98;text-shadow:0 4px 40px rgba(58,209,58,.35)}
.sub{color:var(--mut);font-size:15px;text-align:center;max-width:520px}
/* ---- PACK ---- */
.pack{position:relative;width:min(46vh,340px);aspect-ratio:5/8;cursor:pointer;transition:transform .25s;filter:drop-shadow(0 30px 60px rgba(0,0,0,.6))}
.pack:hover{transform:translateY(-6px) scale(1.02)}
.pack .foil{position:absolute;inset:0;border-radius:16px;overflow:hidden;background:
 linear-gradient(135deg,#f4f7f8 0%,#cfd6da 18%,#ffffff 32%,#b9c6cc 48%,#eef3f5 62%,#c7d2d7 78%,#fff 100%);
 border:2px solid rgba(255,255,255,.7);box-shadow:inset 0 0 60px rgba(58,209,58,.15)}
.pack .holo{position:absolute;inset:0;border-radius:16px;mix-blend-mode:overlay;opacity:.6;background:linear-gradient(115deg,transparent 20%,rgba(255,0,180,.5),rgba(0,220,255,.5),rgba(120,255,60,.5),transparent 80%);background-size:300% 300%;animation:holoShift 5s linear infinite}
@keyframes holoShift{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.pack .ring{position:absolute;inset:12%;border-radius:50%;background:radial-gradient(circle,rgba(58,209,58,.28),transparent 62%);animation:pulse 2.6s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(.92);opacity:.7}50%{transform:scale(1.06);opacity:1}}
.shield{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);width:46%;filter:drop-shadow(0 6px 18px rgba(0,0,0,.35))}
.pack .plabel{position:absolute;left:0;right:0;bottom:9%;text-align:center;font-family:'Anton';text-transform:uppercase;color:#0a0b0d;font-size:15px;letter-spacing:.03em}
.pack .chips{position:absolute;left:0;right:0;bottom:4%;display:flex;gap:6px;justify-content:center}
.pack .chip{background:rgba(10,11,13,.06);border:1px solid rgba(10,11,13,.18);border-radius:8px;padding:3px 8px;font-size:9px;font-family:'Space Mono';color:#0a0b0d}
.pack.torn .top{animation:tearTop .7s forwards cubic-bezier(.4,1.4,.5,1)}
.pack.torn .bot{animation:tearBot .7s forwards cubic-bezier(.4,1.4,.5,1)}
.pack .top,.pack .bot{position:absolute;left:0;right:0;overflow:hidden}
.pack .top{top:0;height:22%;clip-path:polygon(0 0,100% 0,100% 70%,92% 100%,84% 72%,76% 100%,68% 74%,60% 100%,52% 72%,44% 100%,36% 74%,28% 100%,20% 72%,12% 100%,8% 74%,0 100%)}
@keyframes tearTop{to{transform:translateY(-140%) rotate(-8deg);opacity:0}}
@keyframes tearBot{to{transform:translateY(6%)}}
/* ---- CARD STAGE ---- */
#cardStage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.cardWrap{position:relative;width:min(58vh,420px);aspect-ratio:5/7}
.card{position:absolute;inset:0;border-radius:18px;overflow:hidden;background:#111;box-shadow:0 30px 70px rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.12)}
.card .art{position:absolute;inset:0;background-size:cover;background-position:center;background-color:#1a1d22}
.card .artph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;font-family:'Anton';text-transform:uppercase;font-size:26px;color:#fff;background:
 radial-gradient(circle at 50% 35%,rgba(58,209,58,.35),transparent 60%),linear-gradient(160deg,#20242b,#0d0f13)}
.card .holoC{position:absolute;inset:0;pointer-events:none;mix-blend-mode:color-dodge;opacity:0;background:linear-gradient(115deg,transparent 25%,rgba(255,0,180,.6),rgba(0,220,255,.6),rgba(120,255,60,.6),transparent 75%);background-size:250% 250%;transition:opacity .6s}
.card.revealed .holoC{opacity:.5;animation:holoShift 4s linear infinite}
.tierGlow{position:absolute;inset:-3px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .6s}
.card.revealed .tierGlow{opacity:1}
/* info scratch panel */
.infoPanel{position:absolute;left:0;right:0;top:0;z-index:5;background:rgba(6,8,11,.86);backdrop-filter:blur(2px);border-bottom:1px solid rgba(255,255,255,.12);padding:12px 14px;min-height:96px}
.infoGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 14px;position:relative;z-index:1}
.infoGrid .k{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut)}
.infoGrid .v{font-family:'Space Mono';font-weight:700;font-size:15px;color:#fff;margin-top:1px}
.scratch{position:absolute;inset:0;z-index:3;cursor:grab;touch-action:none}
.scratch canvas{width:100%;height:100%;display:block;border-radius:0}
.scratchHint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Anton';text-transform:uppercase;letter-spacing:.08em;color:#0a0b0d;font-size:17px;pointer-events:none}
/* cover card (peel) */
.cover{position:absolute;inset:0;z-index:4;border-radius:18px;cursor:grab;touch-action:none;will-change:transform;transform-origin:100% 0;
 background:linear-gradient(135deg,#eef3f5,#c3cfd4 30%,#fff 50%,#b9c6cc 70%,#eef3f5);overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.5)}
.cover .holo{position:absolute;inset:0;mix-blend-mode:overlay;opacity:.55;background:linear-gradient(115deg,transparent 20%,rgba(255,0,180,.5),rgba(0,220,255,.5),rgba(120,255,60,.5),transparent 80%);background-size:300% 300%;animation:holoShift 5s linear infinite}
.cover .cc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.cover .cc .peelhint{position:absolute;top:12px;right:14px;font-size:10px;font-family:'Space Mono';color:#0a0b0d;opacity:.7}
.cover.gone{transition:transform .55s cubic-bezier(.36,.9,.4,1),opacity .55s;transform:translate(120%,-40%) rotate(24deg)!important;opacity:0}
.corner{position:absolute;top:0;right:0;width:52px;height:52px;border-radius:0 18px 0 60px;background:linear-gradient(225deg,rgba(58,209,58,.9),rgba(255,255,255,.2));z-index:6;cursor:grab;box-shadow:-3px 3px 8px rgba(0,0,0,.3)}
/* card detail bar */
.detail{position:absolute;left:0;right:0;bottom:0;z-index:6;background:linear-gradient(0deg,rgba(6,8,11,.94),rgba(6,8,11,.4));padding:14px 16px 16px;opacity:0;transform:translateY(12px);transition:.5s}
.card.revealed .detail{opacity:1;transform:none}
.detail .nm{font-family:'Anton';text-transform:uppercase;font-size:20px;line-height:1}
.detail .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:center}
.badge{border-radius:999px;padding:5px 12px;font-family:'Space Mono';font-weight:700;font-size:13px}
.badge.val{background:var(--volt);color:#000}
.badge.buy{background:rgba(31,94,255,.9);color:#fff}
.badge.tier{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25)}
.next{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:40;display:flex;gap:10px}
/* recap */
#recap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px}
.recapGrid{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:90vw}
.rc{width:120px}
.rc .thumb{width:120px;aspect-ratio:5/7;border-radius:10px;background-size:cover;background-position:center;border:1px solid rgba(255,255,255,.14);background-color:#1a1d22;display:flex;align-items:center;justify-content:center;text-align:center;font-family:'Anton';font-size:12px;text-transform:uppercase;padding:6px}
.rc .cap{font-family:'Space Mono';font-size:12px;text-align:center;margin-top:6px;color:#dfe}
.total{font-family:'Anton';text-transform:uppercase;font-size:clamp(24px,4vw,44px);text-shadow:0 4px 30px rgba(58,209,58,.4)}
.flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:60}
.flash.on{animation:fl .5s ease-out}
@keyframes fl{0%{opacity:.85}100%{opacity:0}}
</style></head>
<body>
<div class="brand">ELEMENT<b>10</b></div>
<div class="hud"><span id="prod"></span><span class="prog" id="prog"></span></div>
<div id="stage"><div id="fx"></div>
  <!-- intro / pack -->
  <div class="center" id="intro">
    <div class="title" id="introTitle">Live Pack Opening</div>
    <div class="pack" id="pack" onclick="openPack()">
      <div class="foil"></div><div class="holo"></div><div class="ring"></div>
      <svg class="shield" viewBox="0 0 100 118"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2f7d3a"/><stop offset="1" stop-color="#0c3a17"/></linearGradient></defs><path d="M50 4 92 20v42c0 30-20 44-42 52C28 106 8 92 8 62V20z" fill="url(#g)" stroke="#fff" stroke-width="4"/><path d="M50 26l7 15 16 2-12 11 3 16-14-8-14 8 3-16-12-11 16-2z" fill="#fff"/></svg>
      <div class="plabel" id="packLabel">ELEMENT 10</div>
      <div class="chips" id="packChips"></div>
    </div>
    <div class="sub" id="introSub">Click or tap the pack to rip it open</div>
  </div>
  <!-- card stage -->
  <div id="cardStage" class="hide"></div>
  <!-- recap -->
  <div id="recap" class="hide"></div>
</div>
<div class="flash" id="flash"></div>
<div class="next hide" id="nextBar"></div>

<script>
/* ============ session ============ */
const DEMO={product:{name:'Ascended Heroes — 10-Card Repack',kind:'pack',price:'$25–$100',chase:'1:4'},
 cards:[
  {name:'Charizard ex — Special Illustration Rare',img:'',marketValue:260,buyback:180,serial:'042/099',grade:'PSA 10',year:'2025',set:'Ascended Heroes',category:'Pokémon',era:'Modern',tier:'S'},
  {name:'Umbreon VMAX Alt Art',img:'',marketValue:120,buyback:80,serial:'',grade:'Raw NM',year:'2021',set:'Evolving Skies',category:'Pokémon',era:'Modern',tier:'A'},
  {name:'Pikachu Promo',img:'',marketValue:35,buyback:20,serial:'',grade:'Raw',year:'2024',set:'SVP',category:'Pokémon',era:'Modern',tier:'C'}
 ]};
let SESSION=DEMO;
try{const raw=localStorage.getItem('e10_open');if(raw&&!location.search.includes('demo')){const p=JSON.parse(raw);if(p&&p.cards&&p.cards.length)SESSION=p;}}catch(e){}
const TIERCOL={S:'#ffd23a',A:'#3ad13a',B:'#1F5EFF',C:'#8b9098'};
let idx=0;const pulls=[];
const $=id=>document.getElementById(id);
function money(n){n=+n||0;return '$'+n.toLocaleString();}

/* intro fill */
$('prod').textContent=SESSION.product?.name||'Element 10';
$('introTitle').textContent=SESSION.product?.name||'Live Pack Opening';
$('packLabel').textContent=(SESSION.product?.kind||'pack').toUpperCase();
$('packChips').innerHTML=[SESSION.product?.chase?SESSION.product.chase+' CHASE':'',SESSION.product?.price||'',SESSION.cards.length+' CARDS'].filter(Boolean).map(c=>`<span class="chip">${c}</span>`).join('');
updateProg();
function updateProg(){$('prog').textContent=`${Math.min(idx+1,SESSION.cards.length)} / ${SESSION.cards.length}`;}

/* ============ open pack ============ */
function openPack(){const p=$('pack');if(p.classList.contains('torn'))return;
 // build torn halves visually then transition to first card
 p.classList.add('torn');flash();
 setTimeout(()=>{ $('intro').classList.add('hide'); showCard(0); },720);
}
function flash(){const f=$('flash');f.classList.remove('on');void f.offsetWidth;f.classList.add('on');}

/* ============ card ============ */
function showCard(i){idx=i;updateProg();const c=SESSION.cards[i];const cs=$('cardStage');cs.classList.remove('hide');$('nextBar').classList.add('hide');
 const serialed=!!(c.serial&&c.serial.trim());
 const infoRows=[['Category',c.category||'—'],['Year',c.year||'—'],['Set',c.set||'—'],['Grade',c.grade||'Raw'],['Serial',serialed?c.serial:'—'],[c.category==='Pokémon'?'Era':'Type',c.era||(c.category==='Pokémon'?'—':(c.category||'—'))]];
 cs.innerHTML=`
  <div class="cardWrap" id="cw">
   <div class="tierGlow" style="box-shadow:0 0 60px 6px ${TIERCOL[c.tier]||'#3ad13a'}"></div>
   <div class="card" id="card">
     ${c.img?`<div class="art" style="background-image:url('${(''+c.img).replace(/'/g,'')}')"></div>`:`<div class="artph">${esc(c.name||'Mystery Card')}</div>`}
     <div class="holoC"></div>
     <div class="detail">
       <div class="nm">${esc(c.name||'Card')}</div>
       <div class="row">
         <span class="badge val">${money(c.marketValue)}</span>
         ${c.buyback?`<span class="badge buy">Buyback ${money(c.buyback)}</span>`:''}
         <span class="badge tier" style="color:${TIERCOL[c.tier]||'#fff'}">${c.tier?c.tier+' tier':''}</span>
       </div>
     </div>
     <!-- info scratch panel -->
     <div class="infoPanel" id="infoPanel">
       <div class="infoGrid">${infoRows.map(([k,v])=>`<div><div class="k">${k}</div><div class="v">${esc(v)}</div></div>`).join('')}</div>
       <div class="scratch" id="scratch"><canvas id="scr"></canvas></div>
       <div class="scratchHint" id="scrHint">SCRATCH TO REVEAL</div>
     </div>
     <!-- cover card (peel) -->
     <div class="cover" id="cover"><div class="holo"></div>
       <svg class="shield" style="width:44%" viewBox="0 0 100 118"><use href="#g"/><path d="M50 4 92 20v42c0 30-20 44-42 52C28 106 8 92 8 62V20z" fill="#2f7d3a" stroke="#fff" stroke-width="4"/><path d="M50 26l7 15 16 2-12 11 3 16-14-8-14 8 3-16-12-11 16-2z" fill="#fff"/></svg>
       <div class="cc"><div class="peelhint">↖ grab a corner &amp; peel</div></div>
       <div class="corner" id="corner"></div>
     </div>
   </div>
  </div>`;
 initScratch();initHolo();
}
function esc(s){s=(s==null?'':''+s);return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

/* ---- scratch phase ---- */
function initScratch(){const wrap=$('scratch'),cv=$('scr');const r=wrap.getBoundingClientRect();
 cv.width=r.width;cv.height=r.height;const ctx=cv.getContext('2d');
 // frosted cover
 const g=ctx.createLinearGradient(0,0,cv.width,cv.height);g.addColorStop(0,'#d7dde0');g.addColorStop(.5,'#fff');g.addColorStop(1,'#c3cdd2');
 ctx.fillStyle=g;ctx.fillRect(0,0,cv.width,cv.height);
 ctx.globalCompositeOperation='destination-out';
 let drawing=false,cleared=0,done=false;
 const pos=e=>{const b=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return[(t.clientX-b.left)*(cv.width/b.width),(t.clientY-b.top)*(cv.height/b.height)];};
 const scratch=(x,y)=>{ctx.beginPath();ctx.arc(x,y,26,0,7);ctx.fill();};
 const check=()=>{const d=ctx.getImageData(0,0,cv.width,cv.height).data;let c=0;for(let i=3;i<d.length;i+=64)if(d[i]===0)c++;const frac=c/(d.length/64);if(frac>0.5&&!done){done=true;finishScratch();}};
 const down=e=>{drawing=true;$('scrHint').style.opacity=0;const[x,y]=pos(e);scratch(x,y);e.preventDefault();};
 const move=e=>{if(!drawing)return;const[x,y]=pos(e);scratch(x,y);if((cleared++%6)===0)check();e.preventDefault();};
 const up=()=>{drawing=false;check();};
 wrap.addEventListener('mousedown',down);window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
 wrap.addEventListener('touchstart',down,{passive:false});wrap.addEventListener('touchmove',move,{passive:false});wrap.addEventListener('touchend',up);
 wrap._cleanup=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
}
function finishScratch(){const p=$('infoPanel');const cv=$('scr');
 // wipe remaining
 const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);
 $('scratch').style.pointerEvents='none';
 // reveal cover card for peel phase
 const cover=$('cover');cover.classList.remove('hide');
 initPeel();
 // collapse info panel to top strip after a beat
 setTimeout(()=>{p.style.transition='min-height .5s,padding .5s';},50);
}

/* ---- peel phase ---- */
function initPeel(){const cover=$('cover'),corner=$('corner'),card=$('card');
 let dragging=false,sx=0,sy=0;const W=cover.getBoundingClientRect().width,H=cover.getBoundingClientRect().height;
 const start=e=>{dragging=true;const t=e.touches?e.touches[0]:e;sx=t.clientX;sy=t.clientY;cover.style.transition='none';e.preventDefault();};
 const move=e=>{if(!dragging)return;const t=e.touches?e.touches[0]:e;const dx=t.clientX-sx,dy=t.clientY-sy;const dist=Math.hypot(dx,dy);
   const rot=Math.max(-40,Math.min(40,dx/6));cover.style.transform=`translate(${dx*0.7}px,${dy*0.7}px) rotate(${rot}deg)`;cover.style.opacity=Math.max(.15,1-dist/(W*.9));e.preventDefault();
   if(dist>W*0.55)release(true);};
 const end=()=>{if(!dragging)return;dragging=false;release(false);};
 function release(force){dragging=false;const dist=parseFloat(cover.style.opacity);
   if(force||dist<0.45){cover.style.transition='';cover.classList.add('gone');flash();
     window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',end);
     setTimeout(revealDone,420);}
   else{cover.style.transition='transform .4s,opacity .4s';cover.style.transform='';cover.style.opacity=1;}}
 corner.addEventListener('mousedown',start);cover.addEventListener('mousedown',start);
 window.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
 corner.addEventListener('touchstart',start,{passive:false});cover.addEventListener('touchstart',start,{passive:false});
 cover.addEventListener('touchmove',move,{passive:false});cover.addEventListener('touchend',end);
}
function revealDone(){const c=SESSION.cards[idx];$('card').classList.add('revealed');pulls[idx]=c;flash();
 const last=idx>=SESSION.cards.length-1;
 $('nextBar').classList.remove('hide');
 $('nextBar').innerHTML= last
   ? `<button class="btn" onclick="showRecap()">See the hits ▸</button>`
   : `<button class="btn" onclick="showCard(${idx+1})">Next card ▸</button><button class="btn ghost" onclick="showRecap()">Recap</button>`;
}

/* ---- holo tilt ---- */
function initHolo(){const card=$('card');const h=card.querySelector('.holoC');
 const mv=e=>{const b=card.getBoundingClientRect();const t=e.touches?e.touches[0]:e;const x=(t.clientX-b.left)/b.width;h.style.backgroundPosition=(x*250)+'% 50%';};
 card.addEventListener('mousemove',mv);card.addEventListener('touchmove',mv,{passive:true});
}

/* ---- recap ---- */
function showRecap(){$('cardStage').classList.add('hide');$('nextBar').classList.add('hide');const r=$('recap');r.classList.remove('hide');
 const got=pulls.filter(Boolean);const total=got.reduce((s,c)=>s+(+c.marketValue||0),0);const buy=got.reduce((s,c)=>s+(+c.buyback||0),0);
 r.innerHTML=`<div class="title">The Hits</div>
   <div class="recapGrid">${got.map(c=>`<div class="rc"><div class="thumb" style="${c.img?`background-image:url('${(''+c.img).replace(/'/g,'')}')`:''}">${c.img?'':esc(c.name)}</div><div class="cap" style="color:${TIERCOL[c.tier]||'#dfe'}">${money(c.marketValue)}${c.grade&&c.grade!=='Raw'?' · '+esc(c.grade):''}</div></div>`).join('')}</div>
   <div class="total">Pack value ${money(total)}${buy?` · buyback ${money(buy)}`:''}</div>
   <div class="row" style="display:flex;gap:10px"><button class="btn" onclick="location.reload()">Open another ▸</button></div>`;
 flash();
}

/* keyboard: F fullscreen, R restart, N next/open */
window.addEventListener('keydown',e=>{const k=e.key.toLowerCase();
 if(k==='f'){if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.();}
