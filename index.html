<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Element 10 — Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf9f5;--surface:#ffffff;--surface2:#f0efea;--ink:#0A0B0D;--mut:#6b6d73;--mut2:#9a9a93;--line:#e4e2da;--volt:#C6FF3A;--blue:#1F5EFF;--red:#E8332B;--r:14px;--rp:999px;
--disp:'Anton',system-ui,sans-serif;--sans:'Space Grotesk',system-ui,sans-serif;--mono:'Space Mono',monospace}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px}
h1,h2,h3{font-family:var(--disp);font-weight:400;text-transform:uppercase;letter-spacing:.01em;margin:0}
.mono{font-family:var(--mono)}a{color:var(--blue);text-decoration:none;cursor:pointer}
header{display:flex;align-items:center;gap:22px;padding:16px 26px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#faf9f5f2;backdrop-filter:blur(6px);z-index:30}
.logo{font-family:var(--disp);font-size:24px;letter-spacing:.02em}.logo b{background:var(--volt);padding:0 8px;border-radius:6px}
nav{display:flex;gap:6px;flex-wrap:wrap}
.tab{font-family:var(--sans);font-weight:500;font-size:13.5px;padding:8px 15px;border-radius:var(--rp);border:1px solid transparent;background:none;cursor:pointer;color:var(--mut)}
.tab:hover{background:var(--surface2);color:var(--ink)}.tab.on{background:var(--ink);color:#fff}
.wrap{max-width:1180px;margin:0 auto;padding:26px}
.sec{display:none}.sec.on{display:block}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px}
.grid{display:grid;gap:16px}
.btn{font-family:var(--sans);font-weight:500;font-size:13.5px;padding:9px 16px;border-radius:var(--rp);border:1px solid var(--ink);background:none;color:var(--ink);cursor:pointer}
.btn:hover{background:var(--surface2)}.btn.v{background:var(--volt);border-color:var(--volt);font-weight:700}
.btn.d{background:var(--ink);color:#fff}.btn.sm{padding:6px 12px;font-size:12.5px}.btn.x{border:none;color:var(--red);padding:4px 8px;background:none}
input,select,textarea{font-family:var(--sans);font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--ink);width:100%}
textarea{resize:vertical;min-height:64px}
label{font-size:12px;color:var(--mut);font-weight:500;display:block;margin:0 0 4px}
.lab{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut2)}
.metric{background:var(--surface2);border-radius:var(--r);padding:16px}
.metric .n{font-family:var(--disp);font-size:32px;line-height:1}.metric .l{font-size:12px;color:var(--mut);margin-top:6px}
.pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:var(--rp);background:var(--surface2);color:var(--mut);border:1px solid var(--line);margin:3px}
.pill.v{background:var(--volt);color:var(--ink);border-color:var(--volt)}
.acc{border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;overflow:hidden;background:var(--surface)}
.acc>.h{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;font-weight:500}
.acc>.h .chev{margin-left:auto;transition:.15s;color:var(--mut)}.acc.open>.h .chev{transform:rotate(90deg)}
.acc>.b{display:none;padding:0 18px 18px}.acc.open>.b{display:block}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.todo{display:flex;align-items:center;gap:11px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--surface)}
.todo.done{opacity:.5}.todo.done .t{text-decoration:line-through}
.todo input[type=checkbox]{width:18px;height:18px;accent-color:var(--volt);flex:none}
.todo .grip{cursor:grab;color:var(--mut2);flex:none}.todo .t{flex:1;cursor:pointer}.todo .t:hover{color:var(--blue)}
.todo .badge{font-family:var(--mono);font-size:10px;color:var(--mut2)}
.todo.dover{border-color:var(--ink)}
.cmt{padding:10px 12px;border-left:3px solid var(--volt);background:var(--surface2);border-radius:0 10px 10px 0;margin-bottom:9px;font-size:13.5px}
.cmt .who{font-family:var(--mono);font-size:11px;color:var(--mut)}
.sgrid{display:grid;grid-template-columns:88px repeat(7,1fr);gap:6px;min-width:820px}
.sgrid .hd{font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--mut);text-align:center;padding:6px 0;letter-spacing:.05em}
.sgrid .dp{font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--mut);display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding-right:8px;text-align:right}
.cell{background:var(--surface);border:1px solid var(--line);border-radius:10px;min-height:70px;padding:6px}
.cell.peak{background:#f7fce9;border-color:#e4f3bf}.cell.dover{border-color:var(--ink)}
.show{background:var(--ink);color:#fff;border-radius:8px;padding:7px 8px;margin-bottom:5px;cursor:grab;font-size:11.5px;line-height:1.3}
.show .nm{font-weight:500}.show .mt{font-family:var(--mono);font-size:10px;color:var(--volt);margin-top:2px}
.addc{color:var(--mut2);font-size:11px;cursor:pointer;text-align:center}.addc:hover{color:var(--ink)}
.out{background:var(--surface2);border-radius:10px;padding:12px 14px;margin-top:8px;font-size:13.5px;line-height:1.5;position:relative}
.out .cp{position:absolute;right:8px;top:8px}
table{border-collapse:collapse;width:100%;font-size:13px}
th{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
td{padding:8px 10px;border-bottom:1px solid var(--line)}
.tierS{color:var(--red);font-weight:700}.tierA{color:var(--blue);font-weight:700}.tierB{color:#0a8a4a;font-weight:700}.tierC{color:var(--mut);font-weight:700}
.ov{position:fixed;inset:0;background:#0008;display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
.modal{background:var(--surface);border-radius:var(--r);padding:22px;max-width:520px;width:100%;max-height:88vh;overflow:auto}
.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:14px}
.hero h1{font-size:38px}.hero .sub{color:var(--mut);font-size:13.5px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:var(--rp);font-size:13px;opacity:0;transition:.2s;z-index:80}.toast.on{opacity:1}
.foot{color:var(--mut2);font-size:11px;margin-top:26px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:780px){.split{grid-template-columns:1fr}}
.drop{border:1.5px dashed var(--line);border-radius:12px;padding:16px;text-align:center;color:var(--mut);font-size:13px;cursor:pointer}
.drop:hover{border-color:var(--ink);color:var(--ink)}
.filerow{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;font-size:13px;background:var(--surface)}
.filerow .nm{flex:1}.chipwrap{margin:8px 0}
</style><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head><body>
<header><div class="logo">ELEMENT<b>10</b></div><nav id="nav"></nav><div id="who" style="margin-left:auto"></div></header>
<div class="wrap">
  <div class="sec on" id="sec-home"></div>
  <div class="sec" id="sec-schedule"></div>
  <div class="sec" id="sec-copy"></div>
  <div class="sec" id="sec-gen"></div>
  <div class="sec" id="sec-break"></div>
  <div class="sec" id="sec-repack"></div>
  <div class="sec" id="sec-data"></div>
  <div class="foot" id="foot"></div>
</div>
<div class="ov" id="ov"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<script>
/* ---------- defaults ---------- */
const DEF_LISTS={characters:['Charizard','Moonbreon','Umbreon','Pikachu','Gengar','Mewtwo','Mew','Rayquaza','Eevee','Greninja','Lugia','Team Rocket'],
 sets:['Pokémon 151','Prismatic Evolutions','Ascended Heroes','Chaos Rising','Destined Rivals','Evolving Skies','Crown Zenith','Surging Sparks','Vintage / WOTC','Mega Dream (JP)'],
 formats:['Ceiling Ladder','Character Break','RTYH','Grail Slab Break','$1 Singles Auction','Box Break (new release)','Pick-Your-Pokémon','Repack','Vintage Rip'],
 diff:['posted odds','free packs','every card ships','ships <1d','no reseals','best wall on Whatnot']};
const DAYPARTS=[['Morning',0.22,'9:00 AM'],['Afternoon',0.55,'2:00 PM'],['Evening',1.0,'8:00 PM'],['Late night',0.7,'11:00 PM']];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const TITLE_TPL={curiosity:["$P START — is [SET] worth ripping? [CHAR] chase w/ [HOST]","the [CHAR] nobody's pulling… [SET] RTYH w/ [HOST]","$P [CHAR] chase — [DIFF] — w/ [HOST]"],
 search:["$P START RTYH [SET] — [CHAR] chase — [DIFF] w/ [HOST]","[SET] Character Break — $P starts — [CHAR] / [DIFF]","[SET] CEILING LADDER — God Pack / SIR / Slab / Pack · [DIFF] · [TIME] ET"],
 drama:["$P [CHAR] CHASE — [SET] — [DIFF] — w/ [HOST]","[SET] IS HERE — $P STARTS + FREE GIVEAWAYS w/ [HOST]","GRAIL SLAB HUNT — [CHAR] PSA 10 CHASE — [DIFF]"]};
const DESC_TPL=["[SET] on the wall. Every card ships, packaged to protect, fast shipping. $P starts — [CHAR] and more. [DIFF].","Ripping [SET] — [FMT]. [DIFF]. $P starts, no reseals, all cards ship. Bookmark for [TIME] ET.","[CHAR] chase night. [SET] [FMT] at $P. Real odds, clean cards, quick shipping."];
const SHORT_TPL=["$[LOW] pack → pulled the [CHAR]?! ([SET])","I opened $[X] of [SET] to see if it's WORTH IT","the rarest [CHAR] in [SET] just hit the wall","should I rip it or keep it sealed? [SET] [CHAR]"];
const rand=a=>a[Math.floor(Math.random()*a.length)]||'';
const fill=(t,d)=>t.replace(/\[CHAR\]/g,d.char).replace(/\[SET\]/g,d.set).replace(/\[FMT\]/g,d.fmt).replace(/\[HOST\]/g,d.host||'[host]').replace(/\[DIFF\]/g,d.diff).replace(/\[TIME\]/g,d.time||'8:00').replace(/\$P/g,'$'+d.price).replace(/\[LOW\]/g,d.low||'4').replace(/\[X\]/g,d.x||'400');

/* ---------- state ---------- */
const KEY='element10_v2';
let S=JSON.parse(localStorage.getItem(KEY)||'null');
if(!S){S={lists:JSON.parse(JSON.stringify(DEF_LISTS)),streamers:['Trent','Guest 1','Guest 2'],
 todos:[{id:'t1',text:'Lock brand direction + grab handles',done:false,desc:'',comments:[]},{id:'t2',text:'Build first Ceiling Ladder show',done:false,desc:'',comments:[]},{id:'t3',text:'Load week 1 inventory',done:false,desc:'',comments:[]}],
 comments:[{who:'Trent',when:Date.now(),text:'Kicking off the Element 10 build — drop updates here.'}],
 shows:{},breaks:[],attachments:[],checklists:[],inventory:[],dashCfg:{catValue:true,costMarket:true,movement:true},sales:null,user:null};}
if(!('user' in S))S.user=null;
if(!S.inventory)S.inventory=[];if(!S.dashCfg)S.dashCfg={catValue:true,costMarket:true,movement:true};
if(!S.lists)S.lists=JSON.parse(JSON.stringify(DEF_LISTS));
['attachments','checklists','breaks'].forEach(k=>{if(!S[k])S[k]=[];});
S.todos.forEach(t=>{if(t.desc==null)t.desc='';if(!t.comments)t.comments=[];});
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){toast('Storage full — large attachment not saved');}}
const $=id=>document.getElementById(id);
function esc(s){s=(s==null?'':''+s);return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1800);}
function copy(txt){navigator.clipboard&&navigator.clipboard.writeText(txt);toast('Copied');}
function money(n){return '$'+Math.round(n).toLocaleString();}
const L=k=>S.lists[k];

/* ---------- nav ---------- */
const SECTIONS=[['home','Home'],['schedule','Schedule'],['copy','Copy Studio'],['gen','Schedule Gen'],['break','Break Calculator'],['repack','Repack Studio'],['data','Data & Lists']];
$('nav').innerHTML=SECTIONS.map((s,i)=>`<button class="tab ${i===0?'on':''}" data-s="${s[0]}" onclick="go('${s[0]}')">${s[1]}</button>`).join('');
function go(s){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.s===s));document.querySelectorAll('.sec').forEach(x=>x.classList.remove('on'));$('sec-'+s).classList.add('on');window.scrollTo(0,0);({home:renderHome,schedule:renderSchedule,copy:renderCopy,gen:renderGen,break:renderBreak,data:renderData,repack:renderRepack}[s])();}
$('foot').textContent='Element 10 · Command V2 · local preview (saves in this browser) — review before we host the shared, login-gated version.';
function renderWho(){$('who').innerHTML=S.user?`<button class="btn sm" onclick="signIn()">👤 ${esc(S.user)}</button>`:`<button class="btn v sm" onclick="signIn()">Sign in</button>`;}
function signIn(cb){window._siCb=(typeof cb==='function')?cb:null;$('modal').innerHTML=`<h3 style="font-size:18px">Sign in</h3><div class="sub" style="color:var(--mut);font-size:12.5px;margin:6px 0 12px">Your name tags your notes and comments so the team knows who did what. Real email logins arrive when we host the shared version.</div><label>Your name</label><input id="siName" value="${esc(S.user||'')}" placeholder="e.g. Trent" onkeydown="if(event.key==='Enter')doSignIn()"><div class="row" style="margin-top:16px"><button class="btn v" onclick="doSignIn()">Save</button>${S.user?'<button class="btn sm" onclick="closeM()">Cancel</button>':''}</div>`;$('ov').style.display='flex';setTimeout(()=>{const el=$('siName');if(el)el.focus();},60);}
function doSignIn(){const v=$('siName').value.trim();if(!v)return;S.user=v;save();renderWho();closeM();const cb=window._siCb;window._siCb=null;if(cb)cb();else{const on=document.querySelector('.tab.on');if(on)({home:renderHome,schedule:renderSchedule,copy:renderCopy,gen:renderGen,break:renderBreak,data:renderData,repack:renderRepack}[on.dataset.s])();}}
function requireUser(cb){if(S.user)cb();else signIn(cb);}
renderWho();

/* ---------- schedule grid (shared) ---------- */
function scheduleGridHTML(){
 let h=`<div style="overflow:auto"><div class="sgrid"><div></div>${DAYS.map(d=>`<div class="hd">${d}</div>`).join('')}`;
 DAYPARTS.forEach(dp=>{h+=`<div class="dp">${dp[0]}<span style="color:var(--mut2)">${dp[2]}</span></div>`;
  DAYS.forEach(day=>{const k=day+'|'+dp[0];const peak=dp[1]>=0.7?'peak':'';const arr=S.shows[k]||[];
   h+=`<div class="cell ${peak}" ondragover="event.preventDefault()" ondragenter="this.classList.add('dover')" ondragleave="this.classList.remove('dover')" ondrop="this.classList.remove('dover');dropShow('${k}')">${arr.map((s,i)=>`<div class="show" draggable="true" ondragstart="dragShow('${k}',${i})" onclick="event.stopPropagation();editShow('${k}',${i})"><div class="nm">${esc(s.name)}</div><div class="mt">${esc(s.fmt||'')} · ${esc(s.dur||'')}m · ${esc(s.host||'')}</div></div>`).join('')}<div class="addc" onclick="newShow('${k}')">+ add</div></div>`;});});
 h+=`</div></div>`;return h;}
let DRAGS=null;function dragShow(k,i){DRAGS={k,i};}
function dropShow(k){if(!DRAGS)return;if(!canEditScoped()){DRAGS=null;return roGuard();}const s=S.shows[DRAGS.k].splice(DRAGS.i,1)[0];if(!S.shows[DRAGS.k].length)delete S.shows[DRAGS.k];(S.shows[k]=S.shows[k]||[]).push(s);DRAGS=null;save();rerenderSchedule();}
function rerenderSchedule(){if($('sec-schedule').classList.contains('on'))renderSchedule();if($('sec-home').classList.contains('on'))renderHome();}
function newShow(k){if(!canEditScoped())return roGuard();showModal(null,k||(DAYS[0]+'|Evening'));}
function editShow(k,i){showModal({k,i,...S.shows[k][i]},k);}
function showModal(ex,k){ex=ex||{name:'',fmt:L('formats')[0],dur:90,host:S.streamers[0]||''};const[day,dp]=k.split('|');
 $('modal').innerHTML=`<h3 style="font-size:18px">${ex.k!=null?'Edit':'New'} show</h3>
  <div style="margin-top:12px"><label>Show name</label><input id="mname" value="${esc(ex.name)}" placeholder="e.g. Ascended Heroes Ceiling Ladder"></div>
  <div class="row" style="margin-top:10px"><div style="flex:1"><label>Day</label><select id="mday">${DAYS.map(d=>`<option ${d===day?'selected':''}>${d}</option>`).join('')}</select></div>
  <div style="flex:1"><label>Daypart</label><select id="mdp">${DAYPARTS.map(d=>`<option ${d[0]===dp?'selected':''}>${d[0]}</option>`).join('')}</select></div></div>
  <div class="row" style="margin-top:10px"><div style="flex:1"><label>Format</label><select id="mfmt">${L('formats').map(f=>`<option ${f===ex.fmt?'selected':''}>${esc(f)}</option>`).join('')}</select></div>
  <div style="flex:1"><label>Duration (min)</label><input id="mdur" type="number" value="${ex.dur}"></div></div>
  <div style="margin-top:10px"><label>Streamer</label><select id="mhost">${S.streamers.map(s=>`<option ${s===ex.host?'selected':''}>${esc(s)}</option>`).join('')}</select></div>
  <div class="row" style="margin-top:18px"><button class="btn v" onclick="saveShow(${ex.k!=null?`'${ex.k}',${ex.i}`:'null,null'})">Save</button><button class="btn sm" onclick="closeM()">Cancel</button>${ex.k!=null?`<button class="btn x" style="margin-left:auto" onclick="delShow('${ex.k}',${ex.i})">Delete</button>`:''}</div>`;
 $('ov').style.display='flex';}
function saveShow(ok,oi){if(!canEditScoped())return roGuard();const s={name:$('mname').value.trim()||'Untitled show',fmt:$('mfmt').value,dur:+$('mdur').value||60,host:$('mhost').value};const k=$('mday').value+'|'+$('mdp').value;
 if(ok!=null){S.shows[ok].splice(oi,1);if(!S.shows[ok].length)delete S.shows[ok];}(S.shows[k]=S.shows[k]||[]).push(s);save();closeM();rerenderSchedule();}
function delShow(k,i){if(!canEditScoped())return roGuard();S.shows[k].splice(i,1);if(!S.shows[k].length)delete S.shows[k];save();closeM();rerenderSchedule();}
function closeM(){$('ov').style.display='none';}

/* ---------- HOME ---------- */
function renderHome(){
 const open=S.todos.filter(t=>!t.done).length, showsThisWeek=Object.values(S.shows).flat().length;
 let h=`<div class="hero"><div><h1>This week</h1><div class="sub">Single-click a show to edit · double-click the board to open the full scheduler</div></div><button class="btn v" onclick="go('schedule')">Open scheduler ↗</button></div>`;
 h+=`<div ondblclick="go('schedule')">${scheduleGridHTML()}</div>`;
 h+=`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin:18px 0">
   <div class="metric"><div class="n">${S.sales==null?'—':money(S.sales)}</div><div class="l">Sales · last 7 days ${S.sales==null?'(plug in later)':''}</div></div>
   <div class="metric"><div class="n">${showsThisWeek}</div><div class="l">Shows scheduled</div></div>
   <div class="metric"><div class="n">${open}</div><div class="l">Open to-dos</div></div>
   <div class="metric"><div class="n">${S.breaks.length}</div><div class="l">Saved break models</div></div></div>`;
 h+=`<div class="split">`;
 h+=`<div class="card"><h3 style="font-size:16px">Collaborative notes</h3><div class="sub" style="color:var(--mut);font-size:12px;margin:2px 0 8px">Log what you worked on, drop something interesting, or ask the team.</div><div style="margin:8px 0">${S.comments.slice().reverse().map(c=>`<div class="cmt"><div class="who">${esc(c.who)} · ${new Date(c.when).toLocaleDateString()}${c.kind?` <span class="pill" style="margin:0 0 0 4px">${esc(c.kind)}</span>`:''}</div>${esc(c.text)}</div>`).join('')}</div>
   <div class="row"><select id="noteKind" style="max-width:130px"><option>Worked on</option><option>Interesting</option><option>Question</option><option>Note</option></select><input id="cmtin" placeholder="${S.user?'Add a note…':'Sign in to post…'}" onkeydown="if(event.key==='Enter')addNote()"><button class="btn d sm" onclick="addNote()">Post</button></div></div>`;
 h+=`<div class="card"><h3 style="font-size:16px">To-do <span class="lab" style="font-weight:400">— click a task to add detail</span></h3><div style="margin:12px 0" id="todos">${todoHTML()}</div>
   <div class="row"><input id="todoin" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTodo()"><button class="btn d sm" onclick="addTodo()">Add</button></div></div>`;
 h+=`</div>`;
 h+=`<h3 style="font-size:15px;margin:24px 0 12px">Day-to-day</h3>`;
 h+=acc('Show planning — durations & streamers', planHTML(), false);
 h+=acc('Saved break models', breaksListHTML(), false);
 $('sec-home').innerHTML=h;
}
function acc(title,body,open){return `<div class="acc ${open?'open':''}"><div class="h" onclick="this.parentElement.classList.toggle('open')">${title}<span class="chev">▸</span></div><div class="b">${body}</div></div>`;}

function loadChecklistToBreak(){const idx=$('clSel').value;if(idx==='')return;const cl=S.checklists[+idx];
 // find a name col and value col
 const vcol=cl.columns.findIndex(c=>/value|price|\$|market/i.test(c));const ncol=cl.columns.findIndex(c=>/name|card|title|chase|item/i.test(c));
 const nc=ncol<0?0:ncol, vc=vcol<0?1:vcol;let n=0;
 cl.rows.forEach(r=>{const nm=r[nc],val=parseFloat((r[vc]||'').toString().replace(/[^0-9.]/g,''));if(nm&&val>0){BK.chases.push({name:nm,val:val});n++;}});
 renderBKlists();calcBreak();toast(n+' chases loaded from '+cl.name);}
function balance(items,n){const bins=Array.from({length:n},()=>({sum:0,items:[]}));items.slice().sort((a,b)=>b.val-a.val).forEach(it=>{bins.sort((a,b)=>a.sum-b.sum);bins[0].items.push(it);bins[0].sum+=it.val;});return bins;}
function calcBreak(){
 const N=+($('tSlots')?.value||5),T=+($('tTiers').value),E=+($('tEven').value),MK=+($('tMk').value)/100;
 let slots=[];const chases=BK.chases.slice().sort((a,b)=>b.val-a.val);
 const premium=Math.round(E/100*Math.min(4,Math.max(0,N-1)));
 chases.slice(0,premium).forEach(c=>slots.push({items:[c],val:c.val}));
 const rest=chases.slice(premium);
 if(rest.length)balance(rest,Math.max(1,N-premium)).forEach(b=>slots.push({items:b.items,val:b.sum}));
 BK.products.forEach(p=>{const each=p.val/p.spots;for(let i=0;i<p.spots;i++)slots.push({items:[{name:p.name+' spot',val:each}],val:each});});
 BK.auctions.forEach(a=>slots.push({items:[a],val:a.val}));
 if(!slots.length){$('bout').innerHTML='<div style="color:var(--mut)">Add products, chases or auctions to model slots.</div>';BK._last=null;return;}
 const sorted=slots.slice().sort((a,b)=>b.val-a.val);const labels=['S','A','B','C'];
 sorted.forEach((s,i)=>{s.tier=labels[Math.min(T-1,Math.floor(i/(sorted.length/T)))];});
 const tierRatio=ti=>{const idx=labels.indexOf(ti);return 0.78+(idx/Math.max(1,T-1))*0.5;};
 let totVal=0,gCold=0,gAvg=0,gHot=0;
 sorted.forEach(s=>{const avg=s.val*tierRatio(s.tier)*(1+MK*0.25);s.avg=avg;totVal+=s.val;gCold+=avg*0.85;gAvg+=avg;gHot+=avg*1.2;});
 const cost=BK.cost||0,net=g=>g*0.91-cost;
 const rows=sorted.map(s=>`<tr><td><span class="tier${s.tier}">${s.tier}</span></td><td>${s.items.map(i=>esc(i.name)).join(' + ')}</td><td class="mono">${money(s.val)}</td><td class="mono">${money(s.avg)}</td></tr>`).join('');
 $('bout').innerHTML=`<div class="grid" style="grid-template-columns:1fr 1fr 1fr;gap:10px">
   <div class="metric"><div class="n" style="font-size:22px">${money(gAvg)}</div><div class="l">Exp. gross (avg)</div></div>
   <div class="metric"><div class="n" style="font-size:22px">${money(net(gAvg))}</div><div class="l">Proj. profit</div></div>
   <div class="metric"><div class="n" style="font-size:22px">${sorted.length}</div><div class="l">Total slots</div></div></div>
  <div style="font-size:12px;color:var(--mut);margin:10px 0">Room range — cold ${money(gCold)} → hot ${money(gHot)} · card value ${money(totVal)} · sell-through ${totVal?(gAvg/totVal*100).toFixed(0):0}% · minus cost ${money(cost)} &amp; ~9% fees</div>
  <div style="overflow:auto;max-height:300px;border:1px solid var(--line);border-radius:10px"><table><tr><th>Tier</th><th>Slot contents</th><th>Value</th><th>Exp. bid</th></tr>${rows}</table></div>`;
 BK._last={slots:sorted.length,tiers:T,gross:gAvg};
}

function parseCSV(text){const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim().length);
 const pl=l=>{const out=[];let cur='',q=false;for(let i=0;i<l.length;i++){const c=l[i];if(q){if(c=='"'){if(l[i+1]=='"'){cur+='"';i++;}else q=false;}else cur+=c;}else{if(c=='"')q=true;else if(c==','||c=='\t'){out.push(cur);cur='';}else cur+=c;}}out.push(cur);return out.map(x=>x.trim());};
 const rows=lines.map(pl);const columns=rows.shift()||[];return{columns,rows};}
function downloadChecklistTemplate(){csvDL('element10_checklist_template.csv',[['Card Name','Card Number','Set','Rarity','Market Value'],['Charizard ex','006/197','Ascended Heroes','Special Illustration Rare','260'],['Pikachu','025/165','Pokémon 151','Common','2']]);toast('Template downloaded — keep the header row, then upload');}
function validateChecklist(p){const idx=rx=>p.columns.findIndex(c=>new RegExp(rx,'i').test(c));
 const ni=idx('card ?name|^name$|name|title|card'),vi=idx('value|market|price');
 const missing=[];if(ni<0)missing.push('Card Name');
 const errors=[],valid=[];
 p.rows.forEach((rw,i)=>{if(rw.every(c=>!(''+(c==null?'':c)).trim()))return;const rn=i+2,er=[];
   const name=(ni>=0?(rw[ni]||''):'').trim();if(!name)er.push(['Card Name','Card Name is required']);
   if(vi>=0&&(rw[vi]||'').trim()){const v=(rw[vi]||'').trim();const clean=v.replace(/[^0-9.]/g,'');if(clean===''||isNaN(parseFloat(clean)))er.push(['Market Value',`"${v}" is not a number`]);}
   if(er.length)er.forEach(([c,m])=>errors.push({row:rn,col:c,msg:m}));else valid.push(rw);
 });
 return {missing,errors,valid,columns:p.columns};
}
function uploadChecklist(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const p=parseCSV(e.target.result);const res=validateChecklist(p);
 if(res.missing.length){importReport('Checklist upload',`Missing required column(s): ${res.missing.join(', ')}. Download the checklist template and keep its header row.`,null,null);return;}
 const commit=rows=>{S.checklists.push({name:f.name,columns:res.columns,rows});save();renderData();toast('Checklist added ('+rows.length+' rows)');};
 if(res.errors.length){importReport('Checklist upload',null,res.errors,res.valid.length?function(){commit(res.valid);}:null);return;}
 if(!res.valid.length){importReport('Checklist upload','No data rows found in the file.',null,null);return;}
 commit(res.valid);
};r.readAsText(f);inp.value='';}

let _impProceed=null;
function importReport(title,msg,errors,onProceed){
 _impProceed=onProceed?function(){onProceed();closeM();}:null;
 let h=`<h3 style="font-size:18px">${esc(title)} — check your file</h3>`;
 if(msg)h+=`<div style="color:var(--red);font-size:13px;margin:8px 0">${esc(msg)}</div>`;
 if(errors&&errors.length){h+=`<div style="color:var(--mut);font-size:12.5px;margin:6px 0">${errors.length} issue${errors.length>1?'s':''} found. Fix these rows in your file and re-upload${onProceed?', or import the rows that passed':''}.</div>
   <div style="max-height:280px;overflow:auto;border:1px solid var(--line);border-radius:10px;margin-top:8px"><table><tr><th>Row</th><th>Column</th><th>Issue</th></tr>${errors.slice(0,300).map(x=>`<tr><td class="mono">${x.row}</td><td>${esc(x.col)}</td><td>${esc(x.msg)}</td></tr>`).join('')}</table></div>`;}
 h+=`<div class="row" style="margin-top:16px">${onProceed?`<button class="btn v" onclick="_impProceed&&_impProceed()">Import valid rows</button>`:''}<button class="btn sm" onclick="closeM()">${onProceed?'Cancel':'OK'}</button></div>`;
 $('modal').innerHTML=h;$('ov').style.display='flex';
}
function validateInv(p){const idx=rx=>p.columns.findIndex(c=>new RegExp(rx,'i').test(c));
 const ni=idx('name|title|card|product'),ci=idx('categor|type'),si=idx('^set'),qi=idx('qty|quantity'),coi=idx('cost|paid'),vi=idx('value|market|price'),gi=idx('cond|grade'),imi=idx('image|img|url'),oi=idx('owner|assigned|streamer');
 const missing=[];if(ni<0)missing.push('Name');
 const errors=[],valid=[];
 p.rows.forEach((rw,i)=>{if(rw.every(c=>!(''+(c==null?'':c)).trim()))return;const rn=i+2,er=[];
   const name=(ni>=0?(rw[ni]||''):'').trim();if(!name)er.push(['Name','Name is required']);
   let cat='Other';if(ci>=0&&(rw[ci]||'').trim()){const c=(rw[ci]||'').trim();const m=INVCATS.find(x=>x.toLowerCase()===c.toLowerCase());if(!m)er.push(['Category',`"${c}" must be one of: ${INVCATS.join(', ')}`]);else cat=m;}
   let qty=1;if(qi>=0&&(rw[qi]||'').trim()){const q=(rw[qi]||'').trim();if(!/^\d+$/.test(q))er.push(['Qty',`"${q}" must be a whole number`]);else qty=+q;}
   const num=(ix,lab)=>{if(ix<0)return 0;const v=(rw[ix]||'').toString().trim();if(!v)return 0;const clean=v.replace(/[^0-9.\-]/g,'');if(clean===''||isNaN(parseFloat(clean))){er.push([lab,`"${v}" is not a number`]);return 0;}return parseFloat(clean);};
   const cost=num(coi,'Unit Cost'),value=num(vi,'Market Value');
   const img=imi>=0?(rw[imi]||'').trim():'';if(img&&!/^https?:\/\//i.test(img))er.push(['Image URL','must start with http:// or https://']);
   const owner=(oi>=0&&(rw[oi]||'').trim())?(rw[oi]||'').trim():ME;
   if(er.length)er.forEach(([c,m])=>errors.push({row:rn,col:c,msg:m}));
   else valid.push({id:'i'+Date.now()+i,name,cat,set:si>=0?(rw[si]||'').trim():'',qty,cost,value,cond:gi>=0?(rw[gi]||'').trim():'',img,owner});
 });
 return {missing,errors,valid};
}
function importInv(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const p=parseCSV(e.target.result);const res=validateInv(p);
 if(res.missing.length){importReport('Inventory import',`Missing required column(s): ${res.missing.join(', ')}. Download the CSV template and keep its header row.`,null,null);return;}
 if(res.errors.length){importReport('Inventory import',null,res.errors,res.valid.length?function(){res.valid.forEach(it=>S.inventory.push(it));save();dInventory();toast(res.valid.length+' valid row(s) imported');}:null);return;}
 if(!res.valid.length){importReport('Inventory import','No data rows found in the file.',null,null);return;}
 res.valid.forEach(it=>S.inventory.push(it));save();dInventory();toast(res.valid.length+' items imported');
};r.readAsText(f);inp.value='';}

function rollRandom(p){const pool=(p.pool||[]).filter(c=>c.name);const n=Math.max(1,p.count||5);const out=[];if(!pool.length)return out;
 for(let k=0;k<n;k++){const tot=pool.reduce((s,c)=>s+(+c.weight||1),0);let r=Math.random()*tot,pick=pool[0];for(const c of pool){r-=(+c.weight||1);if(r<=0){pick=c;break;}}out.push(pick);}return out;}
function launchOpen(id){const p=(S.repacks||[]).find(x=>x.id===id);if(!p)return;const cards=(p.mode==='random'?rollRandom(p):(p.cards||[]).slice()).filter(c=>c&&c.name);
 if(!cards.length){toast('Add cards first');return;}
 try{localStorage.setItem('e10_open',JSON.stringify({product:{name:p.name,kind:p.kind,price:p.price,chase:p.chase},cards}));}catch(e){toast('Could not stage opener');return;}
 const w=window.open('open.html','_blank');if(!w)toast('Allow pop-ups, then click ▶ again');else toast('Opener launched — share that tab in OBS');}

function pickImage(cb){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.onchange=()=>{if(inp.files&&inp.files[0])e10Upload(inp.files[0],cb);};inp.click();}
function resizeImg(file){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>{const max=1200;let w=img.width,h=img.height;if(w>max||h>max){const s=Math.min(max/w,max/h);w=Math.round(w*s);h=Math.round(h*s);}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);c.toBlob(b=>b?res(b):rej('blob'),'image/jpeg',0.85);};img.onerror=()=>rej('img');img.src=URL.createObjectURL(file);});}
async function e10Upload(file,cb){if(!sb){toast('Not connected');return;}toast('Uploading image…');try{let blob;try{blob=await resizeImg(file);}catch(e){blob=file;}const path='card/'+Date.now()+'_'+Math.random().toString(36).slice(2)+'.jpg';const{error}=await sb.storage.from('cards').upload(path,blob,{contentType:'image/jpeg',upsert:false});if(error){toast('Upload failed: '+error.message);return;}const{data}=sb.storage.from('cards').getPublicUrl(path);cb(data.publicUrl);toast('Image uploaded');}catch(e){toast('Upload error');}}
function rpUploadImg(i){pickImage(url=>{const l=rpList();if(l[i]){l[i].img=url;save();renderRepackEditor();}});}
function invUploadImg(){pickImage(url=>{const el=$('ivImg');if(el)el.value=url;const pv=$('ivImgPv');if(pv){pv.src=url;pv.style.display='inline-block';}toast('Image ready — click Add item');});}

/* Preserve typing across realtime updates: defer a section re-render while an input is focused. */
let _pendingRender=false;

function authScreen(msg){document.body.innerHTML=`<div style="max-width:380px;margin:12vh auto;padding:24px;font-family:'Space Grotesk',system-ui,sans-serif">
 <div style="font-family:'Anton',sans-serif;font-size:34px;text-transform:uppercase;letter-spacing:.02em">ELEMENT<span style="background:#C6FF3A;padding:0 8px;border-radius:6px">10</span></div>
 <div style="color:#6b6d73;margin:8px 0 22px">Team command center — sign in to continue.</div>
 <label style="font-size:12px;color:#6b6d73">Email</label><input id="auEmail" type="email" style="width:100%;padding:11px;border:1px solid #e4e2da;border-radius:8px;margin:4px 0 10px">
 <label style="font-size:12px;color:#6b6d73">Password</label><input id="auPass" type="password" style="width:100%;padding:11px;border:1px solid #e4e2da;border-radius:8px;margin:4px 0 16px">
 <button onclick="doLogin()" style="width:100%;padding:11px;border-radius:999px;border:none;background:#C6FF3A;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit">Sign in</button>
 <button onclick="doSignup()" style="width:100%;padding:11px;border-radius:999px;border:1px solid #0A0B0D;background:none;cursor:pointer;font-family:inherit">Create account</button>
 <div id="auMsg" style="color:#E8332B;font-size:13px;margin-top:12px">${msg||''}</div></div>`;}
async function doLogin(){const email=document.getElementById('auEmail').value.trim(),password=document.getElementById('auPass').value;const{error}=await sb.auth.signInWithPassword({email,password});if(error)document.getElementById('auMsg').textContent=error.message;else location.reload();}
async function doSignup(){const email=document.getElementById('auEmail').value.trim(),password=document.getElementById('auPass').value;if(password.length<6){document.getElementById('auMsg').textContent='Password must be 6+ characters';return;}const{data,error}=await sb.auth.signUp({email,password});if(error){document.getElementById('auMsg').textContent=error.message;}else if(data.session){location.reload();}else{const m=document.getElementById('auMsg');m.style.color='#0A0B0D';m.textContent='Account created — check your email to confirm, then sign in. (Admin can disable confirmation for instant access.)';}}
async function boot(){if(!window.supabase){authScreen('Auth library failed to load (check connection).');return;}
 sb=window.supabase.createClient(SB_URL,SB_KEY);
 const{data:{session}}=await sb.auth.getSession();
 if(!session){authScreen('');return;}
 ME=session.user.email;MEID=session.user.id;S.user=ME;
 await loadAll();renderWho();renderScopebar();currentRender();}
boot();
</script></body></html>
