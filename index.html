<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Element 10 — Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf9f5;--surface:#ffffff;--surface2:#f0efea;--ink:#0A0B0D;--mut:#6b6d73;--mut2:#9a9a93;--line:#e4e2da;--volt:#C6FF3A;--blue:#1F5EFF;--red:#E8332B;--r:14px;--rp:999px;
--disp:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;--sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px}
h1,h2,h3{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.02em;margin:0}
.mono{font-family:var(--mono)}a{color:var(--blue);text-decoration:none;cursor:pointer}
header{display:flex;align-items:center;gap:22px;padding:16px 26px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#faf9f5f2;backdrop-filter:blur(6px);z-index:30}
.logo{font-family:var(--disp);font-weight:700;font-size:22px;letter-spacing:.04em}.logo b{background:var(--volt);padding:0 8px;border-radius:6px}
nav{display:flex;gap:6px;flex-wrap:wrap}
.tab{font-family:var(--sans);font-weight:500;font-size:13.5px;padding:8px 15px;border-radius:var(--rp);border:1px solid transparent;background:none;cursor:pointer;color:var(--mut)}
.tab:hover{background:var(--surface2);color:var(--ink)}.tab.on{background:var(--ink);color:#fff}
.wrap{max-width:1180px;margin:0 auto;padding:26px}
.sec{display:none}.sec.on{display:block}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px}
.grid{display:grid;gap:16px}
.btn{font-family:var(--sans);font-weight:500;font-size:13.5px;padding:9px 16px;border-radius:var(--rp);border:1px solid var(--ink);background:none;color:var(--ink);cursor:pointer}
.btn:hover{background:var(--surface2)}.btn.v{background:var(--volt);border-color:var(--volt);font-weight:700}
.btn.d{background:var(--ink);color:#fff}.btn.sm{padding:6px 12px;font-size:12.5px}.btn.x{border:none;color:var(--red);padding:4px 8px;background:none}
input,select,textarea{font-family:var(--sans);font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--ink);width:100%}
textarea{resize:vertical;min-height:64px}
label{font-size:12px;color:var(--mut);font-weight:500;display:block;margin:0 0 4px}
.lab{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut2)}
.metric{background:var(--surface2);border-radius:var(--r);padding:16px}
.metric .n{font-family:var(--disp);font-weight:700;font-size:30px;line-height:1;letter-spacing:-.01em}.metric .l{font-size:12px;color:var(--mut);margin-top:6px}
.pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:var(--rp);background:var(--surface2);color:var(--mut);border:1px solid var(--line);margin:3px}
.pill.v{background:var(--volt);color:var(--ink);border-color:var(--volt)}
.acc{border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;overflow:hidden;background:var(--surface)}
.acc>.h{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;font-weight:500}
.acc>.h .chev{margin-left:auto;transition:.15s;color:var(--mut)}.acc.open>.h .chev{transform:rotate(90deg)}
.acc>.b{display:none;padding:0 18px 18px}.acc.open>.b{display:block}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.todo{display:flex;align-items:center;gap:11px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--surface)}
.todo.done{opacity:.5}.todo.done .t{text-decoration:line-through}
.todo input[type=checkbox]{width:18px;height:18px;accent-color:var(--volt);flex:none}
.todo .grip{cursor:grab;color:var(--mut2);flex:none}.todo .t{flex:1;cursor:pointer}.todo .t:hover{color:var(--blue)}
.todo .badge{font-family:var(--mono);font-size:10px;color:var(--mut2)}
.todo.dover{border-color:var(--ink)}
.cmt{padding:10px 12px;border-left:3px solid var(--volt);background:var(--surface2);border-radius:0 10px 10px 0;margin-bottom:9px;font-size:13.5px}
.cmt .who{font-family:var(--mono);font-size:11px;color:var(--mut)}
.sgrid{display:grid;grid-template-columns:88px repeat(7,1fr);gap:6px;min-width:820px}
.sgrid .hd{font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--mut);text-align:center;padding:6px 0;letter-spacing:.05em}
.sgrid .dp{font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--mut);display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding-right:8px;text-align:right}
.cell{background:var(--surface);border:1px solid var(--line);border-radius:10px;min-height:70px;padding:6px}
.cell.peak{background:#f7fce9;border-color:#e4f3bf}.cell.dover{border-color:var(--ink)}
.show{background:var(--ink);color:#fff;border-radius:8px;padding:7px 8px;margin-bottom:5px;cursor:grab;font-size:11.5px;line-height:1.3}
.show .nm{font-weight:500}.show .mt{font-family:var(--mono);font-size:10px;color:var(--volt);margin-top:2px}
.addc{color:var(--mut2);font-size:11px;cursor:pointer;text-align:center}.addc:hover{color:var(--ink)}
.out{background:var(--surface2);border-radius:10px;padding:12px 14px;margin-top:8px;font-size:13.5px;line-height:1.5;position:relative}
.out .cp{position:absolute;right:8px;top:8px}
table{border-collapse:collapse;width:100%;font-size:13px}
th{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
td{padding:8px 10px;border-bottom:1px solid var(--line)}
.tierS{color:var(--red);font-weight:700}.tierA{color:var(--blue);font-weight:700}.tierB{color:#0a8a4a;font-weight:700}.tierC{color:var(--mut);font-weight:700}
.ov{position:fixed;inset:0;background:#0008;display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
.modal{background:var(--surface);border-radius:var(--r);padding:22px;max-width:520px;width:100%;max-height:88vh;overflow:auto}
.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:14px}
.hero h1{font-size:38px}.hero .sub{color:var(--mut);font-size:13.5px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:var(--rp);font-size:13px;opacity:0;transition:.2s;z-index:80}.toast.on{opacity:1}
.foot{color:var(--mut2);font-size:11px;margin-top:26px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:780px){.split{grid-template-columns:1fr}}
.drop{border:1.5px dashed var(--line);border-radius:12px;padding:16px;text-align:center;color:var(--mut);font-size:13px;cursor:pointer}
.drop:hover{border-color:var(--ink);color:var(--ink)}
.filerow{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;font-size:13px;background:var(--surface)}
.filerow .nm{flex:1}.chipwrap{margin:8px 0}
</style><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head><body>
<header><div class="logo">ELEMENT<b>10</b></div><nav id="nav"></nav><div id="who" style="margin-left:auto"></div></header>
<div class="wrap">
  <div class="sec on" id="sec-home"></div>
  <div class="sec" id="sec-schedule"></div>
  <div class="sec" id="sec-copy"></div>
  <div class="sec" id="sec-gen"></div>
  <div class="sec" id="sec-break"></div>
  <div class="sec" id="sec-live"></div>
  <div class="sec" id="sec-repack"></div>
  <div class="sec" id="sec-data"></div>
  <div class="foot" id="foot"></div>
</div>
<div class="ov" id="ov"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<script>
/* ---------- defaults ---------- */
const DEF_LISTS={characters:['Charizard','Moonbreon','Umbreon','Pikachu','Gengar','Mewtwo','Mew','Rayquaza','Eevee','Greninja','Lugia','Team Rocket'],
 sets:['Pokémon 151','Prismatic Evolutions','Ascended Heroes','Chaos Rising','Destined Rivals','Evolving Skies','Crown Zenith','Surging Sparks','Vintage / WOTC','Mega Dream (JP)'],
 formats:['Ceiling Ladder','Character Break','RTYH','Grail Slab Break','$1 Singles Auction','Box Break (new release)','Pick-Your-Pokémon','Repack','Vintage Rip'],
 diff:['posted odds','free packs','every card ships','ships <1d','no reseals','best wall on Whatnot']};
const DAYPARTS=[['Morning',0.22,'9:00 AM'],['Afternoon',0.55,'2:00 PM'],['Evening',1.0,'8:00 PM'],['Late night',0.7,'11:00 PM']];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const TITLE_TPL={curiosity:["$P START — is [SET] worth ripping? [CHAR] chase w/ [HOST]","the [CHAR] nobody's pulling… [SET] RTYH w/ [HOST]","$P [CHAR] chase — [DIFF] — w/ [HOST]"],
 search:["$P START RTYH [SET] — [CHAR] chase — [DIFF] w/ [HOST]","[SET] Character Break — $P starts — [CHAR] / [DIFF]","[SET] CEILING LADDER — God Pack / SIR / Slab / Pack · [DIFF] · [TIME] ET"],
 drama:["$P [CHAR] CHASE — [SET] — [DIFF] — w/ [HOST]","[SET] IS HERE — $P STARTS + FREE GIVEAWAYS w/ [HOST]","GRAIL SLAB HUNT — [CHAR] PSA 10 CHASE — [DIFF]"]};
const DESC_TPL=["[SET] on the wall. Every card ships, packaged to protect, fast shipping. $P starts — [CHAR] and more. [DIFF].","Ripping [SET] — [FMT]. [DIFF]. $P starts, no reseals, all cards ship. Bookmark for [TIME] ET.","[CHAR] chase night. [SET] [FMT] at $P. Real odds, clean cards, quick shipping."];
const SHORT_TPL=["$[LOW] pack → pulled the [CHAR]?! ([SET])","I opened $[X] of [SET] to see if it's WORTH IT","the rarest [CHAR] in [SET] just hit the wall","should I rip it or keep it sealed? [SET] [CHAR]"];
const rand=a=>a[Math.floor(Math.random()*a.length)]||'';
const fill=(t,d)=>{const host=(d.host||'').trim();return t.replace(/\[CHAR\]/g,d.char).replace(/\[SET\]/g,d.set).replace(/\[FMT\]/g,d.fmt).replace(/\s*w\/\s*\[HOST\]/gi,host?(' w/ '+host):'').replace(/\[HOST\]/g,host).replace(/\[DIFF\]/g,d.diff).replace(/\[TIME\]/g,d.time||'8:00').replace(/\$P/g,'$'+d.price).replace(/\[LOW\]/g,d.low||'4').replace(/\[X\]/g,d.x||'400').replace(/\s{2,}/g,' ').trim();};

/* ---------- state ---------- */
const KEY='element10_v2';
let S=JSON.parse(localStorage.getItem(KEY)||'null');
if(!S){S={lists:JSON.parse(JSON.stringify(DEF_LISTS)),streamers:['Trent','Guest 1','Guest 2'],
 todos:[{id:'t1',text:'Lock brand direction + grab handles',done:false,desc:'',comments:[]},{id:'t2',text:'Build first Ceiling Ladder show',done:false,desc:'',comments:[]},{id:'t3',text:'Load week 1 inventory',done:false,desc:'',comments:[]}],
 comments:[{who:'Trent',when:Date.now(),text:'Kicking off the Element 10 build — drop updates here.'}],
 shows:{},breaks:[],attachments:[],checklists:[],inventory:[],dashCfg:{catValue:true,costMarket:true,movement:true},sales:null,user:null};}
if(!('user' in S))S.user=null;
if(!S.inventory)S.inventory=[];if(!S.dashCfg)S.dashCfg={catValue:true,costMarket:true,movement:true};
if(!S.lists)S.lists=JSON.parse(JSON.stringify(DEF_LISTS));
['attachments','checklists','breaks','copySets'].forEach(k=>{if(!S[k])S[k]=[];});
S.todos.forEach(t=>{if(t.desc==null)t.desc='';if(!t.comments)t.comments=[];});
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){toast('Storage full — large attachment not saved');}}
const $=id=>document.getElementById(id);
function esc(s){s=(s==null?'':''+s);return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1800);}
function copy(txt){navigator.clipboard&&navigator.clipboard.writeText(txt);toast('Copied');}
function money(n){return '$'+Math.round(n).toLocaleString();}
const L=k=>S.lists[k];

/* ---------- nav ---------- */
const SECTIONS=[['home','Home'],['schedule','Schedule'],['copy','Copy Studio'],['gen','Schedule Gen'],['break','Break Calculator'],['live','Live Break'],['repack','Repack Studio'],['data','Data & Lists']];
$('nav').innerHTML=SECTIONS.map((s,i)=>`<button class="tab ${i===0?'on':''}" data-s="${s[0]}" onclick="go('${s[0]}')">${s[1]}</button>`).join('');
function go(s){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.s===s));document.querySelectorAll('.sec').forEach(x=>x.classList.remove('on'));$('sec-'+s).classList.add('on');window.scrollTo(0,0);({home:renderHome,schedule:renderSchedule,copy:renderCopy,gen:renderGen,break:renderBreak,data:renderData,repack:renderRepack,live:renderLive}[s])();}
$('foot').textContent='Element 10 · Command · shared team workspace · synced live';
function renderWho(){$('who').innerHTML=S.user?`<button class="btn sm" onclick="signIn()">👤 ${esc(S.user)}</button>`:`<button class="btn v sm" onclick="signIn()">Sign in</button>`;}
function signIn(cb){window._siCb=(typeof cb==='function')?cb:null;$('modal').innerHTML=`<h3 style="font-size:18px">Sign in</h3><div class="sub" style="color:var(--mut);font-size:12.5px;margin:6px 0 12px">Your name tags your notes and comments so the team knows who did what. Real email logins arrive when we host the shared version.</div><label>Your name</label><input id="siName" value="${esc(S.user||'')}" placeholder="e.g. Trent" onkeydown="if(event.key==='Enter')doSignIn()"><div class="row" style="margin-top:16px"><button class="btn v" onclick="doSignIn()">Save</button>${S.user?'<button class="btn sm" onclick="closeM()">Cancel</button>':''}</div>`;$('ov').style.display='flex';setTimeout(()=>{const el=$('siName');if(el)el.focus();},60);}
function doSignIn(){const v=$('siName').value.trim();if(!v)return;S.user=v;save();renderWho();closeM();const cb=window._siCb;window._siCb=null;if(cb)cb();else{const on=document.querySelector('.tab.on');if(on)({home:renderHome,schedule:renderSchedule,copy:renderCopy,gen:renderGen,break:renderBreak,data:renderData,repack:renderRepack,live:renderLive}[on.dataset.s])();}}
function requireUser(cb){if(S.user)cb();else signIn(cb);}
renderWho();

/* ---------- schedule grid (shared) ---------- */
function scheduleGridHTML(){
 let h=`<div style="overflow:auto"><div class="sgrid"><div></div>${DAYS.map(d=>`<div class="hd">${d}</div>`).join('')}`;
 DAYPARTS.forEach(dp=>{h+=`<div class="dp">${dp[0]}<span style="color:var(--mut2)">${dp[2]}</span></div>`;
  DAYS.forEach(day=>{const k=day+'|'+dp[0];const peak=dp[1]>=0.7?'peak':'';const arr=S.shows[k]||[];
   h+=`<div class="cell ${peak}" ondragover="event.preventDefault()" ondragenter="this.classList.add('dover')" ondragleave="this.classList.remove('dover')" ondrop="this.classList.remove('dover');dropShow('${k}')">${arr.map((s,i)=>`<div class="show" draggable="true" ondragstart="dragShow('${k}',${i})" onclick="event.stopPropagation();editShow('${k}',${i})"><div class="nm">${esc(s.name)}</div><div class="mt">${esc(s.fmt||'')} · ${esc(s.dur||'')}m · ${esc(s.host||'')}</div>${(s.titleSet||s.breakModel||s.repackRef)?`<div class="mt">${s.titleSet?'📝 ':''}${s.breakModel?'📊 ':''}${s.repackRef?'🎁':''}</div>`:''}</div>`).join('')}<div class="addc" onclick="newShow('${k}')">+ add</div></div>`;});});
 h+=`</div></div>`;return h;}
let DRAGS=null;function dragShow(k,i){DRAGS={k,i};}
function dropShow(k){if(!DRAGS)return;if(!canEditScoped()){DRAGS=null;return roGuard();}const s=S.shows[DRAGS.k].splice(DRAGS.i,1)[0];if(!S.shows[DRAGS.k].length)delete S.shows[DRAGS.k];(S.shows[k]=S.shows[k]||[]).push(s);DRAGS=null;save();rerenderSchedule();}
function rerenderSchedule(){if($('sec-schedule').classList.contains('on'))renderSchedule();if($('sec-home').classList.contains('on'))renderHome();}
function newShow(k){if(!canEditScoped())return roGuard();showModal(null,k||(DAYS[0]+'|Evening'));}
function editShow(k,i){const s=S.shows[k]&&S.shows[k][i];if(!s)return;showDetail(s.id);}
function showModal(ex,k){ex=ex||{name:'',fmt:L('formats')[0],dur:90,host:S.streamers[0]||''};const[day,dp]=k.split('|');
 $('modal').innerHTML=`<h3 style="font-size:18px">${ex.k!=null?'Edit':'New'} show</h3>
  <div style="margin-top:12px"><label>Show name</label><input id="mname" value="${esc(ex.name)}" placeholder="e.g. Ascended Heroes Ceiling Ladder"></div>
  <div class="row" style="margin-top:10px"><div style="flex:1"><label>Day</label><select id="mday">${DAYS.map(d=>`<option ${d===day?'selected':''}>${d}</option>`).join('')}</select></div>
  <div style="flex:1"><label>Daypart</label><select id="mdp">${DAYPARTS.map(d=>`<option ${d[0]===dp?'selected':''}>${d[0]}</option>`).join('')}</select></div></div>
  <div class="row" style="margin-top:10px"><div style="flex:1"><label>Format</label><select id="mfmt">${L('formats').map(f=>`<option ${f===ex.fmt?'selected':''}>${esc(f)}</option>`).join('')}</select></div>
  <div style="flex:1"><label>Duration (min)</label><input id="mdur" type="number" value="${ex.dur}"></div></div>
  <div style="margin-top:10px"><label>Streamer</label><select id="mhost">${S.streamers.map(s=>`<option ${s===ex.host?'selected':''}>${esc(s)}</option>`).join('')}</select></div>
  <div class="row" style="margin-top:18px"><button class="btn v" onclick="saveShow(${ex.k!=null?`'${ex.k}',${ex.i}`:'null,null'})">Save</button><button class="btn sm" onclick="closeM()">Cancel</button>${ex.k!=null?`<button class="btn x" style="margin-left:auto" onclick="delShow('${ex.k}',${ex.i})">Delete</button>`:''}</div>`;
 $('ov').style.display='flex';}
function saveShow(ok,oi){if(!canEditScoped())return roGuard();
 const s={id:'sh'+Date.now(),name:$('mname').value.trim()||'Untitled show',fmt:$('mfmt').value,dur:+$('mdur').value||60,host:$('mhost').value,notes:'',titleSet:null,titleSetId:null,breakModel:null,breakModelId:null,inventoryAlloc:[],repackRef:null,needs:[]};
 const k=$('mday').value+'|'+$('mdp').value;
 if(ok!=null&&S.shows[ok]&&S.shows[ok][oi]){const old=S.shows[ok][oi];s.id=old.id||s.id;s.notes=old.notes||'';s.titleSet=old.titleSet||null;s.titleSetId=old.titleSetId||null;s.breakModel=old.breakModel||null;s.breakModelId=old.breakModelId||null;s.inventoryAlloc=old.inventoryAlloc||[];s.repackRef=old.repackRef||null;s.needs=old.needs||[];S.shows[ok].splice(oi,1);if(!S.shows[ok].length)delete S.shows[ok];}
 (S.shows[k]=S.shows[k]||[]).push(s);save();closeM();rerenderSchedule();}
/* ---------- SHOW DETAIL (the hub panel) ---------- */
function showById(id){let res=null;Object.keys(S.shows||{}).forEach(k=>{(S.shows[k]||[]).forEach((s,i)=>{if(s.id===id)res={k,i,s};});});return res;}
function showDetail(id){const r=showById(id);if(!r){closeM();return;}const s=r.s;const[day,dp]=r.k.split('|');
 const ro=!canEditScoped();
 const copyBox=s.titleSet?`<div class="out"><div class="row" style="justify-content:space-between"><span class="lab">${esc(s.titleSet.name)} · ${esc(s.titleSet.type)}</span>${ro?'':`<button class="btn x" onclick="showDetach('${id}','titleSet')">detach</button>`}</div><div style="margin-top:6px">${(s.titleSet.items||[]).map(it=>`<div style="font-size:12.5px;padding:2px 0"><span class="lab">${esc(it[0])}</span> ${esc(it[1])}</div>`).join('')}</div></div>`
   :`<div class="lab">No copy attached.</div>${ro?'':`<div class="row" style="margin-top:6px"><select onchange="showPickCopy('${id}',this.value)" style="flex:2"><option value="">— attach a saved copy set —</option>${(S.copySets||[]).map(c=>`<option value="${c.id}">${esc(c.name)} · ${esc(c.type)}</option>`).join('')}</select><button class="btn sm" onclick="closeM();go('copy')">Generate ↗</button></div>`}`;
 const eco=s.breakModel&&s.breakModel.economics;
 const breakBox=s.breakModel?`<div class="out"><div class="row" style="justify-content:space-between"><span class="lab">${esc(s.breakModel.name)} · ${s.breakModel.slots} slots · ${s.breakModel.tiers} tiers</span>${ro?'':`<button class="btn x" onclick="showDetach('${id}','breakModel')">detach</button>`}</div>${eco?`<div style="font-size:12.5px;margin-top:6px">Exp. gross ${money(eco.grossAvg)} · proj. profit ${money(eco.profit)} · cost ${money(eco.cost)} · card value ${money(eco.totVal)}</div>`:''}${(s.inventoryAlloc&&s.inventoryAlloc.length)?`<div style="margin-top:6px"><span class="lab">Inventory allocation</span>${s.inventoryAlloc.map(a=>`<div style="font-size:12.5px;padding:1px 0">📦 ${esc(a.name)} · cost ${money(a.cost)} · val ${money(a.value)}</div>`).join('')}</div>`:''}${ro?'':`<div class="row" style="margin-top:8px"><button class="btn v sm" onclick="showStartLive('${id}')">▶ Start Live Break for this show</button></div>`}</div>`

 const nk=$('mday').value+'|'+$('mdp').value;
 if(nk!==r.k){S.shows[r.k].splice(r.i,1);if(!S.shows[r.k].length)delete S.shows[r.k];(S.shows[nk]=S.shows[nk]||[]).push(s);}
 save();closeM();rerenderSchedule();toast('Show saved');}
function delShowById(id){if(!canEditScoped())return roGuard();const r=showById(id);if(!r)return;S.shows[r.k].splice(r.i,1);if(!S.shows[r.k].length)delete S.shows[r.k];save();closeM();rerenderSchedule();}
function showPickCopy(id,setId){if(!setId)return;if(!canEditScoped())return roGuard();const cs=(S.copySets||[]).find(x=>x.id===setId);const r=showById(id);if(!cs||!r)return;r.s.titleSet=JSON.parse(JSON.stringify(cs));r.s.titleSetId=cs.id;save();showDetail(id);toast('Copy attached');}
async function showPickBreak(id,bid){if(!bid)return;if(!canEditScoped())return roGuard();const b=(S.breaks||[]).find(x=>x.id===bid);const r=showById(id);if(!b||!r)return;r.s.breakModel=JSON.parse(JSON.stringify(b));r.s.breakModelId=b.id;r.s.inventoryAlloc=(b.invItems||[]).map(x=>({itemId:x.itemId,name:x.name,qty:x.qty,cost:x.cost,value:x.value,set:x.set}));save();const res=await reserveModelToShow(r.s,b);showDetail(id);toast((res&&res.msg)||'Break model attached');}
/* Attaching a model to a show converts its inventory pulls into hard reservations (and detach releases them). */
async function reserveModelToShow(show,model){
 if(!model||!Array.isArray(model.invItems)||!model.invItems.length)return{ok:true,msg:'Break model attached'};
 const showId=show.id,showLabel=(show.name||'Untitled'),streamer=MEID,admin=ROLE==='admin';
 return await cloudCommitShared(base=>{const capped=[];
  model.invItems.forEach(iv=>{const it=base.inventory.find(x=>x.id===iv.itemId);if(!it)return;if(!Array.isArray(it.reservations))it.reservations=[];
   const ex=it.reservations.find(x=>x.showId===showId&&x.streamerUid===streamer);
   const totalRes=it.reservations.reduce((s,x)=>s+(+x.qty||0),0);const freeForThis=(+it.qty||0)-(totalRes-(ex?ex.qty:0));
   const want=+iv.qty||1,grant=admin?want:Math.min(want,Math.max(0,freeForThis));
   if(grant<want)capped.push(it.name);
   if(grant<=0)return;
   if(ex)ex.qty=grant;else it.reservations.push({showId,showLabel,streamerUid:streamer,qty:grant});});
  return{ok:true,msg:capped.length?('Attached · reservations capped by free stock: '+[...new Set(capped)].join(', ')):'Attached · inventory reserved to show'};});
}
async function releaseShowReservations(show,model){const showId=show.id,ids=(model&&model.invItems)?model.invItems.map(x=>x.itemId):null,admin=ROLE==='admin';
 return await cloudCommitShared(base=>{base.inventory.forEach(it=>{if(!Array.isArray(it.reservations))return;
   it.reservations=it.reservations.filter(rz=>{const match=rz.showId===showId&&(!ids||ids.includes(it.id));if(!match)return true;return !(admin||rz.streamerUid===MEID);});});
  return{ok:true,msg:'Released reservations'};});
}
function showPickRepack(id,rid){if(!rid)return;if(!canEditScoped())return roGuard();const p=(S.repacks||[]).find(x=>x.id===rid);const r=showById(id);if(!p||!r)return;r.s.repackRef={id:p.id,name:p.name};save();showDetail(id);}
async function showDetach(id,field){if(!canEditScoped())return roGuard();const r=showById(id);if(!r)return;
 if(field==='titleSet'){r.s.titleSet=null;r.s.titleSetId=null;save();showDetail(id);return;}
 if(field==='breakModel'){const m=r.s.breakModel;r.s.breakModel=null;r.s.breakModelId=null;r.s.inventoryAlloc=[];save();if(m)await releaseShowReservations(r.s,m);showDetail(id);toast('Detached · reservations released');return;}
 if(field==='repackRef'){r.s.repackRef=null;save();showDetail(id);return;}}

function showAddNeed(id){if(!canEditScoped())return roGuard();const r=showById(id);if(!r)return;const set=$('ndSet')?$('ndSet').value:'';if(!set){toast('Pick a set');return;}const qty=Math.max(1,$('ndQty')?+$('ndQty').value:1);const cost=$('ndCost')?+$('ndCost').value:0;(r.s.needs=r.s.needs||[]).push({id:'nd'+Date.now(),set,qty,approxCost:cost||0});save();showDetail(id);toast('Need added');}

 <div class="card"><h3 style="font-size:15px">Tuners</h3>

function renderBKlists(){
 $('prodList').innerHTML=BK.products.map((p,i)=>`<div class="row" style="justify-content:space-between;font-size:13px;padding:3px 0"><span>${esc(p.name)} · ${p.spots} spots · ${money(p.val)}</span><button class="btn x" onclick="BK.products.splice(${i},1);renderBKlists();calcBreak()">✕</button></div>`).join('');
 $('chaseList').innerHTML=BK.chases.map((c,i)=>`<div class="row" style="justify-content:space-between;font-size:13px;padding:3px 0"><span>${esc(c.name)} · ${money(c.val)}</span><button class="btn x" onclick="BK.chases.splice(${i},1);renderBKlists();calcBreak()">✕</button></div>`).join('');
 $('aucList').innerHTML=BK.auctions.map((c,i)=>`<div class="row" style="justify-content:space-between;font-size:13px;padding:3px 0"><span>${esc(c.name)} · ${money(c.val)}</span><button class="btn x" onclick="BK.auctions.splice(${i},1);renderBKlists();calcBreak()">✕</button></div>`).join('');
 const il=$('invList');if(il)il.innerHTML=BK.invItems.map((it,i)=>`<div class="row" style="justify-content:space-between;font-size:13px;padding:3px 0"><span>📦 ${esc(it.name)} · cost ${money(it.cost)} · val ${money(it.value)}</span><button class="btn x" onclick="bkDelInv(${i})">✕</button></div>`).join('');
}
function bkAddFromInv(){const el=$('bkInv');if(!el||el.value==='')return;const it=S.inventory[+el.value];if(!it)return;
 const already=BK.invItems.filter(x=>x.itemId===it.id).reduce((s,x)=>s+(+x.qty||0),0);
 if(already+1>invAvailable(it)){toast('No free units of '+it.name+' left ('+invAvailable(it)+' available)');return;}
 const val=+it.value||0,cost=+it.cost||0,qty=1;const slab=/slab|raw|card/i.test(it.cat||'');
 if(slab)BK.chases.push({name:it.name,val,invId:it.id});else BK.products.push({name:it.name,spots:1,val,invId:it.id});
 BK.invItems.push({itemId:it.id,name:it.name,qty,cost,value:val,cat:it.cat,set:it.set});
 BK.cost=(+BK.cost||0)+cost*qty;const bc=$('bCost');if(bc)bc.value=BK.cost;
 renderBKlists();calcBreak();toast('Pulled '+it.name+' ('+(invAvailable(it)-already-1)+' free left) — reserves on attach to a show');}
function bkDelInv(i){const it=BK.invItems[i];if(!it)return;BK.invItems.splice(i,1);
 BK.products=BK.products.filter(p=>p.invId!==it.itemId);BK.chases=BK.chases.filter(c=>c.invId!==it.itemId);
 BK.cost=Math.max(0,(+BK.cost||0)-(+it.cost||0)*(+it.qty||1));const bc=$('bCost');if(bc)bc.value=BK.cost;
 renderBKlists();calcBreak();}

function addChase(){const n=$('cbName').value.trim(),v=+$('cbVal').value;if(!n||!v)return;BK.chases.push({name:n,val:v});$('cbName').value=$('cbVal').value='';renderBKlists();calcBreak();}

function loadChecklistToBreak(){const idx=$('clSel').value;if(idx==='')return;const cl=S.checklists[+idx];
 // find a name col and value col
 const vcol=cl.columns.findIndex(c=>/value|price|\$|market/i.test(c));const ncol=cl.columns.findIndex(c=>/name|card|title|chase|item/i.test(c));
 const nc=ncol<0?0:ncol, vc=vcol<0?1:vcol;let n=0;
 cl.rows.forEach(r=>{const nm=r[nc],val=parseFloat((r[vc]||'').toString().replace(/[^0-9.]/g,''));if(nm&&val>0){BK.chases.push({name:nm,val:val});n++;}});
 renderBKlists();calcBreak();toast(n+' chases loaded from '+cl.name);}
function balance(items,n){const bins=Array.from({length:n},()=>({sum:0,items:[]}));items.slice().sort((a,b)=>b.val-a.val).forEach(it=>{bins.sort((a,b)=>a.sum-b.sum);bins[0].items.push(it);bins[0].sum+=it.val;});return bins;}
function calcBreak(){
 const N=+($('tSlots')?.value||5),T=+($('tTiers').value),E=+($('tEven').value),MK=+($('tMk').value)/100;
 let slots=[];const chases=BK.chases.slice().sort((a,b)=>b.val-a.val);
 const premium=Math.round(E/100*Math.min(4,Math.max(0,N-1)));
 chases.slice(0,premium).forEach(c=>slots.push({items:[c],val:c.val}));
 const rest=chases.slice(premium);
 if(rest.length)balance(rest,Math.max(1,N-premium)).forEach(b=>slots.push({items:b.items,val:b.sum}));
 BK.products.forEach(p=>{const each=p.val/p.spots;for(let i=0;i<p.spots;i++)slots.push({items:[{name:p.name+' spot',val:each}],val:each});});
 BK.auctions.forEach(a=>slots.push({items:[a],val:a.val}));
 if(!slots.length){$('bout').innerHTML='<div style="color:var(--mut)">Add products, chases or auctions to model slots.</div>';BK._last=null;return;}
 const sorted=slots.slice().sort((a,b)=>b.val-a.val);const labels=['S','A','B','C'];
 sorted.forEach((s,i)=>{s.tier=labels[Math.min(T-1,Math.floor(i/(sorted.length/T)))];});
 const tierRatio=ti=>{const idx=labels.indexOf(ti);return 1.28-(idx/Math.max(1,T-1))*0.5;};/* top tiers bid ABOVE value, lower tiers below — coherent with slot value */
 let totVal=0,gCold=0,gAvg=0,gHot=0;
 sorted.forEach(s=>{const avg=s.val*tierRatio(s.tier)*(1+MK*0.25);s.avg=avg;totVal+=s.val;gCold+=avg*0.85;gAvg+=avg;gHot+=avg*1.2;});
 const cost=BK.cost||0,net=g=>g*0.91-cost;
 const rows=sorted.map(s=>`<tr><td><span class="tier${s.tier}">${s.tier}</span></td><td>${s.items.map(i=>esc(i.name)).join(' + ')}</td><td class="mono">${money(s.val)}</td><td class="mono">${money(s.avg)}</td></tr>`).join('');
 $('bout').innerHTML=`<div class="grid" style="grid-template-columns:1fr 1fr 1fr;gap:10px">
   <div class="metric"><div class="n" style="font-size:22px">${money(gAvg)}</div><div class="l">Exp. gross (avg)</div></div>
   <div class="metric"><div class="n" style="font-size:22px">${money(net(gAvg))}</div><div class="l">Proj. profit</div></div>
   <div class="metric"><div class="n" style="font-size:22px">${sorted.length}</div><div class="l">Total slots</div></div></div>
  <div style="font-size:12px;color:var(--mut);margin:10px 0">Room range — cold ${money(gCold)} → hot ${money(gHot)} · card value ${money(totVal)} · gross vs card value ${totVal?(gAvg/totVal*100).toFixed(0):0}% · minus cost ${money(cost)} &amp; ~9% fees</div>
  <div style="overflow:auto;max-height:300px;border:1px solid var(--line);border-radius:10px"><table><tr><th>Tier</th><th>Slot contents</th><th>Value</th><th>Exp. bid</th></tr>${rows}</table></div>`;
 BK._last={slots:sorted.length,tiers:T,gross:gAvg,
   rows:sorted.map(s=>({label:s.items.map(i=>i.name).join(' + '),tier:s.tier,val:s.val,exp:s.avg})),
   economics:{grossAvg:gAvg,profit:net(gAvg),cost:cost,totVal:totVal,cold:gCold,hot:gHot}};
}

function renderData(){dataHub();}
function addList(k){const el=$('add_'+k),v=el.value.trim();if(v&&!L(k).includes(v)){L(k).push(v);save();renderData();}}
function rmList(k,v){S.lists[k]=L(k).filter(x=>x!==v);save();renderData();}
function addStreamer(){const v=$('add_str').value.trim();if(v&&!S.streamers.includes(v)){S.streamers.push(v);save();renderData();}}
function rmStreamer(v){S.streamers=S.streamers.filter(x=>x!==v);save();renderData();}
function parseCSV(text){const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim().length);
 const pl=l=>{const out=[];let cur='',q=false;for(let i=0;i<l.length;i++){const c=l[i];if(q){if(c=='"'){if(l[i+1]=='"'){cur+='"';i++;}else q=false;}else cur+=c;}else{if(c=='"')q=true;else if(c==','||c=='\t'){out.push(cur);cur='';}else cur+=c;}}out.push(cur);return out.map(x=>x.trim());};
 const rows=lines.map(pl);const columns=rows.shift()||[];return{columns,rows};}
function downloadChecklistTemplate(){csvDL('element10_checklist_template.csv',[['Card Name','Card Number','Set','Rarity','Market Value'],['Charizard ex','006/197','Ascended Heroes','Special Illustration Rare','260'],['Pikachu','025/165','Pokémon 151','Common','2']]);toast('Template downloaded — keep the header row, then upload');}
function validateChecklist(p){const idx=rx=>p.columns.findIndex(c=>new RegExp(rx,'i').test(c));
 const ni=idx('card ?name|^name$|name|title|card'),vi=idx('value|market|price');
 const missing=[];if(ni<0)missing.push('Card Name');
 const errors=[],valid=[];
 p.rows.forEach((rw,i)=>{if(rw.every(c=>!(''+(c==null?'':c)).trim()))return;const rn=i+2,er=[];
   const name=(ni>=0?(rw[ni]||''):'').trim();if(!name)er.push(['Card Name','Card Name is required']);
   if(vi>=0&&(rw[vi]||'').trim()){const v=(rw[vi]||'').trim();const clean=v.replace(/[^0-9.]/g,'');if(clean===''||isNaN(parseFloat(clean)))er.push(['Market Value',`"${v}" is not a number`]);}
   if(er.length)er.forEach(([c,m])=>errors.push({row:rn,col:c,msg:m}));else valid.push(rw);
 });
 return {missing,errors,valid,columns:p.columns};
}
function uploadChecklist(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const p=parseCSV(e.target.result);const res=validateChecklist(p);
 if(res.missing.length){importReport('Checklist upload',`Missing required column(s): ${res.missing.join(', ')}. Download the checklist template and keep its header row.`,null,null);return;}
 const commit=rows=>{S.checklists.push({name:f.name,columns:res.columns,rows});save();renderData();toast('Checklist added ('+rows.length+' rows)');};
 if(res.errors.length){importReport('Checklist upload',null,res.errors,res.valid.length?function(){commit(res.valid);}:null);return;}
 if(!res.valid.length){importReport('Checklist upload','No data rows found in the file.',null,null);return;}
 commit(res.valid);
};r.readAsText(f);inp.value='';}
function populateFromChecklist(i){const cl=S.checklists[i];const col=$('clcol_'+i).value,tgt=$('cltgt_'+i).value;const ci=cl.columns.indexOf(col);
 const vals=[...new Set(cl.rows.map(r=>r[ci]).filter(v=>v&&v.trim()))];if(!vals.length){toast('No values in that column');return;}
 S.lists[tgt]=[...new Set([...L(tgt),...vals])];save();renderData();toast(vals.length+' values → '+tgt);}
function uploadAttach(inp){const f=inp.files[0];if(!f)return;const big=f.size>1200000;const r=new FileReader();
 r.onload=e=>{S.attachments.push({name:f.name,type:f.type,size:f.size,data:big?null:e.target.result});save();renderData();if(big)toast('Large file — stored as reference only');};
 if(big)r.onload({target:{result:null}});else r.readAsDataURL(f);inp.value='';}

function svgBars(entries){if(!entries.length)return '<div style="color:var(--mut);font-size:13px">No inventory yet.</div>';
 const max=Math.max(...entries.map(e=>e.value),1),bw=230,h=entries.length*30+8;let s=`<svg viewBox="0 0 440 ${h}" width="100%" style="max-width:470px">`;
 entries.forEach((e,i)=>{const y=i*30+6,w=Math.max(2,e.value/max*bw);s+=`<text x="0" y="${y+15}" font-size="12" fill="#6b6d73" font-family="'Inter',sans-serif">${esc(e.label)}</text><rect x="140" y="${y+4}" width="${w}" height="15" rx="4" fill="#0A0B0D"></rect><text x="${146+w}" y="${y+16}" font-size="11" fill="#0A0B0D" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace">${money(e.value)}</text>`;});
 return s+`</svg>`;}
function svgSpark(){const base=invTotals().val||1000,pts=[];for(let i=0;i<12;i++)pts.push(base*(0.92+0.16*Math.sin(i/2)+i/60));
 const max=Math.max(...pts),min=Math.min(...pts),W=440,H=90;const path=pts.map((p,i)=>`${(i/(pts.length-1)*W).toFixed(0)},${(H-((p-min)/(max-min||1))*(H-14)-6).toFixed(0)}`).join(' ');
 return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:470px"><polyline points="${path}" fill="none" stroke="#1F5EFF" stroke-width="2" stroke-dasharray="5 4"/></svg><div class="lab" style="margin-top:6px;color:var(--red)">⚠ Illustrative sample — not live data. Connect a price source (TCGplayer / PriceCharting) to populate.</div>`;}

function ownerOpts(sel){let opts=`<option value="">Universal / unassigned</option>`;const emails=MEMBERS.map(m=>m.email);if(sel&&!emails.includes(sel))opts+=`<option value="${esc(sel)}" selected>${esc(sel)}</option>`;opts+=MEMBERS.map(m=>`<option value="${esc(m.email)}" ${m.email===sel?'selected':''}>${esc(m.display_name||m.email)}</option>`).join('');return opts;}
function invRollup(){let cost=0,market=0,committed=0,free=0,aging=0;invView().forEach(i=>{const q=+i.qty||0,v=+i.value||0,c=+i.cost||0;cost+=c*q;market+=v*q;committed+=v*invReserved(i);free+=v*invAvailable(i);if(invAge(i)>30&&invAvailable(i)>0)aging+=v*q;});return{cost,market,gain:market-cost,committed,free,aging};}
function invRows(){let rows=invView();const q=invSearch.trim().toLowerCase();
 if(q)rows=rows.filter(i=>(i.name||'').toLowerCase().includes(q));
 if(invCatF)rows=rows.filter(i=>i.cat===invCatF);
 if(invSetF)rows=rows.filter(i=>(i.set||'')===invSetF);
 if(invStatusF==='onhand')rows=rows.filter(i=>(+i.qty||0)>0);
 else if(invStatusF==='sold')rows=rows.filter(i=>(+i.soldQty||0)>0);
 else if(invStatusF==='free')rows=rows.filter(i=>invAvailable(i)>0);
 else if(invStatusF==='reserved')rows=rows.filter(i=>invReserved(i)>0);
 const c=invSort.col,d=invSort.dir,key=i=>c==='name'?(i.name||'').toLowerCase():c==='onhand'?invAvailable(i):c==='cost'?(+i.cost||0):c==='market'?(+i.value||0):c==='gain'?((+i.value||0)-(+i.cost||0))*(+i.qty||1):c==='age'?invAge(i):0;
 return rows.slice().sort((a,b)=>{const ka=key(a),kb=key(b);return (ka<kb?-1:ka>kb?1:0)*d;});}

/* Buy list: aggregate demand BY SET across scheduled shows (break-model allocations + manual
   needs) vs free-to-break supply. Driven by real shows + real inventory, not a placeholder. */
function buyListHTML(){
 const demand={};const bump=(set,qty,showLabel,unitCost)=>{set=set||'(unspecified)';const d=demand[set]||(demand[set]={qty:0,shows:new Set(),cost:0,costN:0});d.qty+=qty;if(showLabel)d.shows.add(showLabel);if(unitCost>0){d.cost+=unitCost*qty;d.costN+=qty;}};
 const setOfItem=id=>{const it=S.inventory.find(x=>x.id===id);return it?it.set:null;};
 allShows().forEach(x=>{const r=showByRef(x.k+'|||'+x.i);if(!r)return;const s=r.s,label=(s.name||'Untitled');
   (s.inventoryAlloc||[]).forEach(a=>bump(setOfItem(a.itemId)||a.set,+a.qty||1,label,+a.cost||0));
   (s.needs||[]).forEach(n=>bump(n.set,+n.qty||1,label,+n.approxCost||0));});
 const names=Object.keys(demand);
 if(!names.length)return `<div class="card" style="margin-top:16px"><h3 style="font-size:15px">Buy list from the schedule</h3><div class="lab" style="margin-top:8px;text-transform:none;letter-spacing:0">No demand yet. Attach a break model to a show (Break Calculator → attach to show) or add a “needs” line in a show’s detail, and this fills with exactly what to buy.</div></div>`;
 const freeOf=set=>S.inventory.filter(i=>(i.set||'(unspecified)')===set).reduce((a,i)=>a+invAvailable(i),0);
 const avgCostOf=set=>{const arr=S.inventory.filter(i=>(i.set||'(unspecified)')===set&&(+i.cost||0)>0);return arr.length?arr.reduce((a,i)=>a+(+i.cost||0),0)/arr.length:0;};
 let projected=0;
 const rows=names.sort().map(set=>{const d=demand[set],free=freeOf(set),gap=d.qty-free,unit=d.costN?(d.cost/d.costN):avgCostOf(set),order=gap>0?Math.round(gap*unit):0;projected+=order;
   const pills=[...d.shows].map(l=>`<span class="pill" style="margin:1px">${esc(l)}</span>`).join('');
   return `<tr><td><b>${esc(set)}</b></td><td>${pills}</td><td class="mono">${d.qty}</td><td class="mono">${free}</td><td class="mono" style="color:${gap>0?'var(--red)':'#0a8a4a'}">${gap>0?('-'+gap):'covered'}</td><td class="mono">${gap>0?('~'+money(order)):'—'}</td></tr>`;}).join('');
 return `<div class="card" style="margin-top:16px"><h3 style="font-size:15px">Buy list from the schedule</h3>
   <div class="sub" style="color:var(--mut);font-size:12.5px;margin:4px 0 10px">What upcoming shows need (break-model allocations + manual needs) vs what’s free to break, by set.</div>
   <div style="overflow:auto"><table><tr><th>Set / product</th><th>Needed by</th><th>Demand</th><th>Free</th><th>Gap</th><th>~Order</th></tr>${rows}</table></div>
   <div class="row" style="justify-content:flex-end;margin-top:8px"><b>Projected order: ~${money(projected)}</b></div></div>`;}
function addInv(){const n=$('ivN').value.trim();if(!n)return;const owner=($('ivOwner')&&$('ivOwner').value!=='')?$('ivOwner').value:(ROLE==='admin'&&$('ivOwner')?null:ME);S.inventory.push({id:'i'+Date.now(),name:n,cat:$('ivC').value,set:$('ivS').value,qty:+$('ivQ').value||1,cost:+$('ivCo').value||0,value:+$('ivV').value||0,cond:$('ivG').value,img:$('ivImg').value,owner});save();dInventory();toast('Added');}
function delInv(id){S.inventory=S.inventory.filter(x=>x.id!==id);save();dInventory();}
function reassignInv(id,val){const it=S.inventory.find(x=>x.id===id);if(!it)return;it.owner=val||null;save();dInventory();toast('Reassigned to '+ownerName(it.owner));}
/* ---- Reservations & sold — app-enforced hard lock via cloudCommitShared ---- */
async function reserveUnits(itemId,showRef,qty){
 qty=Math.max(1,+qty||1);const r=showByRef(showRef);if(!r)return{ok:false,msg:'Pick a show'};
 const showId=r.s.id,showLabel=(r.s.name||'Untitled')+' · '+r.k.replace('|',' '),streamer=MEID,admin=ROLE==='admin';
 const res=await cloudCommitShared(base=>{
  const it=base.inventory.find(x=>x.id===itemId);if(!it)return{ok:false,msg:'Item not found'};
  const avail=Math.max(0,(+it.qty||0)-(it.reservations||[]).reduce((s,x)=>s+(+x.qty||0),0));
  if(!admin&&qty>avail)return{ok:false,msg:'Only '+avail+' free right now — reservation blocked'};
  if(!Array.isArray(it.reservations))it.reservations=[];
  const ex=it.reservations.find(x=>x.showId===showId&&x.streamerUid===streamer);
  if(ex)ex.qty+=qty;else it.reservations.push({showId,showLabel,streamerUid:streamer,qty});
  return{ok:true,msg:'Reserved '+qty+' → '+showLabel};});
 toast(res.ok?res.msg:('Reserve failed: '+res.msg));return res;

async function releaseReservation(itemId,showId,streamerUid){
 const admin=ROLE==='admin';
 const res=await cloudCommitShared(base=>{
  const it=base.inventory.find(x=>x.id===itemId);if(!it)return{ok:false,msg:'Item not found'};
  const arr=it.reservations||[];const j=arr.findIndex(x=>x.showId===showId&&x.streamerUid===streamerUid);
  if(j<0)return{ok:false,msg:'Reservation already gone'};
  if(!admin&&arr[j].streamerUid!==MEID)return{ok:false,msg:'Only the streamer who reserved it (or an admin) can release it'};
  arr.splice(j,1);return{ok:true,msg:'Released'};});
 toast(res.ok?res.msg:('Release failed: '+res.msg));return res;
}
async function markSold(itemId,sellQty,proceeds){
 sellQty=Math.max(1,+sellQty||1);proceeds=Math.max(0,+proceeds||0);const admin=ROLE==='admin';
 const res=await cloudCommitShared(base=>{
  const it=base.inventory.find(x=>x.id===itemId);if(!it)return{ok:false,msg:'Item not found'};
  const reserved=(it.reservations||[]).reduce((s,x)=>s+(+x.qty||0),0);const avail=Math.max(0,(+it.qty||0)-reserved);
  if(!admin&&sellQty>avail)return{ok:false,msg:'Only '+avail+' free to sell (rest reserved)'};
  const n=admin?Math.min(sellQty,+it.qty||0):Math.min(sellQty,avail);
  if(n<=0)return{ok:false,msg:'Nothing available to sell'};
  it.qty=(+it.qty||0)-n;it.soldQty=(+it.soldQty||0)+n;it.soldProceeds=(+it.soldProceeds||0)+proceeds;it.soldAt=Date.now();
  return{ok:true,msg:'Sold '+n+' · +'+money(proceeds)};});
 toast(res.ok?res.msg:('Sell failed: '+res.msg));return res;
}

function validateInv(p){const idx=rx=>p.columns.findIndex(c=>new RegExp(rx,'i').test(c));
 const ni=idx('name|title|card|product'),ci=idx('categor|type'),si=idx('^set'),qi=idx('qty|quantity'),coi=idx('cost|paid'),vi=idx('value|market|price'),gi=idx('cond|grade'),imi=idx('image|img|url'),oi=idx('owner|assigned|streamer');
 const missing=[];if(ni<0)missing.push('Name');
 const errors=[],valid=[];
 p.rows.forEach((rw,i)=>{if(rw.every(c=>!(''+(c==null?'':c)).trim()))return;const rn=i+2,er=[];
   const name=(ni>=0?(rw[ni]||''):'').trim();if(!name)er.push(['Name','Name is required']);
   let cat='Other';if(ci>=0&&(rw[ci]||'').trim()){const c=(rw[ci]||'').trim();const m=INVCATS.find(x=>x.toLowerCase()===c.toLowerCase());if(!m)er.push(['Category',`"${c}" must be one of: ${INVCATS.join(', ')}`]);else cat=m;}
   let qty=1;if(qi>=0&&(rw[qi]||'').trim()){const q=(rw[qi]||'').trim();if(!/^\d+$/.test(q))er.push(['Qty',`"${q}" must be a whole number`]);else qty=+q;}
   const num=(ix,lab)=>{if(ix<0)return 0;const v=(rw[ix]||'').toString().trim();if(!v)return 0;const clean=v.replace(/[^0-9.\-]/g,'');if(clean===''||isNaN(parseFloat(clean))){er.push([lab,`"${v}" is not a number`]);return 0;}return parseFloat(clean);};
   const cost=num(coi,'Unit Cost'),value=num(vi,'Market Value');
   const img=imi>=0?(rw[imi]||'').trim():'';if(img&&!/^https?:\/\//i.test(img))er.push(['Image URL','must start with http:// or https://']);
   const owner=(oi>=0&&(rw[oi]||'').trim())?(rw[oi]||'').trim():ME;
   if(er.length)er.forEach(([c,m])=>errors.push({row:rn,col:c,msg:m}));
   else valid.push({id:'i'+Date.now()+i,name,cat,set:si>=0?(rw[si]||'').trim():'',qty,cost,value,cond:gi>=0?(rw[gi]||'').trim():'',img,owner});
 });
 return {missing,errors,valid};
}
function importInv(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const p=parseCSV(e.target.result);const res=validateInv(p);
 if(res.missing.length){importReport('Inventory import',`Missing required column(s): ${res.missing.join(', ')}. Download the CSV template and keep its header row.`,null,null);return;}
 if(res.errors.length){importReport('Inventory import',null,res.errors,res.valid.length?function(){res.valid.forEach(it=>S.inventory.push(it));save();dInventory();toast(res.valid.length+' valid row(s) imported');}:null);return;}
 if(!res.valid.length){importReport('Inventory import','No data rows found in the file.',null,null);return;}
 res.valid.forEach(it=>S.inventory.push(it));save();dInventory();toast(res.valid.length+' items imported');
};r.readAsText(f);inp.value='';}

function rollRandom(p){const pool=(p.pool||[]).filter(c=>c.name);const n=Math.max(1,p.count||5);const out=[];if(!pool.length)return out;
 for(let k=0;k<n;k++){const tot=pool.reduce((s,c)=>s+(+c.weight||1),0);let r=Math.random()*tot,pick=pool[0];for(const c of pool){r-=(+c.weight||1);if(r<=0){pick=c;break;}}out.push(pick);}return out;}
function launchOpen(id){const p=(S.repacks||[]).find(x=>x.id===id);if(!p)return;const cards=(p.mode==='random'?rollRandom(p):(p.cards||[]).slice()).filter(c=>c&&c.name);
 if(!cards.length){toast('Add cards first');return;}
 try{localStorage.setItem('e10_open',JSON.stringify({product:{name:p.name,kind:p.kind,price:p.price,chase:p.chase},cards}));}catch(e){toast('Could not stage opener');return;}

function pickImage(cb){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.onchange=()=>{if(inp.files&&inp.files[0])e10Upload(inp.files[0],cb);};inp.click();}
function resizeImg(file){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>{const max=1200;let w=img.width,h=img.height;if(w>max||h>max){const s=Math.min(max/w,max/h);w=Math.round(w*s);h=Math.round(h*s);}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);c.toBlob(b=>b?res(b):rej('blob'),'image/jpeg',0.85);};img.onerror=()=>rej('img');img.src=URL.createObjectURL(file);});}
async function e10Upload(file,cb){if(!sb){toast('Not connected');return;}toast('Uploading image…');try{let blob;try{blob=await resizeImg(file);}catch(e){blob=file;}const path='card/'+Date.now()+'_'+Math.random().toString(36).slice(2)+'.jpg';const{error}=await sb.storage.from('cards').upload(path,blob,{contentType:'image/jpeg',upsert:false});if(error){toast('Upload failed: '+error.message);return;}const{data}=sb.storage.from('cards').getPublicUrl(path);cb(data.publicUrl);toast('Image uploaded');}catch(e){toast('Upload error');}}

async function doCloudWrite(){_st=null;

/* Reservation-critical writes go through a read-modify-write on the shared row: re-read the latest
   'shared' JSONB, recompute availability against it, apply the mutation, then upsert with rev+1 —
   merging so concurrent edits to other shared fields/items aren't clobbered. This lock is
   APPLICATION-ENFORCED, NOT database-guaranteed: any member can write the shared blob, so a truly
   simultaneous write could still race in the gap between read and write. Acceptable at this team
   size; real enforcement is the future per-entity table migration (out of scope). mutate(base)
   mutates base.inventory and returns {ok,msg}. */
async function cloudCommitShared(mutate){
 if(!sb)return{ok:false,msg:'Not connected'};
 /* Flush any pending debounced write first, so the fresh read includes local edits that haven't
    been persisted yet (e.g. an item just added) — otherwise the read-modify-write can't see them
    and adopting the cloud base would drop them. */
 if(_st){clearTimeout(_st);_st=null;try{await doCloudWrite();}catch(e){}}
 let fresh=null;try{fresh=await fetchRow('shared');}catch(e){return{ok:false,msg:'Network error'};}
 const base=(fresh&&fresh.data&&Object.keys(fresh.data).length)?splitLegacy(fresh.data).sh:blankShared();normShared(base);
 let res;try{res=mutate(base);}catch(e){return{ok:false,msg:e.message||'error'};}
 if(!res||!res.ok)return res||{ok:false,msg:'Rejected'};
 const payload={comments:base.comments,todos:base.todos,streamers:base.streamers,lists:base.lists,attachments:base.attachments,checklists:base.checklists,inventory:base.inventory,repacks:base.repacks};
 const rev=((fresh&&fresh.rev)||REVS['shared']||0)+1;REVS['shared']=rev;
 const{error}=await sb.from('e10_workspace').upsert({id:'shared',data:payload,rev,owner:null,updated_by:ME,updated_at:new Date().toISOString()});
 if(error)return{ok:false,msg:error.message};
 _applyingRemote=true;SHARED=base;_lastShared=JSON.stringify(payload);rebuildS();_applyingRemote=false;safeRender();
 return{ok:true,msg:res.msg};
}

 let opts=`<option value="mine">My space</option><option value="universal">Universal</option>`;
 if(ROLE==='admin')opts+=MEMBERS.filter(m=>m.user_id!==MEID).map(m=>`<option value="${m.user_id}">${esc(m.display_name||m.email)}’s space</option>`).join('');
 el.innerHTML=`<div style="display:flex;align-items:center;gap:6px"><span class="lab" style="font-size:11px">Viewing</span><select id="scopeSel" style="padding:6px 9px;font-size:12.5px;max-width:170px" onchange="setScope(this.value)">${opts}</select>${canEditScoped()?'':'<span class="pill" style="margin:0">read-only</span>'}</div><div class="lab" style="font-size:9.5px;max-width:250px;text-align:right;line-height:1.25;text-transform:none;letter-spacing:0">My space = your personal schedules, breaks &amp; dashboards. Universal = the team baseline everyone sees.</div>`;
 const sel=$('scopeSel');if(sel)sel.value=SCOPE;}

function subscribeRealtime(){sb.channel('e10ws').on('postgres_changes',{event:'*',schema:'public',table:'e10_workspace'},p=>{const n=p.new;if(!n||!n.id)return;
 if(n.id==='shared'&&(n.rev||0)>(REVS['shared']||0)){REVS['shared']=n.rev;_applyingRemote=true;SHARED=n.data&&Object.keys(n.data).length?splitLegacy(n.data).sh:blankShared();normShared(SHARED);_lastShared=null;rebuildS();safeRender();_applyingRemote=false;if(n.updated_by&&n.updated_by!==ME)toast('Team update by '+n.updated_by);}
 else if(n.id===SCOPED_ID&&(n.rev||0)>(REVS[SCOPED_ID]||0)){REVS[SCOPED_ID]=n.rev;_applyingRemote=true;SCOPED=n.data&&Object.keys(n.data).length?splitLegacy(n.data).sc:blankScoped();normScoped(SCOPED);_lastScoped=null;rebuildS();safeRender();_applyingRemote=false;if(n.updated_by&&n.updated_by!==ME)toast('Update by '+n.updated_by);}
}).subscribe();}

async function loadAll(){
 try{await sb.from('e10_members').upsert({user_id:MEID,email:ME},{onConflict:'user_id',ignoreDuplicates:true});}catch(e){}
 try{const me=await sb.from('e10_members').select('role').eq('user_id',MEID).maybeSingle();ROLE=(me.data&&me.data.role)||'member';}catch(e){ROLE='member';}
 try{const mem=await sb.from('e10_members').select('user_id,email,display_name,role');MEMBERS=mem.data||[];}catch(e){MEMBERS=[];}
 const sh=await fetchRow('shared');REVS['shared']=sh?(sh.rev||0):0;SHARED=sh&&sh.data&&Object.keys(sh.data).length?splitLegacy(sh.data).sh:blankShared();normShared(SHARED);
 if(!sh||!sh.data||!Object.keys(sh.data).length)await writeRow('shared',null,SHARED);
 if(SCOPE!=='mine'&&SCOPE!=='universal'&&ROLE!=='admin')SCOPE='mine';
 await loadScopedFor(SCOPE);rebuildS();subscribeRealtime();}
renderWho=function(){if($('who'))$('who').innerHTML=`<button class="btn sm" onclick="signOut()">\u{1F464} ${esc(ME||'')}${ROLE==='admin'?' · admin':''} · sign out</button>`;};
function signOut(){sb.auth.signOut().then(()=>location.reload());}
function authScreen(msg){document.body.innerHTML=`<div style="max-width:380px;margin:12vh auto;padding:24px;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
 <div style="font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;font-weight:700;font-size:32px;text-transform:uppercase;letter-spacing:.04em">ELEMENT<span style="background:#C6FF3A;padding:0 8px;border-radius:6px">10</span></div>
 <div style="color:#6b6d73;margin:8px 0 22px">Team command center — sign in to continue.</div>
 <label style="font-size:12px;color:#6b6d73">Email</label><input id="auEmail" type="email" style="width:100%;padding:11px;border:1px solid #e4e2da;border-radius:8px;margin:4px 0 10px">
 <label style="font-size:12px;color:#6b6d73">Password</label><input id="auPass" type="password" style="width:100%;padding:11px;border:1px solid #e4e2da;border-radius:8px;margin:4px 0 16px">
 <button onclick="doLogin()" style="width:100%;padding:11px;border-radius:999px;border:none;background:#C6FF3A;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit">Sign in</button>
 <button onclick="doSignup()" style="width:100%;padding:11px;border-radius:999px;border:1px solid #0A0B0D;background:none;cursor:pointer;font-family:inherit">Create account</button>
 <div id="auMsg" style="color:#E8332B;font-size:13px;margin-top:12px">${msg||''}</div></div>`;}
async function doLogin(){const email=document.getElementById('auEmail').value.trim(),password=document.getElementById('auPass').value;const{error}=await sb.auth.signInWithPassword({email,password});if(error)document.getElementById('auMsg').textContent=error.message;else location.reload();}
async function doSignup(){const email=document.getElementById('auEmail').value.trim(),password=document.getElementById('auPass').value;if(password.length<6){document.getElementById('auMsg').textContent='Password must be 6+ characters';return;}const{data,error}=await sb.auth.signUp({email,password});if(error){document.getElementById('auMsg').textContent=error.message;}else if(data.session){location.reload();}else{const m=document.getElementById('auMsg');m.style.color='#0A0B0D';m.textContent='Account created — check your email to confirm, then sign in. (Admin can disable confirmation for instant access.)';}}
async function boot(){if(!window.supabase){authScreen('Auth library failed to load (check connection).');return;}
 sb=window.supabase.createClient(SB_URL,SB_KEY);
 const{data:{session}}=await sb.auth.getSession();
 if(!session){authScreen('');return;}
 ME=session.user.email;MEID=session.user.id;S.user=ME;
 await loadAll();renderWho();renderScopebar();currentRender();}
/* ========== LIVE BREAK SESSION — streamer control panel ========== */
let LIVE={session:null,slots:[],chan:null};
async function renderLive(){
 if(!sb){$('sec-live').innerHTML='<div class="card">Connecting…</div>';return;}
 if(!LIVE.session)await liveLoadActive();
 $('sec-live').innerHTML=LIVE.session?liveActiveHTML():liveStartHTML();
}
async function liveLoadActive(){
 try{const{data}=await sb.from('e10_break_sessions').select('*').eq('streamer_uid',MEID).eq('status','active').order('created_at',{ascending:false}).limit(1);
  if(data&&data[0]){LIVE.session=data[0];await liveLoadSlots();liveSubscribe();}}catch(e){}
}
async function liveLoadSlots(){try{const{data}=await sb.from('e10_break_slots').select('*').eq('session_id',LIVE.session.id).order('position');LIVE.slots=data||[];}catch(e){LIVE.slots=[];}}
async function liveEvent(type,slot_id,payload){try{await sb.from('e10_break_events').insert({session_id:LIVE.session.id,slot_id:slot_id||null,type,payload:payload||{},actor_uid:MEID});}catch(e){console.warn('event',e.message);}}
function liveSubscribe(){if(!LIVE.session)return;if(LIVE.chan)sb.removeChannel(LIVE.chan);
 LIVE.chan=sb.channel('live_'+LIVE.session.id)
  .on('postgres_changes',{event:'*',schema:'public',table:'e10_break_slots',filter:'session_id=eq.'+LIVE.session.id},()=>liveRefresh())
  .on('postgres_changes',{event:'*',schema:'public',table:'e10_break_sessions',filter:'id=eq.'+LIVE.session.id},p=>{if(p.new){LIVE.session=p.new;liveRefreshRender();}})
  .subscribe();}
async function liveRefresh(){if(!LIVE.session)return;await liveLoadSlots();liveRefreshRender();}
function liveRefreshRender(){if($('sec-live').classList.contains('on')&&!isEditing())renderLive();}
async function liveStart(){const name=($('liveName')&&$('liveName').value.trim())||'Live Break';const mi=$('liveModel')?$('liveModel').value:'';
 const seedModel=(LIVE_SEED&&LIVE_SEED.model)||((mi!==''&&S.breaks[+mi])?S.breaks[+mi]:null);
 const{data,error}=await sb.from('e10_break_sessions').insert({streamer_uid:MEID,name}).select().maybeSingle();
 if(error){toast('Could not start: '+error.message);return;}
 LIVE.session=data;LIVE.slots=[];await liveEvent('session_started',null,{name});
 if(seedModel){const rows=(seedModel.rows&&seedModel.rows.length)?seedModel.rows:null;
   const n=rows?rows.length:Math.max(1,+seedModel.slots||1);
   for(let i=0;i<n;i++){const label=rows?(rows[i].label||('Spot '+(i+1))):('Spot '+(i+1));
     try{const{data:sl}=await sb.from('e10_break_slots').insert({session_id:LIVE.session.id,label,position:i}).select().maybeSingle();if(sl)LIVE.slots.push(sl);}catch(e){}}}
 LIVE_SEED=null;liveSubscribe();renderLive();toast('Live break started'+(seedModel?' — seeded '+LIVE.slots.length+' spots':''));
}
async function liveEnd(){if(!LIVE.session||!confirm('End this live break session?'))return;
 try{await sb.from('e10_break_sessions').update({status:'ended',ended_at:new Date().toISOString()}).eq('id',LIVE.session.id);await liveEvent('session_ended',null,{});}catch(e){}
 if(LIVE.chan){sb.removeChannel(LIVE.chan);LIVE.chan=null;}LIVE.session=null;LIVE.slots=[];renderLive();toast('Session ended');
}
async function liveAddSlot(){if(!LIVE.session)return;const label=($('slotLabel')&&$('slotLabel').value.trim())||'';const pos=LIVE.slots.length;
 const{data,error}=await sb.from('e10_break_slots').insert({session_id:LIVE.session.id,label:label||('Spot '+(pos+1)),position:pos}).select().maybeSingle();
 if(error){toast(error.message);return;}LIVE.slots.push(data);await liveEvent('assigned',data.id,{label:data.label});renderLive();
}
async function liveAssign(id){const sl=LIVE.slots.find(x=>x.id===id);if(!sl)return;
 const label=$('al_'+id)?$('al_'+id).value.trim():sl.label;const handle=$('ah_'+id)?$('ah_'+id).value.trim():sl.buyer_handle;
 try{await sb.from('e10_break_slots').update({label,buyer_handle:handle||null,updated_at:new Date().toISOString()}).eq('id',id);}catch(e){toast(e.message);return;}
 sl.label=label;sl.buyer_handle=handle;await liveEvent('assigned',id,{label,buyer_handle:handle});toast('Spot saved');renderLive();
}
async function liveSlotState(id,state){const sl=LIVE.slots.find(x=>x.id===id);if(!sl)return;
 try{await sb.from('e10_break_slots').update({state,updated_at:new Date().toISOString()}).eq('id',id);}catch(e){toast(e.message);return;}
 sl.state=state;await liveEvent(state==='sold'?'spot_sold':'spot_released',id,{label:sl.label,state});renderLive();
}
async function liveSlotCaseHit(id){const sl=LIVE.slots.find(x=>x.id===id);if(!sl)return;const v=!sl.case_hit;
 try{await sb.from('e10_break_slots').update({case_hit:v}).eq('id',id);}catch(e){toast(e.message);return;}
 sl.case_hit=v;await liveEvent('case_hit',id,{case_hit:v,label:sl.label,scope:'slot'});renderLive();
}
async function liveDelSlot(id){try{await sb.from('e10_break_slots').delete().eq('id',id);}catch(e){}LIVE.slots=LIVE.slots.filter(x=>x.id!==id);renderLive();}
async function liveToggleStash(){if(!LIVE.session)return;const v=!LIVE.session.stash_or_pass;
 try{await sb.from('e10_break_sessions').update({stash_or_pass:v}).eq('id',LIVE.session.id);}catch(e){toast(e.message);return;}
 LIVE.session.stash_or_pass=v;await liveEvent('stash_toggled',null,{stash_or_pass:v});renderLive();
}
async function liveCaseHit(){if(!LIVE.session)return;const v=!LIVE.session.case_hit;
 try{await sb.from('e10_break_sessions').update({case_hit:v}).eq('id',LIVE.session.id);}catch(e){toast(e.message);return;}
 LIVE.session.case_hit=v;await liveEvent('case_hit',null,{case_hit:v,scope:'session'});renderLive();
}
function liveDirUrl(){return location.href.replace(/[?#].*$/,'').replace(/\/[^\/]*$/,'/');}
function liveStartHTML(){const models=(S.breaks||[]);const seed=LIVE_SEED;const defName=(seed&&seed.show)?(seed.show+' — live break'):'';
 return `<div class="hero"><div><h1>Live Break</h1><div class="sub">Run a live break — spots, stash-or-pass &amp; case hits push straight to your OBS overlay and viewers' companion.</div></div></div>
 <div class="card" style="max-width:560px"><h3 style="font-size:15px">Start a session</h3>
  ${seed?`<div class="out" style="margin-top:10px">Seeding from show <b>${esc(seed.show||'')}</b>${seed.model?` · model <b>${esc(seed.model.name)}</b> (${seed.model.slots} slots)`:' · no model attached — add spots manually'}</div>`:''}
  <div style="margin-top:12px"><label>Session name</label><input id="liveName" value="${esc(defName)}" placeholder="e.g. Friday Ascended Heroes Case Break"></div>
  ${models.length?`<div style="margin-top:10px"><label>Seed spots from a saved break model (optional)</label><select id="liveModel"><option value="">— none (add spots manually) —</option>${models.map((m,i)=>`<option value="${i}">${esc(m.name)} · ${m.slots} spots</option>`).join('')}</select></div>`:''}
  <div class="row" style="margin-top:16px"><button class="btn v" onclick="liveStart()">▶ Start live break</button></div>
  <div class="lab" style="margin-top:10px">Only you (and admin) can control your sessions. Viewers see only the spots they're in.</div></div>`;
}
function liveActiveHTML(){const s=LIVE.session;const dir=liveDirUrl();const overlayUrl=dir+'overlay.html?code='+s.share_code;const companionUrl=dir+'companion.html';
 const sold=LIVE.slots.filter(x=>x.state==='sold').length,avail=LIVE.slots.filter(x=>x.state==='available').length;
 return `<div class="hero"><div><h1>${esc(s.name)}</h1><div class="sub">Live break in progress · share code <b class="mono">${esc(s.share_code)}</b></div></div><button class="btn x" onclick="liveEnd()">End session</button></div>
 <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-bottom:14px">
   <div class="metric"><div class="n">${LIVE.slots.length}</div><div class="l">Spots</div></div>
   <div class="metric"><div class="n">${sold}</div><div class="l">Sold</div></div>
   <div class="metric"><div class="n">${avail}</div><div class="l">Available</div></div></div>
 <div class="card" style="margin-bottom:14px"><div class="row" style="gap:10px;align-items:center;flex-wrap:wrap">
   <button class="btn ${s.stash_or_pass?'v':''}" onclick="liveToggleStash()">Stash-or-pass: <b>${s.stash_or_pass?'ON':'OFF'}</b></button>
   <button class="btn ${s.case_hit?'d':''}" onclick="liveCaseHit()">${s.case_hit?'🔥 CASE HIT — live':'Flag case hit'}</button>
   <span class="lab">These flip instantly on the overlay &amp; companion.</span></div></div>
 <div class="card" style="margin-bottom:14px"><h3 style="font-size:14px">Broadcast links</h3>
   <div class="row" style="margin-top:8px;gap:6px"><input value="${esc(overlayUrl)}" readonly style="flex:2;font-size:12px" onclick="this.select()"><button class="btn sm" onclick="copy('${esc(overlayUrl)}')">Copy OBS overlay link</button></div>
   <div class="row" style="margin-top:6px;gap:6px"><input value="${esc(companionUrl)}" readonly style="flex:2;font-size:12px" onclick="this.select()"><button class="btn sm" onclick="copy('${esc(companionUrl)}')">Copy viewer companion link</button></div>
   <div class="lab" style="margin-top:6px">Add the overlay as an OBS <b>Browser</b> source (transparent). Viewers open the companion, sign in, and link their Whatnot handle once.</div></div>
 <div class="card"><div class="row" style="justify-content:space-between"><h3 style="font-size:15px">Spots (${LIVE.slots.length})</h3></div>
   <div class="row" style="margin-top:8px;gap:6px"><input id="slotLabel" placeholder="Team / character (e.g. Charizard, Team 3)" style="flex:2" onkeydown="if(event.key==='Enter')liveAddSlot()"><button class="btn sm" onclick="liveAddSlot()">+ Add spot</button></div>
   <div style="overflow:auto;margin-top:10px"><table><tr><th>#</th><th>Team / label</th><th>Buyer (Whatnot)</th><th>State</th><th>Case</th><th></th></tr>
   ${LIVE.slots.map((sl,i)=>liveSlotRow(sl,i)).join('')||`<tr><td colspan="6" style="color:var(--mut)">No spots yet — add one above.</td></tr>`}</table></div></div>`;
}
function liveSlotRow(sl,i){const st=sl.state;
 return `<tr>
  <td class="mono">${i+1}</td>
  <td><input id="al_${sl.id}" value="${esc(sl.label||'')}" style="min-width:150px"></td>
  <td><input id="ah_${sl.id}" value="${esc(sl.buyer_handle||'')}" placeholder="@handle" style="width:130px"></td>
  <td><select onchange="liveSlotState('${sl.id}',this.value)">${['available','sold','held'].map(x=>`<option ${x===st?'selected':''}>${x}</option>`).join('')}</select></td>
  <td style="text-align:center"><button class="btn x" style="color:${sl.case_hit?'var(--red)':'var(--mut2)'}" onclick="liveSlotCaseHit('${sl.id}')">${sl.case_hit?'🔥':'○'}</button></td>
  <td><button class="btn sm" onclick="liveAssign('${sl.id}')">Save</button> <button class="btn x" onclick="liveDelSlot('${sl.id}')">✕</button></td></tr>`;
}
boot();
</script></body></html>
