<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Element 10 — Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf9f5;--surface:#ffffff;--surface2:#f0efea;--ink:#0A0B0D;--mut:#6b6d73;--mut2:#9a9a93;--line:#e4e2da;--volt:#C6FF3A;--blue:#1F5EFF;--red:#E8332B;--r:14px;--rp:999px;
--disp:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;--sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px}
/* CASING CONVENTION (source written clean; display cased by CSS):
   · Section/card titles h1/h2/h3 → UPPERCASE (CSS text-transform, consistent app-wide); source in Sentence case, no decorative emojis.
   · .lab helper/field labels → UPPERCASE (CSS); source Sentence case.
   · <label> field labels, <button> text, values → Sentence case, terse. Placeholders only when the input is non-obvious. */
h1,h2,h3{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.02em;margin:0}
.mono{font-family:var(--mono)}a{color:var(--blue);text-decoration:none;cursor:pointer}
header{display:flex;align-items:center;gap:22px;padding:16px 26px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#faf9f5f2;backdrop-filter:blur(6px);z-index:30}
.logo{font-family:var(--disp);font-weight:700;font-size:22px;letter-spacing:.04em}.logo b{background:var(--volt);padding:0 8px;border-radius:6px}
nav{display:flex;gap:6px;flex-wrap:wrap}
.tab{font-family:var(--sans);font-weight:500;font-size:13.5px;padding:8px 15px;border-radius:var(--rp);border:1px solid transparent;background:none;cursor:pointer;color:var(--mut)}
.tab:hover{background:var(--surface2);color:var(--ink)}.tab.on{background:var(--ink);color:#fff}
.subnav{display:flex;gap:6px;flex-wrap:wrap;padding:9px 26px;border-bottom:1px solid var(--line);background:var(--surface)}
.subnav .tab{font-size:13px}
.profmenu{position:absolute;right:0;top:calc(100% + 8px);min-width:252px;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 34px rgba(0,0,0,.16);padding:6px;z-index:100;text-align:left}
.pm-hd{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut2);padding:9px 10px 4px;font-weight:700}
.pm-item{padding:9px 11px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:var(--ink)}
.pm-item:hover{background:var(--surface2)}
.pm-sec+.pm-sec{border-top:1px solid var(--line);margin-top:4px;padding-top:2px}
.wrap{max-width:1180px;margin:0 auto;padding:26px}
.sec{display:none}.sec.on{display:block}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px}
.grid{display:grid;gap:16px}
.btn{font-family:var(--sans);font-weight:500;font-size:13.5px;padding:9px 16px;border-radius:var(--rp);border:1px solid var(--ink);background:none;color:var(--ink);cursor:pointer}
.btn:hover{background:var(--surface2)}.btn.v{background:var(--volt);border-color:var(--volt);font-weight:700}
.btn.d{background:var(--ink);color:#fff}.btn.sm{padding:6px 12px;font-size:12.5px}.btn.x{border:none;color:var(--red);padding:4px 8px;background:none}
input,select,textarea{font-family:var(--sans);font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--ink);width:100%}
textarea{resize:vertical;min-height:64px}
label{font-size:12px;color:var(--mut);font-weight:500;display:block;margin:0 0 4px}
.lab{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut2)}
.metric{background:var(--surface2);border-radius:var(--r);padding:16px}
.metric .n{font-family:var(--disp);font-weight:700;font-size:30px;line-height:1;letter-spacing:-.01em}.metric .l{font-size:12px;color:var(--mut);margin-top:6px}
.pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:var(--rp);background:var(--surface2);color:var(--mut);border:1px solid var(--line);margin:3px}
.pill.v{background:var(--volt);color:var(--ink);border-color:var(--volt)}
.acc{border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;overflow:hidden;background:var(--surface)}
.acc>.h{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;font-weight:500}
.acc>.h .chev{margin-left:auto;transition:.15s;color:var(--mut)}.acc.open>.h .chev{transform:rotate(90deg)}
.acc>.b{display:none;padding:0 18px 18px}.acc.open>.b{display:block}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.todo{display:flex;align-items:center;gap:11px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--surface)}
.todo.done{opacity:.5}.todo.done .t{text-decoration:line-through}
.todo input[type=checkbox]{width:18px;height:18px;accent-color:var(--volt);flex:none}
.todo .grip{cursor:grab;color:var(--mut2);flex:none}.todo .t{flex:1;cursor:pointer}.todo .t:hover{color:var(--blue)}
.todo .badge{font-family:var(--mono);font-size:10px;color:var(--mut2)}
.todo.dover{border-color:var(--ink)}
.cmt{padding:10px 12px;border-left:3px solid var(--volt);background:var(--surface2);border-radius:0 10px 10px 0;margin-bottom:9px;font-size:13.5px}
.cmt .who{font-family:var(--mono);font-size:11px;color:var(--mut)}
.sgrid{display:grid;grid-template-columns:88px repeat(7,1fr);gap:6px;min-width:820px}
.sgrid .hd{font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--mut);text-align:center;padding:6px 0;letter-spacing:.05em}
.sgrid .dp{font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--mut);display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding-right:8px;text-align:right}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;min-width:760px}
.mgrid .mhd{font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--mut);text-align:center;padding:4px 0;letter-spacing:.05em}
.mcell{background:var(--surface);border:1px solid var(--line);border-radius:8px;min-height:92px;padding:6px}
.mcell.empty{background:transparent;border:none}
.mcell.today{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink)}
.mcell .mday{font-family:var(--mono);font-size:11px;color:var(--mut);font-weight:700;margin-bottom:4px}
.mcell .mshow{background:var(--ink);color:#fff;border-radius:6px;padding:3px 6px;margin-bottom:3px;cursor:pointer;font-size:11px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell{background:var(--surface);border:1px solid var(--line);border-radius:10px;min-height:70px;padding:6px}
.cell.peak{background:#f7fce9;border-color:#e4f3bf}.cell.dover{border-color:var(--ink)}
.show{background:var(--ink);color:#fff;border-radius:8px;padding:7px 8px;margin-bottom:5px;cursor:grab;font-size:11.5px;line-height:1.3}
.show .nm{font-weight:500}.show .mt{font-family:var(--mono);font-size:10px;color:var(--volt);margin-top:2px}
.show .rdy{display:flex;align-items:center;gap:4px;margin-top:4px}
.show .rdy .d{width:7px;height:7px;border-radius:50%;flex:none;opacity:.9}
.show .rdy .d.copy{background:#4f7cff}.show .rdy .d.brk{background:var(--volt)}.show .rdy .d.inv{background:#3ad13a}
.show .rdy .ok{font-family:var(--mono);font-size:8.5px;letter-spacing:.04em;color:#0a0b0d;background:var(--volt);border-radius:3px;padding:0 4px;margin-left:auto}
.addc{color:var(--mut2);font-size:11px;cursor:pointer;text-align:center}.addc:hover{color:var(--ink)}
.out{background:var(--surface2);border-radius:10px;padding:12px 14px;margin-top:8px;font-size:13.5px;line-height:1.5;position:relative}
.out .cp{position:absolute;right:8px;top:8px}
table{border-collapse:collapse;width:100%;font-size:13px}
th{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
td{padding:8px 10px;border-bottom:1px solid var(--line)}
.tierS{color:var(--red);font-weight:700}.tierA{color:var(--blue);font-weight:700}.tierB{color:#0a8a4a;font-weight:700}.tierC{color:var(--mut);font-weight:700}
/* ── shared data-grid: framed, ruled, zebra (built from the app's own tokens) ── */
.egrid{border:0.5px solid var(--line);border-radius:var(--r);overflow:auto;background:var(--surface)}
.egrid table{border-collapse:collapse;width:100%;font-size:13px}
.egrid.wide table{min-width:680px}
.egrid th{background:var(--surface2);border:0.5px solid var(--line);border-bottom:1.5px solid var(--line);white-space:nowrap;position:sticky;top:0;z-index:1}
.egrid td{border:0.5px solid var(--line);vertical-align:middle}
.egrid tr:nth-child(even) td{background:var(--bg)}
.egrid th.srt{cursor:pointer;user-select:none}
.colgrip{position:absolute;top:0;right:-2px;width:8px;height:100%;cursor:col-resize;user-select:none;z-index:4;touch-action:none}
.colgrip:hover{box-shadow:inset -3px 0 0 var(--mut2)}
.egrid th.srt .chev{color:var(--mut2);margin-left:5px;font-size:9px}
.egrid th.srt.on .chev{color:var(--ink)}
.egrid td .actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
/* ── per-column Excel-style filter row (shared grid engine) ── */
.egrid tr.gfilt th{background:var(--surface2);border-top:0;padding:3px 4px;font-weight:400}
.gflt-txt,.gflt-num{display:flex;gap:3px;align-items:center}
.gflt-txt input,.gflt-num input{min-width:0;width:100%;font-size:11px;padding:2px 4px}
.gflt-txt select,.gflt-num select,.gflt-pop .gflt-sum{font-size:11px;padding:2px 3px;max-width:52px;flex:0 0 auto}
.gflt-pop{position:relative}
.gflt-pop>summary{list-style:none;cursor:pointer;font-size:11px;padding:2px 6px;border:0.5px solid var(--line);border-radius:6px;background:var(--surface);white-space:nowrap}
.gflt-pop>summary::-webkit-details-marker{display:none}
.gflt-pop[open]>.gpop{position:absolute;left:0;top:100%;z-index:40;min-width:150px;max-height:240px;overflow:auto;background:var(--surface);border:0.5px solid var(--line);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.14);padding:8px}
.gflt-clr{cursor:pointer;color:var(--red);font-size:11px;margin-left:2px}
/* ── toolbar above a grid: bordered fields + segmented control ── */
.etool{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px}
.etool>div{display:flex;flex-direction:column}
.eseg{display:inline-flex;border:0.5px solid var(--line);border-radius:8px;overflow:hidden}
.eseg button{border:none;border-right:0.5px solid var(--line);background:var(--surface);color:var(--ink);font-family:var(--sans);font-weight:500;font-size:12.5px;padding:9px 14px;cursor:pointer}
.eseg button:last-child{border-right:none}
.eseg button:hover{background:var(--surface2)}
.eseg button.on{background:var(--ink);color:#fff}
details.gcfg{position:relative;display:inline-block}
details.gcfg>summary{list-style:none;cursor:pointer}details.gcfg>summary::-webkit-details-marker{display:none}
.gpop{position:absolute;z-index:60;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 26px rgba(0,0,0,.14);padding:10px;min-width:240px;max-height:360px;overflow:auto}
.gpop .grow{display:flex;align-items:center;gap:4px;font-size:12.5px;padding:2px 0}
.gpop .grow .btn.x.sm{padding:0 5px}
.ov{position:fixed;inset:0;background:#0008;display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
.modal{background:var(--surface);border-radius:var(--r);padding:22px;max-width:520px;width:100%;max-height:88vh;overflow:auto}
/* Pass 2.2 — inventory rows open their edit surface (scoped to #invListBox; no grid-engine change) */
#invListBox tbody tr:has(td[data-invid]){cursor:pointer}
#invListBox tbody tr:has(td[data-invid]):hover{background:rgba(0,0,0,.035)}
#invListBox td.ive-open:focus-visible{outline:2px solid #2563eb;outline-offset:-2px;border-radius:4px}
#iveDiscard{position:fixed;inset:0;z-index:70;background:#0006;display:flex;align-items:center;justify-content:center;padding:18px}
#iveDiscard .box{background:var(--surface);border-radius:var(--r);padding:20px;max-width:380px;width:100%;box-shadow:0 12px 40px #0007}
.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:14px}
.hero h1{font-size:38px}.hero .sub{color:var(--mut);font-size:13.5px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:var(--rp);font-size:13px;opacity:0;transition:.2s;z-index:80}.toast.on{opacity:1}
.foot{color:var(--mut2);font-size:11px;margin-top:26px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:780px){.split{grid-template-columns:1fr}}
.drop{border:1.5px dashed var(--line);border-radius:12px;padding:16px;text-align:center;color:var(--mut);font-size:13px;cursor:pointer}
.drop:hover{border-color:var(--ink);color:var(--ink)}
.filerow{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;font-size:13px;background:var(--surface)}
.filerow .nm{flex:1}.chipwrap{margin:8px 0}
</style><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head><body>
<header><div class="logo">ELEMENT<b>10</b></div><nav id="nav"></nav><div id="who" style="margin-left:auto"></div></header>
<div id="subnav" class="subnav" style="display:none"></div>
<div class="wrap">
  <div class="sec on" id="sec-home"></div>
  <div class="sec" id="sec-schedule"></div>
  <div class="sec" id="sec-copy"></div>
  <div class="sec" id="sec-gen"></div>
  <div class="sec" id="sec-break"></div>
  <div class="sec" id="sec-live"></div>
  <div class="sec" id="sec-fulfill"></div>
  <div class="sec" id="sec-repack"></div>
  <div class="sec" id="sec-data"></div>
  <div class="foot" id="foot"></div>
</div>
<div class="ov" id="ov"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<script>
/* ---------- defaults ---------- */
const DEF_LISTS={characters:['Charizard','Moonbreon','Umbreon','Pikachu','Gengar','Mewtwo','Mew','Rayquaza','Eevee','Greninja','Lugia','Team Rocket'],
 sets:['Pokémon 151','Prismatic Evolutions','Ascended Heroes','Chaos Rising','Destined Rivals','Evolving Skies','Crown Zenith','Surging Sparks','Vintage / WOTC','Mega Dream (JP)'],
 formats:['Ceiling Ladder','Character Break','RTYH','Grail Slab Break','$1 Singles Auction','Box Break (new release)','Pick-Your-Pokémon','Repack','Vintage Rip'],
 diff:['posted odds','free packs','every card ships','ships <1d','no reseals','best wall on Whatnot'],
 invcats:['Box','Case','ETB / Sealed','Pack','Raw card','Slab','Other'],
 grading:['PSA','BGS','SGC','CGC','TAG'],
 conditions:['Sealed','NM','LP','MP','HP','DMG','Raw','Graded']};
const DAYPARTS=[['Morning',0.22,'9:00 AM'],['Afternoon',0.55,'2:00 PM'],['Evening',1.0,'8:00 PM'],['Late night',0.7,'11:00 PM']];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const TITLE_TPL={curiosity:["$P START — is [SET] worth ripping? [CHAR] chase w/ [HOST]","the [CHAR] nobody's pulling… [SET] RTYH w/ [HOST]","$P [CHAR] chase — [DIFF] — w/ [HOST]"],
 search:["$P START RTYH [SET] — [CHAR] chase — [DIFF] w/ [HOST]","[SET] Character Break — $P starts — [CHAR] / [DIFF]","[SET] CEILING LADDER — God Pack / SIR / Slab / Pack · [DIFF] · [TIME] ET"],
 drama:["$P [CHAR] CHASE — [SET] — [DIFF] — w/ [HOST]","[SET] IS HERE — $P STARTS + FREE GIVEAWAYS w/ [HOST]","GRAIL SLAB HUNT — [CHAR] PSA 10 CHASE — [DIFF]"]};
const DESC_TPL=["[SET] on the wall. Every card ships, packaged to protect, fast shipping. $P starts — [CHAR] and more. [DIFF].","Ripping [SET] — [FMT]. [DIFF]. $P starts, no reseals, all cards ship. Bookmark for [TIME] ET.","[CHAR] chase night. [SET] [FMT] at $P. Real odds, clean cards, quick shipping."];
const SHORT_TPL=["$[LOW] pack → pulled the [CHAR]?! ([SET])","I opened $[X] of [SET] to see if it's WORTH IT","the rarest [CHAR] in [SET] just hit the wall","should I rip it or keep it sealed? [SET] [CHAR]"];
const rand=a=>a[Math.floor(Math.random()*a.length)]||'';
const fill=(t,d)=>{const host=(d.host||'').trim();return t.replace(/\[CHAR\]/g,d.char).replace(/\[SET\]/g,d.set).replace(/\[FMT\]/g,d.fmt).replace(/\s*w\/\s*\[HOST\]/gi,host?(' w/ '+host):'').replace(/\[HOST\]/g,host).replace(/\[DIFF\]/g,d.diff).replace(/\[TIME\]/g,d.time||'8:00').replace(/\$P/g,'$'+d.price).replace(/\[LOW\]/g,d.low||'4').replace(/\[X\]/g,d.x||'400').replace(/\s{2,}/g,' ').trim();};

/* ===== Reusable linked-field components (built once, applied from the audit) =====
   entityPicker(id,cfg): a searchable typeahead over a data source (client array OR server query).
     On select it stores {id,label} (the LINK) via cfg.onpick and shows the label with a ✕ to
     change. Server sources (cards/players/sets) use the fast RLS-wrapped search path, debounced
     ~250ms, with a loading state + a per-picker result cache. cfg.freeText allows using a typed
     value that isn't in the source (id=null) so new/legacy free-text still works.
   pickInput(cfg): a type-to-filter combobox (native <datalist>) over a pick-list (user-maintained
     in Lists & Settings) or a fixed array — the searchable picklist for enumerable values. */
const EP={};
function entityPicker(id,cfg){EP[id]=Object.assign({_res:[],_t:null,_q:'',_cache:new Map()},cfg);return `<div id="ep_${id}" class="ep" style="position:relative;min-width:0">${epBody(id)}</div>`;}
function epBody(id){const e=EP[id];if(!e)return'';
 if(e.value&&e.value.label){return `<div class="row" style="gap:6px;align-items:center;flex-wrap:nowrap"><span class="pill" style="margin:0;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.icon||'🔗'} ${esc(e.value.label)}${e.value.id==null?' <span class="lab" style="text-transform:none">(text)</span>':''}</span><button class="btn x sm" title="Change" onclick="epClear('${id}')">✕</button></div>`;}
 return `<input id="epi_${id}" autocomplete="off" placeholder="${esc(e.placeholder||'search…')}" oninput="epInput('${id}',this.value)" onfocus="epInput('${id}',this.value)" onkeydown="if(event.key==='Escape'){var r=document.getElementById('epr_${id}');if(r)r.innerHTML='';}"><div id="epr_${id}" style="position:absolute;left:0;right:0;z-index:50"></div>`;}
function epRender(id){const c=$('ep_'+id);if(c)c.innerHTML=epBody(id);}
function epShell(inner){return `<div style="background:var(--card,#fff);border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.16);max-height:300px;overflow:auto">${inner}</div>`;}
async function epRun(id,q){const e=EP[id];if(!e)return;e._q=q;
 if(e.server&&e._cache.has(q)){e._res=e._cache.get(q);return epResults(id,e._res);}
 let list=e.search(q);if(list&&list.then)list=await list;if(EP[id]!==e||e._q!==q)return;list=list||[];
 if(e.server)e._cache.set(q,list);e._res=list;epResults(id,list);}
function epInput(id,q){const e=EP[id];if(!e)return;const min=e.minChars||1;const rc=$('epr_'+id);e._q=q;
 if((q||'').trim().length<min){if(rc)rc.innerHTML='';e._res=[];return;}
 if(e.server){clearTimeout(e._t);if(rc)rc.innerHTML=epShell('<div style="padding:9px 11px"><span class="lab" style="text-transform:none;letter-spacing:0">⟳ searching…</span></div>');e._t=setTimeout(()=>epRun(id,q),e.debounce||250);}
 else epRun(id,q);}
function epResults(id,list){const el=$('epr_'+id);if(!el)return;const e=EP[id];const q=(e._q||'').trim();

/* Attaching a model to a show converts its inventory pulls into hard reservations (and detach releases them). */
async function reserveModelToShow(show,model){
 if(!model||!Array.isArray(model.invItems)||!model.invItems.length)return{ok:true,msg:'Break model attached'};
 const showId=show.id,showLabel=(show.name||'Untitled');
 /* Aggregate desired qty by itemId (a model listing the same item twice reserves the SUM), then ONE
    ATOMIC batch call (M3.1 blocker 4). SET semantics make re-attach idempotent; all-or-nothing means a
    single over-reserved item fails the whole attach (named) rather than leaving a partial reservation. */
 const agg={};model.invItems.forEach(iv=>{if(iv&&iv.itemId)agg[iv.itemId]=(agg[iv.itemId]||0)+(+iv.qty||1);});
 const targets=Object.keys(agg).map(itemId=>({item_id:itemId,qty:agg[itemId]}));
 if(!targets.length)return{ok:true,msg:'Break model attached'};
 const res=await invRpc('e10_inv_set_reservations',{p_show_ref:showId,p_show_label:showLabel,p_targets:targets,
   p_idempotency_key:invIdemKey('set_reservations',showId,'',_invEventTok())},
   r=>{if(r&&Array.isArray(r.items))r.items.forEach(x=>{if(x&&x.item)_applyInvItem(x.item);});});
 if(res&&res.ok)return{ok:true,msg:'Attached · inventory reserved to show'};
 return{ok:false,msg:(res&&res.msg)||'Reservation failed'};
}
async function releaseShowReservations(show,model){const showId=show.id;
 const ids=(model&&Array.isArray(model.invItems))?[...new Set(model.invItems.map(x=>x.itemId).filter(Boolean))]
   :(S.inventory||[]).filter(it=>(it.reservations||[]).some(r=>r.showId===showId)).map(it=>it.id);
 if(!ids.length)return{ok:true,msg:'Released reservations'};
 /* ONE atomic batch: set every item's target to 0 (release the caller's reservations for this show). */
 const targets=ids.map(itemId=>({item_id:itemId,qty:0}));
 const res=await invRpc('e10_inv_set_reservations',{p_show_ref:showId,p_show_label:(show.name||''),p_targets:targets,
   p_idempotency_key:invIdemKey('set_reservations',showId,'',_invEventTok())},
   r=>{if(r&&Array.isArray(r.items))r.items.forEach(x=>{if(x&&x.item)_applyInvItem(x.item);});});
 return{ok:(res&&res.ok)!==false,msg:'Released reservations'};
}

function allShows(){const out=[];Object.keys(S.shows||{}).forEach(k=>{(S.shows[k]||[]).forEach((s,i)=>{const p=k.split('|');out.push({k,i,id:s.id,label:(s.name||'Untitled')+' · '+p[0]+' '+p[1]});});});return out;}
/* Operational show set = the Universal baseline shows + the current user's own shows — the two
   rows always readable under RLS. Cached so rollups/buy-list are stable regardless of which scope
   tab is selected. The currently-viewed scope is overlaid live from S.shows so edits show at once. */
let OP_SHOWS={universal:null,mine:null};
async function loadOpShows(){
 try{const u=await fetchRow('universal');OP_SHOWS.universal=(u&&u.data&&u.data.shows)||{};}catch(e){OP_SHOWS.universal=OP_SHOWS.universal||{};}
 try{const m=await fetchRow('user:'+MEID);OP_SHOWS.mine=(m&&m.data&&m.data.shows)||{};}catch(e){OP_SHOWS.mine=OP_SHOWS.mine||{};}
}
function opShows(){
 const uni=(SCOPE==='universal')?(S.shows||{}):(OP_SHOWS.universal||{});
 const mine=(SCOPE==='mine')?(S.shows||{}):(OP_SHOWS.mine||{});
 const out=[],seen=new Set();
 [['universal',uni],['mine',mine]].forEach(([src,obj])=>{Object.keys(obj||{}).forEach(k=>{(obj[k]||[]).forEach((s,i)=>{const id=s.id||(src+'|'+k+'|'+i);if(seen.has(id))return;seen.add(id);const p=k.split('|');out.push({s,k,src,label:(s.name||'Untitled')+' · '+p[0]+' '+p[1]});});});});
 return out;
}
function opProjectedProfit(){return opShows().reduce((a,x)=>a+((x.s.breakModel&&x.s.breakModel.economics&&+x.s.breakModel.economics.profit)||0),0);}
function realizedMargin(items){return (items||S.inventory||[]).reduce((a,i)=>a+((+i.soldQty>0)?((+i.soldProceeds||0)-(+i.cost||0)*(+i.soldQty||0)):0),0);}
function streamerLoad(){const m={};opShows().forEach(x=>{const h=x.s.host||'—';const o=m[h]||(m[h]={shows:0,mins:0});o.shows++;o.mins+=(+x.s.dur||0);});return m;}
function showByRef(ref){if(!ref)return null;const p=ref.split('|||');const arr=S.shows[p[0]];if(!arr||!arr[+p[1]])return null;return{k:p[0],i:+p[1],s:arr[+p[1]]};}

function bkResolveBand(slot){

 if(src==='manual'){
   const o=slot.bandOverride;
   if(o&&((+o.low||0)+(+o.expected||0)+(+o.high||0))>0)return {low:+o.low||0,expected:+o.expected||0,high:+o.high||0,src:'override'};

   if(t)return {low:+t.low||0,expected:+t.expected||0,high:+t.high||0,src:'tier'};
   return {low:0,expected:0,high:0,src:'unset'};

 const topShare=exp>0?topExp/exp:0;
 const topIds=new Set(ranked.slice(0,topN).map(x=>x.s.id));
 const downside=takes.reduce((a,x)=>a+(topIds.has(x.s.id)?x.t.low:x.t.expected),0);

function bkCharGroups(pool){const chars=(S.lists&&S.lists.characters)||[];const groups={};
 pool.forEach(c=>{const nm=(c.name||'');let key=chars.find(ch=>new RegExp('\\b'+ch.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i').test(nm));
  if(!key)key=(nm.split(/[ \-–—/(]/)[0]||'Other').trim()||'Other';
  (groups[key]=groups[key]||{key,cards:[],val:0});groups[key].cards.push({name:c.name,val:+c.val||0});groups[key].val+=(+c.val||0);});
 return Object.values(groups).sort((a,b)=>b.val-a.val);}
function computePlan(){
 const pool=[...BK.chases,...BK.auctions.map(a=>({name:a.name,val:+a.val||0})),...BK.products.map(p=>({name:p.name,val:+p.val||0}))].filter(c=>c&&c.name);
 const poolVal=pool.reduce((s,c)=>s+(+c.val||0),0);
 const fmt=BK.format||'tiered',f=(BK.feesPct==null?9:+BK.feesPct)/100,shipPer=+BK.shipPer||0,P=+BK.cost||0,targetMargin=(BK.targetMargin==null?35:+BK.targetMargin)/100;
 let buckets=[];
 if(fmt==='random'){const N=Math.max(1,+BK.spots||1);for(let i=0;i<N;i++)buckets.push({label:'Spot '+(i+1),cards:[],val:poolVal/N});}
 else if(fmt==='tiered'){if(pool.length){const N=Math.max(1,Math.min(+BK.spots||1,pool.length));balance(pool.map(c=>({name:c.name,val:+c.val||0})),N).forEach((b,i)=>buckets.push({label:b.items.map(x=>x.name).join(' + ')||('Spot '+(i+1)),cards:b.items,val:b.sum}));}}
 else{bkCharGroups(pool).forEach(g=>buckets.push({label:g.key,cards:g.cards,val:g.val}));}
 const spotCount=buckets.length||1,shipTotal=shipPer*spotCount;
 let R;if(BK.priceMode==='price'){R=(+BK.spotPrice||0)*spotCount;}else{const denom=(1-f)-targetMargin;R=denom>0?(P+shipTotal)/denom:(P+shipTotal)*2.5;}
 R=Math.max(R,0);
 const floor=(1-f)>0?Math.max(0,((P/spotCount)+shipPer)/(1-f)):0;
 const sumV=buckets.reduce((s,b)=>s+(+b.val||0),0),floorTotal=floor*spotCount,surplus=Math.max(0,R-floorTotal);
 buckets.forEach(b=>{const w=sumV>0?(b.val/sumV):(1/spotCount);b.price=floor+surplus*w;});
 if(fmt==='random'){const p=Math.max(floor,R/spotCount);buckets.forEach(b=>b.price=p);}
 buckets.forEach(b=>b.price=Math.round(b.price));
 const tl=['S','A','B','C'],byPrice=buckets.slice().sort((a,b)=>b.price-a.price),nb=byPrice.length;byPrice.forEach((b,i)=>{b.tier=tl[Math.min(3,(nb<=4)?i:Math.floor(i*4/nb))];});
 const revenue=buckets.reduce((s,b)=>s+b.price,0),fees=revenue*f,shipping=shipPer*spotCount,totalCost=P+fees+shipping,net=revenue-totalCost,margin=revenue>0?net/revenue:0,roi=P>0?net/P:0;
 const perSpotNet=buckets.map(b=>b.price*(1-f)-shipPer).sort((a,b)=>b-a);let cum=0,be=0;for(const n of perSpotNet){if(cum>=P)break;cum+=n;be++;}const breakeven=P<=0?0:Math.min(be,spotCount);
 const netAt=r=>revenue*r*(1-f)-P-shipPer*spotCount*Math.min(1,r);
 return {fmt,pool,poolVal,buckets,spotCount,revenue,fees,shipping,totalCost,net,margin,roi,breakeven,floor,P,f,shipPer,cold:netAt(0.8),hot:netAt(1.2),perSpotBuyerVal:poolVal/spotCount};
}

async function clProcess(headers,rows,mode,name){

/* Pre-fill the import Sport selector from the product / set name, only on an unambiguous
   signal; anything else returns null so the reviewer picks and unknown stays NULL. Replaces
   the old bug where any sports-product name hardcoded every new player to 'Soccer'. */
function inferSport(text){const t=(text||'').toLowerCase();
 /* Domain-neutral: resolve the ACTUAL game/sport from the evidence. A detected game is never mapped to a
    different game, and anything undetected returns null for the reviewer to set — never a hardcoded default. */
 if(/pok[eé]mon|\bpokemon\b|\b151\b|scarlet|violet|paldea/.test(t))return 'Pokémon';
 if(/lorcana/.test(t))return 'Lorcana';
 if(/magic: the gathering|\bmtg\b/.test(t))return 'Magic: The Gathering';
 if(/yu-?gi-?oh|\byugioh\b/.test(t))return 'Yu-Gi-Oh!';
 if(/one piece/.test(t))return 'One Piece';
 if(/digimon/.test(t))return 'Digimon';
 if(/dragon ball|\bdbz\b/.test(t))return 'Dragon Ball';
 if(/world cup|\bfifa\b|\bsoccer\b|\bla ?liga\b|premier league|\buefa\b|champions league|\bepl\b/.test(t))return 'Soccer';
 if(/\bbaseball\b|\bmlb\b/.test(t))return 'Baseball';
 if(/\bbasketball\b|\bnba\b|\bwnba\b/.test(t))return 'Basketball';
 if(/\bhockey\b|\bnhl\b/.test(t))return 'Hockey';
 if(/\bfootball\b|\bnfl\b/.test(t))return 'Football';
 return null;}

/* Chain M / M4 — inventory is fully off the blob. The client reads it from e10_inventory_items via
   e10_inv_list() and patches per-row via realtime + the e10_inv_* RPC results (_applyInvItem). It is NOT
   a blob section: absent from SHARED_KEYS, blankShared, _sharedPayload and the H2 merge — so a shared
   write never carries an inventory section, and the blob's inventory copy is dropped by the M4 migration. */
const _sharedPayload=()=>({comments:S.comments,todos:S.todos,streamers:S.streamers,lists:S.lists,attachments:S.attachments,checklists:S.checklists,repacks:S.repacks});
const _scopedPayload=()=>({shows:S.shows,breaks:S.breaks,copySets:S.copySets,dashCfg:S.dashCfg,sales:S.sales,chaseLists:S.chaseLists});
function _keysFor(id){return id==='shared'?SHARED_KEYS:SCOPED_KEYS;}
function _splitFor(id,d){return id==='shared'?splitLegacy(d).sh:splitLegacy(d).sc;}      // reuse the SAME apply path realtime uses
function _baseObj(id){const j=id==='shared'?_lastShared:(id===SCOPED_ID?_lastScoped:null);try{return j?JSON.parse(j):null;}catch(e){return null;}}
function _setCache(id,obj){const j=JSON.stringify(obj);if(id==='shared')_lastShared=j;else if(id===SCOPED_ID)_lastScoped=j;}
function _applyPayload(id,obj){_applyingRemote=true;if(id==='shared'){const _inv=SHARED.inventory;SHARED=_splitFor('shared',obj);SHARED.inventory=_inv;/* M4: inventory is row-owned — never rebuilt from the blob split, so a shared-row realtime event (e.g. a todo edit) can't blank it */}else SCOPED=_splitFor(SCOPED_ID,obj);rebuildS();safeRender();_applyingRemote=false;}
/* PURE: (base, local, remote, keys) → {merged, conflicts[]}. Per section: local==base → take remote;
   remote==base → take local; both→same → fine; both changed differently → conflict (default local). */
function mergeWorkspace(base,local,remote,keys){base=base||{};local=local||{};remote=remote||{};const merged={},conflicts=[];
 keys.forEach(k=>{const b=JSON.stringify(base[k]),l=JSON.stringify(local[k]),r=JSON.stringify(remote[k]);
  if(l===r)merged[k]=local[k]; else if(l===b)merged[k]=remote[k]; else if(r===b)merged[k]=local[k]; else{merged[k]=local[k];conflicts.push(k);}});
 return{merged,conflicts};}
/* conditional UPDATE — Postgres statement atomicity makes this a true CAS. Legacy null/0-rev rows: match rev 0 OR null. */
async function _cas(id,owner,data,expected){let q=sb.from('e10_workspace').update({data,rev:(expected||0)+1,owner,updated_by:ME,updated_at:new Date().toISOString()}).eq('id',id);
 q=expected?q.eq('rev',expected):q.or('rev.eq.0,rev.is.null');const{data:up,error}=await q.select('rev');return{rows:(up&&up.length)||0,error};}
async function writeRow(id,owner,data){
 const expected=REVS[id]||0,base=_baseObj(id); /* snapshot base UP FRONT — it must correspond to `data`; a realtime apply during the awaits below can shift _lastShared, which would flip the 3-way merge */
 const res=await _cas(id,owner,data,expected);
 if(res.error){console.warn('save',id,res.error.message);return{ok:false};}
 if(res.rows){REVS[id]=expected+1;_setCache(id,data);return{ok:true};}
 /* zero rows: the row is missing (create it) or its rev drifted (conflict) */
 let remote=null;try{remote=await fetchRow(id);}catch(e){return{ok:false};}
 if(!remote){const{error}=await sb.from('e10_workspace').upsert({id,data,rev:expected+1,owner,updated_by:ME,updated_at:new Date().toISOString()});if(error){console.warn('save',id,error.message);return{ok:false};}REVS[id]=expected+1;_setCache(id,data);return{ok:true};}
 const keys=_keysFor(id),remObj=_splitFor(id,remote.data||{}),remRev=remote.rev||0;
 if(!base){_surfaceConflict(id,keys.slice(),data,remObj,remote,null);return{ok:false,conflict:true};} /* no base to 3-way against → surface, never silent-overwrite */
 const{merged,conflicts}=mergeWorkspace(base,data,remObj,keys);
 if(conflicts.length){_surfaceConflict(id,conflicts,data,remObj,remote,merged);return{ok:false,conflict:true};}
 const rr=await _cas(id,owner,merged,remRev);          /* clean section merge → retry ONCE at the remote rev */
 if(rr.error||!rr.rows)return{ok:false};              /* another write landed in the gap; next tick retries */
 REVS[id]=remRev+1;_setCache(id,merged);_applyPayload(id,merged);return{ok:true,merged:true};
}
/* True-conflict surface: one terse toast + a minimal review affordance (section, other author, time). */
let _conflict=null;
function _surfaceConflict(id,sections,localObj,remoteObj,remoteRow,mergedObj){
 _conflict={id,sections:sections.slice(),localObj,remoteObj,remRev:remoteRow.rev||0,by:remoteRow.updated_by,at:remoteRow.updated_at,merged:mergedObj};
 toast('Sync conflict — review');const old=$('wsConflict');if(old)old.remove();
 const box=document.createElement('div');box.id='wsConflict';box.className='ov';box.style.display='flex';
 box.innerHTML=`<div class="modal" style="max-width:400px"><h3 style="font-size:16px">Sync conflict</h3>
   <div class="lab" style="text-transform:none;letter-spacing:0;margin:6px 0 14px">${esc(_conflict.sections.join(', '))} · ${esc(ownerName(_conflict.by)||'another editor')}${_conflict.at?' · '+esc(new Date(_conflict.at).toLocaleTimeString()):''}</div>
   <div class="row" style="gap:8px;justify-content:flex-end"><button class="btn" style="background:var(--red);color:#fff;border-color:var(--red)" onclick="wsConflictTake()">Take theirs</button><button class="btn v" onclick="wsConflictKeep()">Keep mine</button></div></div>`;

async function wsConflictKeep(){const c=_conflict;if(!c)return;const el=$('wsConflict');if(el)el.remove();_conflict=null;
 const owner=(c.id==='shared')?null:((SCOPE==='mine')?MEID:(SCOPE==='universal'?null:SCOPE));const payload=c.merged||c.localObj; /* merged already keeps remote's non-conflicting sections + local for the conflicts */
 const rr=await _cas(c.id,owner,payload,c.remRev);
 if(!rr.error&&rr.rows){REVS[c.id]=c.remRev+1;_setCache(c.id,payload);_applyPayload(c.id,payload);toast('Kept your version');}else toast('Save failed — will retry');}
async function wsConflictTake(){const c=_conflict;if(!c)return;const el=$('wsConflict');if(el)el.remove();_conflict=null;

 let payload; if(c.merged){payload=Object.assign({},c.merged);c.sections.forEach(k=>{payload[k]=c.remoteObj[k];});}else payload=c.remoteObj; /* take remote for the conflicts; keep local's non-conflicting edits */

 if(!rr.error&&rr.rows){REVS[c.id]=c.remRev+1;_setCache(c.id,payload);_applyPayload(c.id,payload);toast('Took their version');}
 else{REVS[c.id]=c.remRev;_setCache(c.id,c.remoteObj);_applyPayload(c.id,c.remoteObj);toast('Took their version');}}

    clean merge); a failed/conflicted write leaves the cache honest so the next tick re-sends. */

 if(failed){if(!_saveFailing){_saveFailing=true;toast('Save failed — will retry');}}else _saveFailing=false; /* one toast on synced→failing, not per debounce tick */

}
/* (Chain M / M3) cloudCommitShared was the app-enforced read-modify-write lock on the shared blob for

/* Apply a remote row (higher rev). Merge THIS tab's unsaved local edits in so a realtime update within
   the debounce window can't silently clobber them; base advances to the remote (DB) state, and any
   merged-in local edit is persisted next via the CAS. A true section conflict is surfaced, not resolved. */
function applyRemoteRow(id,n){
 const keys=_keysFor(id);
 const remote=(n.data&&Object.keys(n.data).length)?_splitFor(id,n.data):(id==='shared'?blankShared():blankScoped());

 if(base){const m=mergeWorkspace(base,local,remote,keys);conflicts=m.conflicts;toApply=m.merged;hadLocal=(JSON.stringify(m.merged)!==JSON.stringify(remote));}
 REVS[id]=n.rev;
 _applyPayload(id,toApply);
 _setCache(id,remote);               /* base = the DB state; merged-in local edits now differ → written next */
 if(conflicts.length)_surfaceConflict(id,conflicts,local,remote,n,toApply);
 else if(hadLocal)cloudSave();        /* persist the local edits we kept, at the new rev, via CAS */

 if(!sb){$('sec-live').innerHTML='<div class="card">Connecting…</div>';return;}
 await loadTeamDir();
 if(REVIEW&&!LIVE.session){$('sec-live').innerHTML=liveReviewHTML();renderSlotBuilder();bkEvalSlots();return;}
 if(!LIVE.session)await liveLoadActive();
 $('sec-live').innerHTML=LIVE.session?liveActiveHTML():liveStartHTML();
}
async function liveLoadActive(){
 try{const{data}=await sb.from('e10_break_sessions').select('*').eq('streamer_uid',MEID).eq('status','active').order('created_at',{ascending:false}).limit(1);
  if(data&&data[0]){LIVE.session=data[0];await liveLoadSlots();await liveLoadChases();liveSubscribe();}}catch(e){}
}
async function liveLoadSlots(){try{const{data}=await sb.from('e10_break_slots').select('*').eq('session_id',LIVE.session.id).order('position');LIVE.slots=data||[];}catch(e){LIVE.slots=[];}}
async function liveLoadChases(){LIVE.chases=[];const cid=LIVE.session&&LIVE.session.checklist_id;if(!cid)return;
 try{const{data}=await sb.from('e10_cards').select('id,name,value').eq('checklist_id',cid).eq('chase',true).order('value',{ascending:false}).limit(15);LIVE.chases=data||[];}catch(e){LIVE.chases=[];}}
async function liveEvent(type,slot_id,payload){try{await sb.from('e10_break_events').insert({session_id:LIVE.session.id,slot_id:slot_id||null,type,payload:payload||{},actor_uid:MEID});}catch(e){console.warn('event',e.message);}}
function liveSubscribe(){if(!LIVE.session)return;if(LIVE.chan)sb.removeChannel(LIVE.chan);
 LIVE.chan=sb.channel('live_'+LIVE.session.id)
  .on('postgres_changes',{event:'*',schema:'public',table:'e10_break_slots',filter:'session_id=eq.'+LIVE.session.id},()=>liveRefresh())
  .on('postgres_changes',{event:'*',schema:'public',table:'e10_break_sessions',filter:'id=eq.'+LIVE.session.id},p=>{if(p.new){LIVE.session=p.new;liveRefreshRender();}})
  .subscribe();}
async function liveRefresh(){if(!LIVE.session)return;await liveLoadSlots();liveRefreshRender();}
function liveRefreshRender(){if($('sec-live').classList.contains('on')&&!isEditing())renderLive();}
async function liveStart(){const name=($('liveName')&&$('liveName').value.trim())||'Live Break';const mi=$('liveModel')?$('liveModel').value:'';
 const seedModel=(LIVE_SEED&&LIVE_SEED.model)||((mi!==''&&S.breaks[+mi])?S.breaks[+mi]:null);
 /* M3.2: a session started from a show carries that show's ref (== reservation show_ref) so live
    consumption draws down the show's reservations; ad-hoc (no seed) stays null. */
 const{data,error}=await sb.from('e10_break_sessions').insert({streamer_uid:MEID,name,source_show_ref:(LIVE_SEED&&LIVE_SEED.showRef)||null}).select().maybeSingle();
 if(error){toast('Could not start: '+error.message);return;}
 LIVE.session=data;LIVE_SEED=null;LIVE.slots=[];await liveEvent('session_started',null,{name});  /* M3.2.1/M3.2.2 item 5: consume the seed immediately after the successful insert, before any await */
 let seedFails=0;
 if(seedModel){const rs=(seedModel.ruleSlots&&seedModel.ruleSlots.length)?seedModel.ruleSlots:null;
   if(rs){/* rich seed — carry the format's rule slots + tiers + bands + projection (same as Start-from-format,
       not just the projection buckets) so team_id/player_id/tier targets/pacing/overlay logos all work */
     const tb=seedModel.tierBands||[];
     for(let i=0;i<rs.length;i++){const s=rs[i],take=modelTake(s,tb),tierName=(tb.find(t=>t.id===s.tierId)||{}).name||'';
       const teamC=(s.include||[]).find(c=>c.field==='team'&&c.valueId),playerC=(s.include||[]).find(c=>c.field==='player'&&c.valueId);
       const ins={session_id:LIVE.session.id,label:s.name||('Spot '+(i+1)),position:i,method:s.method||'$1auction',tier:tierName,
         band_low:take.low,band_expected:take.expected,band_high:take.high,
         team_id:teamC?teamC.valueId:null,player_id:playerC?playerC.valueId:null,
         price:((s.method==='fixed')?(+s.price||0):null),
         plan:{formatSlotId:s.id,breakType:seedModel.breakType||'team',tierName,remainder:!!s.remainder}};
       try{const{data:sl,error}=await sb.from('e10_break_slots').insert(ins).select().maybeSingle();if(error)throw error;if(sl)LIVE.slots.push(sl);}catch(e){seedFails++;}}
     const proj=modelProjection(seedModel),patch={break_type:seedModel.breakType||'team'};
     if(typeof seedModel.id==='string')patch.format_id=seedModel.id;
     if(seedModel.checklistId)patch.checklist_id=seedModel.checklistId;
     if(proj.exp>0||proj.low>0||proj.high>0){patch.proj_low=proj.low;patch.proj_expected=proj.exp;patch.proj_high=proj.high;}
     try{const{error}=await sb.from('e10_break_sessions').update(patch).eq('id',LIVE.session.id);if(!error)Object.assign(LIVE.session,patch);}catch(e){}
     await liveLoadChases();
   }else{const rows=(seedModel.rows&&seedModel.rows.length)?seedModel.rows:null;
     const n=rows?rows.length:Math.max(1,+seedModel.slots||1);
     for(let i=0;i<n;i++){const row=rows?rows[i]:null;const label=row?(row.label||('Spot '+(i+1))):('Spot '+(i+1));
       const ins={session_id:LIVE.session.id,label,position:i};if(row){if(row.price!=null)ins.price=row.price;if(row.tier)ins.tier=row.tier;}
       try{const{data:sl,error}=await sb.from('e10_break_slots').insert(ins).select().maybeSingle();if(error)throw error;if(sl)LIVE.slots.push(sl);}catch(e){seedFails++;}}}}
 liveSubscribe();renderLive();toast('Live break started'+(seedModel?' — seeded '+LIVE.slots.length+' spots':'')+(seedFails?(' · ⚠ '+seedFails+' failed'):''));
}
async function liveEnd(){if(!LIVE.session||!confirm('End this live break session?'))return;
 try{const{error}=await sb.from('e10_break_sessions').update({status:'ended',ended_at:new Date().toISOString()}).eq('id',LIVE.session.id);if(error)throw error;await liveEvent('session_ended',null,{});}catch(e){toast('Could not end session: '+e.message);return;}
 if(LIVE.chan){sb.removeChannel(LIVE.chan);LIVE.chan=null;}LIVE.session=null;LIVE.slots=[];LIVE.chases=[];renderLive();toast('Session ended');
}
/* next free position = one past the max existing (NOT array length, which collides after a delete) */
function liveNextPos(){return (LIVE.slots||[]).reduce((m,s)=>Math.max(m,(+s.position||0)+1),0);}
async function liveAddSlot(){if(!LIVE.session)return;const label=($('slotLabel')&&$('slotLabel').value.trim())||'';const pos=liveNextPos();
 const{data,error}=await sb.from('e10_break_slots').insert({session_id:LIVE.session.id,label:label||('Spot '+(pos+1)),position:pos}).select().maybeSingle();
 if(error){toast(error.message);return;}LIVE.slots.push(data);await liveEvent('assigned',data.id,{label:data.label});renderLive();
}
/* ===== Slot-list loaders for the LIVE BOARD worklist (insert straight into e10_break_slots) ===== */
async function liveInsertSlots(rows,evt){if(!rows.length)return;
 /* plan is NOT NULL — give every row in the batch the same column so a mixed batch (some rows with plan,
    some without) can't null-out the plan column for the rows that omitted it. */
 rows.forEach(r=>{if(r.plan==null)r.plan={};});
 try{const{data,error}=await sb.from('e10_break_slots').insert(rows).select();if(error)throw error;(data||[]).forEach(s=>LIVE.slots.push(s));}catch(e){toast(e.message);return false;}
 await liveEvent('slots_loaded',null,evt||{});renderLive();return true;}
async function livePatchSession(patch){if(!Object.keys(patch).length)return;try{const{error}=await sb.from('e10_break_sessions').update(patch).eq('id',LIVE.session.id);if(error)throw error;Object.assign(LIVE.session,patch);}catch(e){toast('Session update failed: '+e.message);}}

 const base=liveNextPos();const rows=teams.map((t,i)=>({session_id:LIVE.session.id,label:t.name,position:base+i,team_id:t.id,method:'$1auction'}));
 if(!LIVE.session.break_type)await livePatchSession({break_type:'team'});

async function liveLoadFormat(modelId){if(!LIVE.session)return;const model=(S.breaks||[]).find(b=>b.id===modelId);if(!model){toast('Format not found');return;}
 const rs=model.ruleSlots||[];if(!rs.length){toast('That format has no spots');return;}
 const tb=model.tierBands||[],base=liveNextPos();let cardMap={};
 if(model.checklistId){try{const payload=rs.map(s=>({name:s.name||'',include:s.include||[],exclude:s.exclude||[],remainder:!!s.remainder}));const{data}=await sb.rpc('e10_slot_cards',{p_checklist:model.checklistId,p_slots:payload,p_limit:60});(data||[]).forEach(x=>{cardMap[x.i]={count:x.count,cards:x.cards||[]};});}catch(e){}}
 const rows=rs.map((s,i)=>{const take=modelTake(s,tb),tierName=(tb.find(t=>t.id===s.tierId)||{}).name||'';const teamC=(s.include||[]).find(c=>c.field==='team'&&c.valueId),playerC=(s.include||[]).find(c=>c.field==='player'&&c.valueId),cm=cardMap[i]||{count:null,cards:[]};
   return{session_id:LIVE.session.id,label:s.name||('Spot '+(base+i+1)),position:base+i,method:s.method||'$1auction',tier:tierName,band_low:take.low,band_expected:take.expected,band_high:take.high,team_id:teamC?teamC.valueId:null,player_id:playerC?playerC.valueId:null,price:((s.method==='fixed')?(+s.price||0):null),plan:{formatSlotId:s.id,breakType:model.breakType||'team',tierName,remainder:!!s.remainder,cardCount:cm.count,cards:cm.cards}};});
 const proj=modelProjection(model),patch={};
 if(!LIVE.session.checklist_id&&model.checklistId)patch.checklist_id=model.checklistId;
 if(!LIVE.session.format_id)patch.format_id=model.id;
 if(!LIVE.session.break_type)patch.break_type=model.breakType||'team';
 if(!(+LIVE.session.proj_expected>0||+LIVE.session.proj_low>0||+LIVE.session.proj_high>0)){patch.proj_low=proj.low;patch.proj_expected=proj.exp;patch.proj_high=proj.high;}
 await livePatchSession(patch);
 if(patch.checklist_id)await liveLoadChases();
 if(await liveInsertSlots(rows,{source:'format',format_id:model.id,count:rs.length}))toast('Attached '+model.name+' — '+rs.length+' spots + projection');}
function liveLoadPlayerPicked(ctx){const id=window['_slCl_'+ctx];if(!id){toast('Pick a checklist');return;}liveLoadByPlayer(id);}

 if(!facets.length){toast('No player values on that checklist');return;}

 const rows=top.map((f,i)=>({session_id:LIVE.session.id,label:f.label||'(player)',position:base+i,player_id:f.id||null,method:'$1auction'}));

async function liveDelSlot(id){const sl=LIVE.slots.find(x=>x.id===id);const warn=(sl&&sl.state==='sold')?('This spot is SOLD to '+(sl.buyer_handle||'a buyer')+' for '+money(+sl.price||0)+'. Remove it anyway? The buyer/price will be lost.'):('Remove spot “'+((sl&&sl.label)||'')+'”?');if(!confirm(warn))return;
 try{const{error}=await sb.from('e10_break_slots').delete().eq('id',id);if(error)throw error;}catch(e){toast(e.message);return;}LIVE.slots=LIVE.slots.filter(x=>x.id!==id);renderLive();toast('Spot removed');}
/* ===== Incentive registry (Phase C) — the single source of truth for what incentives exist and how to
   read whether each is currently active on a session. TO ADD A NEW INCENTIVE: append one row here (key,
   label, active(session)); add its toggle button in liveActiveHTML; and add one placard branch in
   overlay.html placardsHTML. activeIncentives(session) resolves the live-active set at any moment and is
   what gets stamped onto a slot at sale time. Existing states are reused as-is (nothing renamed). ===== */
const INCENTIVES=[
 {key:'stash_or_pass',label:'Stash-or-pass',active:s=>!!(s&&s.stash_or_pass)},
 {key:'case_hit',label:'Case hit',active:s=>!!(s&&(s.case_hit_open||s.case_hit))},
 {key:'trade_block',label:'Trade block',active:s=>!!(s&&s.trade_open)},
 {key:'see_2_pick_1',label:'See 2 pick 1',active:s=>!!(s&&s.see_2_pick_1)}
];
function activeIncentives(s){return INCENTIVES.filter(i=>i.active(s)).map(i=>i.key);}
function incentiveLabel(k){const i=INCENTIVES.find(x=>x.key===k);return i?i.label:k;}

}

/* Giveaway (Element 10-run, graphics overlay) — start/stop + manual entries, stored on overlay_cfg */
async function liveGiveaway(action){if(!LIVE.session)return;const cfg=Object.assign({},LIVE.session.overlay_cfg||{});
 const g=Object.assign({on:false,label:'',endsAt:0,entries:0},cfg.giveaway||{});
 if(action==='start'){g.label=($('gvLabel')&&$('gvLabel').value.trim())||'GIVEAWAY';const mins=Math.max(1,+($('gvMins')&&$('gvMins').value)||5);g.on=true;g.endsAt=Date.now()+mins*60000;g.entries=+g.entries||0;}
 else if(action==='stop')g.on=false;
 else if(action==='plus')g.entries=(+g.entries||0)+1;
 else if(action==='minus')g.entries=Math.max(0,(+g.entries||0)-1);
 cfg.giveaway=g;
 try{await sb.from('e10_break_sessions').update({overlay_cfg:cfg}).eq('id',LIVE.session.id);}catch(e){toast(e.message);return;}
 LIVE.session.overlay_cfg=cfg;renderLive();
}

function liveChasesHTML(){const chs=LIVE.chases||[];if(!chs.length)return '';
 const hit=new Set((LIVE.session.chases_hit)||[]);const remaining=chs.length-chs.filter(c=>hit.has(c.id)).length;

/* Chain M: stock movement now goes through the transactional break RPCs. A consume records a
   break_consumption and pushes {mid,qty} onto p._cmids; a return (delta<0) reverses movements LIFO
   (break_reversal by movement id, at-most-once), re-consuming any over-return so p.consumed and qty

 /* M3.2: consume derives the reserved drawdown from reservations MATCHED BY the source show ref (never
    the session id). A session born from a show carries source_show_ref (stamped at creation); ad-hoc
    sessions leave it null → consumption draws only unreserved stock (reserved_delta 0). */

 if(delta>0){
   const it=(S.inventory||[]).find(x=>x.id===p.itemId);const onhand=it?Math.max(0,+it.qty||0):0;const take=Math.min(delta,onhand);

   const res=await invRpc('e10_inv_consume',{p_id:p.itemId,p_break_session_id:sref,p_source_show_ref:showRef,p_qty:take,p_idempotency_key:invIdemKey('break_consumption',sref,p.itemId,_invEventTok())});
   if(!res||!res.ok){toast('Short stock: '+p.name+' isn’t in inventory — cost still committed for '+desired+' box'+(desired===1?'':'es')+'.');return false;}
   p._cmids.push({mid:res.movement_id,qty:take});p.consumed=(+p.consumed||0)+take;

   if(R<0){const take=-R;const res=await invRpc('e10_inv_consume',{p_id:p.itemId,p_break_session_id:sref,p_source_show_ref:showRef,p_qty:take,p_idempotency_key:invIdemKey('break_consumption',sref,p.itemId,_invEventTok())});

   live board → Break cost + Avg-slot-target + ROI header; review → its avg-slot-target header. */
function afterProdChange(){if(LIVE.session)renderLive();else if(BUILDER){save();renderShowBuilder(BUILDER.id);}else if(REVIEW)renderLive();else renderProductsUI();}
async function prodAdd(itemId){const it=(S.inventory||[]).find(x=>x.id===itemId);if(!it){toast('Item not found');return;}
 const arr=prodArr();if(arr.some(p=>p.itemId===itemId)){toast('Already included');return;}
 const bpc=itemBoxesPerCase(it),pbc=itemPerBoxCost(it),slice=(bpc>1?'case':'boxes'),boxes=sliceToBoxes(slice,1,bpc);
 const p={itemId,name:it.name,cat:it.cat||'',slice,n:1,boxes,perBoxCost:pbc,boxesPerCase:bpc,consumed:0};arr.push(p);
 if(LIVE.session){await breakConsume(p);await prodPersist();}
 afterProdChange();}
async function prodRemove(idx){const arr=prodArr();const p=arr[idx];if(!p)return;
 if(!confirm('Remove “'+(p.name||'this product')+'” from the break?'+(LIVE.session?' Its boxes return to stock.':'')))return;
 if(LIVE.session){p.boxes=0;await breakConsume(p);/* returns its boxes to stock */}
 arr.splice(idx,1);
 if(LIVE.session)await prodPersist();
 afterProdChange();toast('Product removed');}
async function prodSlice(idx,slice,n){const arr=prodArr();const p=arr[idx];if(!p)return;
 p.slice=slice;if(n!=null)p.n=Math.max(1,+n||1);p.boxes=sliceToBoxes(p.slice,p.n,p.boxesPerCase);
 if(LIVE.session){await breakConsume(p);await prodPersist();}
 afterProdChange();}
function prodRowHTML(p,i){const it=(S.inventory||[]).find(x=>x.id===p.itemId);const onhand=it?(+it.qty||0):0;const bpc=Math.max(1,+p.boxesPerCase||1);
 return `<div class="row" style="justify-content:space-between;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);flex-wrap:wrap">
   <div style="min-width:0;flex:1"><b>${esc(p.name)}</b> <span class="lab" style="text-transform:none;letter-spacing:0">${p.boxes} box${p.boxes===1?'':'es'} × ${money(p.perBoxCost)} = <b>${money(p.boxes*p.perBoxCost)}</b>${LIVE.session?(' · on-hand '+onhand):''}</span></div>
   <div class="row" style="gap:6px;align-items:center">
     <select onchange="prodSlice(${i},this.value)" style="font-size:12px">${[['case','Full case ('+bpc+')'],['half','Half case ('+Math.max(1,Math.round(bpc/2))+')'],['boxes','N boxes']].map(o=>`<option value="${o[0]}" ${p.slice===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select>
     ${p.slice==='boxes'?`<input type="number" min="1" value="${p.n||1}" style="width:64px;font-size:12px" onchange="prodSlice(${i},'boxes',this.value)">`:''}
     <button class="btn x sm" onclick="prodRemove(${i})" title="Remove (returns boxes to stock)">✕</button></div></div>`;}
/* The product editor mounts at up to two surfaces simultaneously (the show builder in #sec-schedule stays
   in the DOM behind the live board in #sec-live, since go() only toggles .on). Every id must therefore be
   SURFACE-specific — a bare 'prodPick'/'prodBox' collided, and $ (getElementById) returned the first,
   stealing the picker node (the live click-through failed here). The surface key mirrors the precedence
   prodArr() already uses (live > builder > review) so the container and the array can never disagree. */
function productEditorHTML(surface){const arr=prodArr(),cost=breakCost(arr);
 return `<div class="row" style="justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><h3 style="font-size:15px">Products / cost</h3><b id="breakCostVal_${surface}" style="font-size:17px">Break cost: ${money(cost)}</b></div>
   
   <div style="margin-top:8px">${arr.map((p,i)=>prodRowHTML(p,i)).join('')||'<div class="lab" style="text-transform:none;letter-spacing:0">No products yet.</div>'}</div>
   <div class="row" style="margin-top:10px;gap:8px;align-items:flex-start"><div style="flex:2;min-width:0">${entityPicker('prodPick_'+surface,{icon:'📦',placeholder:'search inventory to add…',search:invItemSearch,onpick:(id)=>{prodAdd(id);}})}</div></div>`;}
function renderProductsUI(){const s=LIVE.session?'live':(BUILDER?'builder':(REVIEW?'review':null));if(!s)return;const box=$('prodBox_'+s);if(box)box.innerHTML=productEditorHTML(s);}
/* ===== Participants (review) ===== */
function participantsHTML(){const ps=(REVIEW&&REVIEW.participants)||[];
 return `<div class="row" style="gap:6px;flex-wrap:wrap;margin-top:6px">${ps.map((p,i)=>`<span class="pill" style="margin:0">${esc(p)} <a onclick="partRemove(${i})" style="color:var(--red);cursor:pointer">✕</a></span>`).join('')||'<span class="lab" style="text-transform:none;letter-spacing:0">No hosts yet.</span>'}</div>
   <div class="row" style="margin-top:8px;gap:6px">${pickInput({id:'partPick',list:(S.streamers||[]),placeholder:'add host…',style:'max-width:220px'})}<button class="btn sm" onclick="partAdd()">+ Add host</button></div>`;}
function renderParticipants(){const box=$('partBox');if(box)box.innerHTML=participantsHTML();}
function partAdd(){if(!REVIEW)return;const el=$('partPick'),v=el?el.value.trim():'';if(!v)return;REVIEW.participants=REVIEW.participants||[];if(!REVIEW.participants.includes(v))REVIEW.participants.push(v);renderParticipants();}
function partRemove(i){if(!REVIEW)return;(REVIEW.participants||[]).splice(i,1);renderParticipants();}
/* ===== Pre-flight review screen ===== */
let REVIEW=null;
function liveStartFromFormat(modelId){const model=(S.breaks||[]).find(b=>b.id===modelId);if(!model){toast('Model not found');return;}
 if(!canEditScoped())return roGuard();
 BUILDER=null;
 if(LIVE.session){go('live');toast('End the current live session first');return;}
 const rs=(model.ruleSlots||[]);if(!rs.length){toast('This model has no formatted spots — build slots in the planner first.');return;}
 /* load the format into BK so the slot builder is editable in the review */
 BK.slots=JSON.parse(JSON.stringify(rs));BK.tierBands=JSON.parse(JSON.stringify(model.tierBands||[]));BK.checklistId=model.checklistId||null;BK.breakType=model.breakType||'team';BK.cost=+((model.inputs&&model.inputs.cost)||model.cost||0);BK.targetMargin=(model.inputs&&model.inputs.targetMargin!=null)?model.inputs.targetMargin:30;BK._slotEval=null;BK._modelId=model.id;
 /* M3.2.1 item 2: a session carries a show ref ONLY when the operator explicitly started from that show
    (showStartLive → LIVE_SEED.showRef). Generic format launches are always ad hoc — NO show inference. */
 const _showRef=(LIVE_SEED&&LIVE_SEED.showRef)||null;
 REVIEW={modelId:model.id,title:model.name+' — live',showRef:_showRef,participants:(S.streamers&&S.streamers.length)?[S.streamers[0]]:[],products:[]};
 go('live');renderLive();
}
function liveCancelReview(){REVIEW=null;LIVE_SEED=null;renderLive();}  /* M3.2.1 item 3: cancelling pre-flight abandons the show seed */
function liveReviewHTML(){const model=(S.breaks||[]).find(b=>b.id===REVIEW.modelId)||{};const proj=computeProjection();
 const nSlots=(BK.slots||[]).length,brkCost=breakCost(REVIEW.products),avgT=avgSlotTarget(brkCost,nSlots);
 return `<div class="hero"><div><h1>Review break — pre-flight</h1></div><button class="btn x" onclick="liveCancelReview()">Cancel</button></div>
  <div class="card" style="margin-bottom:12px"><div class="lab" style="text-transform:none;letter-spacing:0;font-size:13px">Format: <b>${esc(model.name||'—')}</b> · ${esc(BK.breakType||'team')} break · <b>${nSlots}</b> spots · ${(BK.tierBands||[]).length} tiers · projection ${money(proj.low)} / <b>${money(proj.exp)}</b> / ${money(proj.high)}</div>
   ${avgT>0?`<div class="lab" style="text-transform:none;letter-spacing:0;font-size:13px;margin-top:4px">Break cost <b>${money(brkCost)}</b> ÷ ${nSlots} spots = <b style="color:var(--red)">${money(avgT)}</b> avg slot target to break even</div>`:''}</div>
  <div class="card" style="margin-bottom:12px"><label>Stream title</label><input id="rvTitle" value="${esc(REVIEW.title)}" oninput="REVIEW.title=this.value" style="font-size:16px;width:100%;max-width:520px"></div>
  <div class="card" style="margin-bottom:12px"><h3 style="font-size:15px">Participants / hosts</h3><div id="partBox">${participantsHTML()}</div></div>
  <div class="card" style="margin-bottom:12px"><div id="prodBox_review">${productEditorHTML('review')}</div></div>
  <div class="card" style="margin-bottom:12px"><h3 style="font-size:15px">Slots — load or edit the spot list</h3>${slotLoaderHTML('review')}<div id="bkSlots" style="margin-top:10px"></div></div>
  <div class="row" style="gap:8px;margin-bottom:20px"><button class="btn v" onclick="liveConfirmReview()">✓ Confirm &amp; go live</button><button class="btn" onclick="liveCancelReview()">Cancel</button></div>`;}
async function liveConfirmReview(){if(!REVIEW)return;if(!canEditScoped())return roGuard();
 const model=(S.breaks||[]).find(b=>b.id===REVIEW.modelId)||{};
 const rs=BK.slots||[];if(!rs.length){toast('Add at least one slot before going live');return;}
 const tb=BK.tierBands||[],breakType=BK.breakType||'team',checklistId=BK.checklistId||null,proj=computeProjection();
 const title=(REVIEW.title||'').trim()||((model.name||'Live')+' — live');
 const cost=breakCost(REVIEW.products);
 let cardMap={};
 if(checklistId){try{const payload=rs.map(s=>({name:s.name||'',include:s.include||[],exclude:s.exclude||[],remainder:!!s.remainder}));
   const{data}=await sb.rpc('e10_slot_cards',{p_checklist:checklistId,p_slots:payload,p_limit:60});
   (data||[]).forEach(x=>{cardMap[x.i]={count:x.count,cards:x.cards||[]};});}catch(e){}}
 const{data:sess,error}=await sb.from('e10_break_sessions').insert({streamer_uid:MEID,name:title,
   format_id:REVIEW.modelId,break_type:breakType,checklist_id:checklistId,cost,proj_low:proj.low,proj_expected:proj.exp,proj_high:proj.high,
   source_show_ref:(REVIEW&&REVIEW.showRef)||null,
   participants:REVIEW.participants||[],products:[]}).select().maybeSingle();
 if(error){toast('Could not start: '+error.message);return;}
 LIVE.session=sess;LIVE_SEED=null;REVIEW.showRef=null;LIVE.slots=[];await liveEvent('session_started',null,{name:sess.name,format_id:REVIEW.modelId,participants:REVIEW.participants||[]});  /* M3.2.2 item 5: consume the seed pre-await, right after the successful insert */
 let slotFails=0;
 for(let i=0;i<rs.length;i++){const s=rs[i],take=modelTake(s,tb),tierName=(tb.find(t=>t.id===s.tierId)||{}).name||'';
   const teamC=(s.include||[]).find(c=>c.field==='team'&&c.valueId),playerC=(s.include||[]).find(c=>c.field==='player'&&c.valueId),cm=cardMap[i]||{count:null,cards:[]};
   const ins={session_id:sess.id,label:s.name||('Spot '+(i+1)),position:i,method:s.method||'$1auction',tier:tierName,
     band_low:take.low,band_expected:take.expected,band_high:take.high,
     team_id:teamC?teamC.valueId:null,player_id:playerC?playerC.valueId:null,
     price:((s.method==='fixed')?(+s.price||0):null),
     plan:{formatSlotId:s.id,breakType,tierName,remainder:!!s.remainder,cardCount:cm.count,cards:cm.cards}};
   try{const{data:sl,error}=await sb.from('e10_break_slots').insert(ins).select().maybeSingle();if(error)throw error;if(sl)LIVE.slots.push(sl);}catch(e){slotFails++;}}
 /* commit product boxes now — decrement inventory (idempotent via consumed=0 → boxes) */
 LIVE.session.products=[];
 for(const p of (REVIEW.products||[])){p.consumed=0;await breakConsume(p);LIVE.session.products.push(p);}
 await prodPersist();
 REVIEW=null;await liveLoadChases();liveSubscribe();go('live');renderLive();toast('Live break started — '+LIVE.slots.length+' spots · cost '+money(LIVE.session.cost||0)+(slotFails?(' · ⚠ '+slotFails+' spot(s) failed to save'):''));
}
/* projection of a SAVED model (pure; mirrors phase-2 computeProjection, reads through the same band shape) */
function modelBand(slot,tierBands){const o=slot.bandOverride;
 if(o&&((+o.low||0)+(+o.expected||0)+(+o.high||0))>0)return {low:+o.low||0,expected:+o.expected||0,high:+o.high||0};
 const t=(tierBands||[]).find(t=>t.id===slot.tierId);if(t)return {low:+t.low||0,expected:+t.expected||0,high:+t.high||0};
 return {low:0,expected:0,high:0};}
function modelTake(slot,tierBands){if((slot.method||'$1auction')==='fixed'){const p=+slot.price||0;return {low:p,expected:p,high:p};}return modelBand(slot,tierBands);}
function modelProjection(model){const slots=(model.ruleSlots||[]),tb=model.tierBands||[];const takes=slots.map(s=>modelTake(s,tb));
 return {low:takes.reduce((a,t)=>a+t.low,0),exp:takes.reduce((a,t)=>a+t.expected,0),high:takes.reduce((a,t)=>a+t.high,0),cost:+((model.inputs&&model.inputs.cost)||model.cost||0),slotCount:slots.length};}
/* ===== Buyer-grouped fulfillment / ship list — flips sold spots by-buyer, across sessions ===== */
let FULFILL={groups:{},sess:{}};
async function renderFulfill(){const el=$('sec-fulfill');if(!el)return;if(!sb){el.innerHTML='<div class="card">Connecting…</div>';return;}
 el.innerHTML=`<div class="hero"><div><h1>Ship — buyer fulfillment</h1></div><button class="btn sm" onclick="renderFulfill()">↻ Refresh</button></div><div id="fulfillBody"><div class="card"><div class="lab" style="text-transform:none;letter-spacing:0">Loading…</div></div></div>`;
 let sessions=[];try{const{data}=await sb.from('e10_break_sessions').select('id,name,created_at,cost,streamer_uid').order('created_at',{ascending:false});sessions=(data||[]).filter(s=>ROLE==='admin'||s.streamer_uid===MEID);}catch(e){}
 FULFILL.sess={};sessions.forEach(s=>FULFILL.sess[s.id]=s);
 const sids=sessions.map(s=>s.id);
 const body=$('fulfillBody');if(!body)return;
 if(!sids.length){body.innerHTML='<div class="card"><div class="lab" style="text-transform:none;letter-spacing:0">No break sessions yet.</div></div>';return;}
 let slots=[];try{const{data}=await sb.from('e10_break_slots').select('*').in('session_id',sids).eq('state','sold').order('sold_at',{ascending:false});slots=data||[];}catch(e){}
 const groups={};
 slots.forEach(sl=>{const key=sl.buyer_uid?('u:'+sl.buyer_uid):('h:'+(sl.buyer_handle||'').trim().toLowerCase());if(key==='h:')return;
   (groups[key]=groups[key]||{key,handle:sl.buyer_handle||'(no handle)',lines:[],total:0});
   const g=groups[key];g.lines.push(sl);g.total+=(+sl.price||0);if((!g.handle||g.handle==='(no handle)')&&sl.buyer_handle)g.handle=sl.buyer_handle;});
 FULFILL.groups=groups;
 const arr=Object.values(groups).sort((a,b)=>b.total-a.total);
 if(!arr.length){body.innerHTML='<div class="card"><div class="lab" style="text-transform:none;letter-spacing:0">No sold spots yet.</div></div>';return;}
 const grand=arr.reduce((a,g)=>a+g.total,0),lineCount=slots.length;
 let h=`<div class="card" style="margin-bottom:12px"><div class="row" style="gap:14px;flex-wrap:wrap"><div class="metric"><div class="n">${arr.length}</div><div class="l">Buyers</div></div><div class="metric"><div class="n">${lineCount}</div><div class="l">Spots won</div></div><div class="metric"><div class="n">${money(grand)}</div><div class="l">Total hammer</div></div></div></div>`;
 arr.forEach(g=>{h+=fulfillBuyerHTML(g);});
 body.innerHTML=h;
}
function fulfillBuyerHTML(g){const st=g.lines.map(l=>l.ship_state||'open');
 const allShipped=st.every(s=>s==='shipped'),allPacked=st.every(s=>s==='packed'||s==='shipped');
 const badge=allShipped?['#0a8a4a','shipped']:(allPacked?['#b8860b','packed']:['#8a8f98','open']);
 let h=`<div class="card" style="margin-bottom:12px"><div class="row" style="justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
   <h3 style="font-size:16px">${esc(g.handle)} <span class="pill" style="margin-left:6px;background:${badge[0]}22;color:${badge[0]};border-color:${badge[0]}">${badge[1]}</span></h3>
   <div class="row" style="gap:6px;align-items:center"><b>${money(g.total)}</b> · ${g.lines.length} spot${g.lines.length===1?'':'s'}
     <button class="btn sm" onclick="shipBuyerAll('${g.key}','packed')">Mark all packed</button><button class="btn v sm" onclick="shipBuyerAll('${g.key}','shipped')">Mark all shipped</button></div></div>
   <div class="egrid wide" style="margin-top:8px"><table><tr><th>Show / date</th><th>Spot</th><th>Cards to pull</th><th>Hammer</th><th>Status</th><th>Tracking / note</th></tr>`;
 g.lines.forEach(l=>{const sess=FULFILL.sess[l.session_id]||{};const dt=sess.created_at?new Date(sess.created_at).toLocaleDateString():'';
   const cards=(l.plan&&l.plan.cards)||[],cc=(l.plan&&l.plan.cardCount);
   const cardTxt=cards.length?(cards.slice(0,4).map(c=>esc(c.name)).join(', ')+((cc&&cc>cards.length)?(' +'+(cc-cards.length)):(cards.length>4?' …':''))):(l.plan&&l.plan.remainder?'Field / remainder':'—');
   h+=`<tr><td>${esc(sess.name||'—')}<div class="lab" style="text-transform:none;letter-spacing:0;font-size:11px">${dt}</div></td>
     <td><b>${esc(l.label||'')}</b>${l.tier?`<div class="lab" style="text-transform:none;letter-spacing:0;font-size:11px">${esc(l.tier)}</div>`:''}</td>
     <td class="lab" style="text-transform:none;letter-spacing:0;font-size:12px;max-width:260px">${cardTxt}</td>
     <td class="mono">${money(+l.price||0)}</td>
     <td><select onchange="shipSetLine('${l.id}','ship_state',this.value)">${['open','packed','shipped'].map(x=>`<option ${((l.ship_state||'open')===x)?'selected':''}>${x}</option>`).join('')}</select></td>
     <td><input value="${esc(l.ship_note||'')}" placeholder="tracking #" style="width:150px;font-size:12px" onchange="shipSetLine('${l.id}','ship_note',this.value)"></td></tr>`;});
 return h+`</table></div></div>`;
}
async function shipSetLine(id,field,val){const patch={updated_at:new Date().toISOString()};patch[field]=(val===''?null:val);
 try{const{error}=await sb.from('e10_break_slots').update(patch).eq('id',id);if(error)throw error;}catch(e){toast(e.message);return;}
 // update in-memory so a status re-render reflects it without a full refetch
 Object.values(FULFILL.groups).forEach(g=>g.lines.forEach(l=>{if(l.id===id)l[field]=patch[field];}));
 if(field==='ship_state')renderFulfill();else toast('Saved');
}
async function shipBuyerAll(key,state){const g=FULFILL.groups[key];if(!g)return;
 try{const ids=g.lines.map(l=>l.id);const{error}=await sb.from('e10_break_slots').update({ship_state:state,updated_at:new Date().toISOString()}).in('id',ids);if(error)throw error;}catch(e){toast(e.message);return;}
 g.lines.forEach(l=>l.ship_state=state);renderFulfill();toast('Buyer marked '+state);
}
boot();
</script></body></html>
