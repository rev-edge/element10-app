<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Element 10 — Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf9f5;--surface:#ffffff;--surface2:#f0efea;--ink:#0A0B0D;--mut:#6b6d73;--mut2:#9a9a93;--line:#e4e2da;--volt:#C6FF3A;--blue:#1F5EFF;--red:#E8332B;--r:14px;--rp:999px;
--disp:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;--sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px}
h1,h2,h3{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.02em;margin:0}
.mono{font-family:var(--mono)}a{color:var(--blue);text-decoration:none;cursor:pointer}
header{display:flex;align-items:center;gap:22px;padding:16px 26px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#faf9f5f2;backdrop-filter:blur(6px);z-index:30}
.logo{font-family:var(--disp);font-weight:700;font-size:22px;letter-spacing:.04em}.logo b{background:var(--volt);padding:0 8px;border-radius:6px}
nav{display:flex;gap:6px;flex-wrap:wrap}
.tab{font-family:var(--sans);font-weight:500;font-size:13.5px;padding:8px 15px;border-radius:var(--rp);border:1px solid transparent;background:none;cursor:pointer;color:var(--mut)}
.tab:hover{background:var(--surface2);color:var(--ink)}.tab.on{background:var(--ink);color:#fff}
.wrap{max-width:1180px;margin:0 auto;padding:26px}
.sec{display:none}.sec.on{display:block}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px}
.grid{display:grid;gap:16px}
.btn{font-family:var(--sans);font-weight:500;font-size:13.5px;padding:9px 16px;border-radius:var(--rp);border:1px solid var(--ink);background:none;color:var(--ink);cursor:pointer}
.btn:hover{background:var(--surface2)}.btn.v{background:var(--volt);border-color:var(--volt);font-weight:700}
.btn.d{background:var(--ink);color:#fff}.btn.sm{padding:6px 12px;font-size:12.5px}.btn.x{border:none;color:var(--red);padding:4px 8px;background:none}
input,select,textarea{font-family:var(--sans);font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--ink);width:100%}
textarea{resize:vertical;min-height:64px}
label{font-size:12px;color:var(--mut);font-weight:500;display:block;margin:0 0 4px}
.lab{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut2)}
.metric{background:var(--surface2);border-radius:var(--r);padding:16px}
.metric .n{font-family:var(--disp);font-weight:700;font-size:30px;line-height:1;letter-spacing:-.01em}.metric .l{font-size:12px;color:var(--mut);margin-top:6px}
.pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:var(--rp);background:var(--surface2);color:var(--mut);border:1px solid var(--line);margin:3px}
.pill.v{background:var(--volt);color:var(--ink);border-color:var(--volt)}
.acc{border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;overflow:hidden;background:var(--surface)}
.acc>.h{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;font-weight:500}
.acc>.h .chev{margin-left:auto;transition:.15s;color:var(--mut)}.acc.open>.h .chev{transform:rotate(90deg)}
.acc>.b{display:none;padding:0 18px 18px}.acc.open>.b{display:block}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.todo{display:flex;align-items:center;gap:11px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--surface)}
.todo.done{opacity:.5}.todo.done .t{text-decoration:line-through}
.todo input[type=checkbox]{width:18px;height:18px;accent-color:var(--volt);flex:none}
.todo .grip{cursor:grab;color:var(--mut2);flex:none}.todo .t{flex:1;cursor:pointer}.todo .t:hover{color:var(--blue)}
.todo .badge{font-family:var(--mono);font-size:10px;color:var(--mut2)}
.todo.dover{border-color:var(--ink)}
.cmt{padding:10px 12px;border-left:3px solid var(--volt);background:var(--surface2);border-radius:0 10px 10px 0;margin-bottom:9px;font-size:13.5px}
.cmt .who{font-family:var(--mono);font-size:11px;color:var(--mut)}
.sgrid{display:grid;grid-template-columns:88px repeat(7,1fr);gap:6px;min-width:820px}
.sgrid .hd{font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--mut);text-align:center;padding:6px 0;letter-spacing:.05em}
.sgrid .dp{font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--mut);display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding-right:8px;text-align:right}
.cell{background:var(--surface);border:1px solid var(--line);border-radius:10px;min-height:70px;padding:6px}
.cell.peak{background:#f7fce9;border-color:#e4f3bf}.cell.dover{border-color:var(--ink)}
.show{background:var(--ink);color:#fff;border-radius:8px;padding:7px 8px;margin-bottom:5px;cursor:grab;font-size:11.5px;line-height:1.3}
.show .nm{font-weight:500}.show .mt{font-family:var(--mono);font-size:10px;color:var(--volt);margin-top:2px}
.show .rdy{display:flex;align-items:center;gap:4px;margin-top:4px}
.show .rdy .d{width:7px;height:7px;border-radius:50%;flex:none;opacity:.9}
.show .rdy .d.copy{background:#4f7cff}.show .rdy .d.brk{background:var(--volt)}.show .rdy .d.inv{background:#3ad13a}
.show .rdy .ok{font-family:var(--mono);font-size:8.5px;letter-spacing:.04em;color:#0a0b0d;background:var(--volt);border-radius:3px;padding:0 4px;margin-left:auto}
.addc{color:var(--mut2);font-size:11px;cursor:pointer;text-align:center}.addc:hover{color:var(--ink)}
.out{background:var(--surface2);border-radius:10px;padding:12px 14px;margin-top:8px;font-size:13.5px;line-height:1.5;position:relative}
.out .cp{position:absolute;right:8px;top:8px}
table{border-collapse:collapse;width:100%;font-size:13px}
th{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
td{padding:8px 10px;border-bottom:1px solid var(--line)}
.tierS{color:var(--red);font-weight:700}.tierA{color:var(--blue);font-weight:700}.tierB{color:#0a8a4a;font-weight:700}.tierC{color:var(--mut);font-weight:700}
/* ── shared data-grid: framed, ruled, zebra (built from the app's own tokens) ── */
.egrid{border:0.5px solid var(--line);border-radius:var(--r);overflow:auto;background:var(--surface)}
.egrid table{border-collapse:collapse;width:100%;font-size:13px}
.egrid.wide table{min-width:680px}
.egrid th{background:var(--surface2);border:0.5px solid var(--line);border-bottom:1.5px solid var(--line);white-space:nowrap;position:sticky;top:0;z-index:1}
.egrid td{border:0.5px solid var(--line);vertical-align:middle}
.egrid tr:nth-child(even) td{background:var(--bg)}
.egrid th.srt{cursor:pointer;user-select:none}
.colgrip{position:absolute;top:0;right:-2px;width:8px;height:100%;cursor:col-resize;user-select:none;z-index:4;touch-action:none}
.colgrip:hover{box-shadow:inset -3px 0 0 var(--mut2)}
.egrid th.srt .chev{color:var(--mut2);margin-left:5px;font-size:9px}
.egrid th.srt.on .chev{color:var(--ink)}
.egrid td .actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
/* ── toolbar above a grid: bordered fields + segmented control ── */
.etool{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px}
.etool>div{display:flex;flex-direction:column}
.eseg{display:inline-flex;border:0.5px solid var(--line);border-radius:8px;overflow:hidden}
.eseg button{border:none;border-right:0.5px solid var(--line);background:var(--surface);color:var(--ink);font-family:var(--sans);font-weight:500;font-size:12.5px;padding:9px 14px;cursor:pointer}
.eseg button:last-child{border-right:none}
.eseg button:hover{background:var(--surface2)}
.eseg button.on{background:var(--ink);color:#fff}
details.gcfg{position:relative;display:inline-block}
details.gcfg>summary{list-style:none;cursor:pointer}details.gcfg>summary::-webkit-details-marker{display:none}
.gpop{position:absolute;z-index:60;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 26px rgba(0,0,0,.14);padding:10px;min-width:240px;max-height:360px;overflow:auto}
.gpop .grow{display:flex;align-items:center;gap:4px;font-size:12.5px;padding:2px 0}
.gpop .grow .btn.x.sm{padding:0 5px}
.ov{position:fixed;inset:0;background:#0008;display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
.modal{background:var(--surface);border-radius:var(--r);padding:22px;max-width:520px;width:100%;max-height:88vh;overflow:auto}
.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:14px}
.hero h1{font-size:38px}.hero .sub{color:var(--mut);font-size:13.5px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:var(--rp);font-size:13px;opacity:0;transition:.2s;z-index:80}.toast.on{opacity:1}
.foot{color:var(--mut2);font-size:11px;margin-top:26px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:780px){.split{grid-template-columns:1fr}}
.drop{border:1.5px dashed var(--line);border-radius:12px;padding:16px;text-align:center;color:var(--mut);font-size:13px;cursor:pointer}
.drop:hover{border-color:var(--ink);color:var(--ink)}
.filerow{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;font-size:13px;background:var(--surface)}
.filerow .nm{flex:1}.chipwrap{margin:8px 0}
</style><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head><body>
<header><div class="logo">ELEMENT<b>10</b></div><nav id="nav"></nav><div id="who" style="margin-left:auto"></div></header>
<div class="wrap">
  <div class="sec on" id="sec-home"></div>
  <div class="sec" id="sec-schedule"></div>
  <div class="sec" id="sec-copy"></div>
  <div class="sec" id="sec-gen"></div>
  <div class="sec" id="sec-break"></div>
  <div class="sec" id="sec-live"></div>
  <div class="sec" id="sec-fulfill"></div>
  <div class="sec" id="sec-repack"></div>
  <div class="sec" id="sec-data"></div>
  <div class="foot" id="foot"></div>
</div>
<div class="ov" id="ov"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<script>
/* ---------- defaults ---------- */
const DEF_LISTS={characters:['Charizard','Moonbreon','Umbreon','Pikachu','Gengar','Mewtwo','Mew','Rayquaza','Eevee','Greninja','Lugia','Team Rocket'],
 sets:['Pokémon 151','Prismatic Evolutions','Ascended Heroes','Chaos Rising','Destined Rivals','Evolving Skies','Crown Zenith','Surging Sparks','Vintage / WOTC','Mega Dream (JP)'],
 formats:['Ceiling Ladder','Character Break','RTYH','Grail Slab Break','$1 Singles Auction','Box Break (new release)','Pick-Your-Pokémon','Repack','Vintage Rip'],
 diff:['posted odds','free packs','every card ships','ships <1d','no reseals','best wall on Whatnot'],
 invcats:['Box','Case','ETB / Sealed','Pack','Raw card','Slab','Other'],
 grading:['PSA','BGS','SGC','CGC','TAG'],
 conditions:['Sealed','NM','LP','MP','HP','DMG','Raw','Graded']};
const DAYPARTS=[['Morning',0.22,'9:00 AM'],['Afternoon',0.55,'2:00 PM'],['Evening',1.0,'8:00 PM'],['Late night',0.7,'11:00 PM']];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const TITLE_TPL={curiosity:["$P START — is [SET] worth ripping? [CHAR] chase w/ [HOST]","the [CHAR] nobody's pulling… [SET] RTYH w/ [HOST]","$P [CHAR] chase — [DIFF] — w/ [HOST]"],
 search:["$P START RTYH [SET] — [CHAR] chase — [DIFF] w/ [HOST]","[SET] Character Break — $P starts — [CHAR] / [DIFF]","[SET] CEILING LADDER — God Pack / SIR / Slab / Pack · [DIFF] · [TIME] ET"],
 drama:["$P [CHAR] CHASE — [SET] — [DIFF] — w/ [HOST]","[SET] IS HERE — $P STARTS + FREE GIVEAWAYS w/ [HOST]","GRAIL SLAB HUNT — [CHAR] PSA 10 CHASE — [DIFF]"]};
const DESC_TPL=["[SET] on the wall. Every card ships, packaged to protect, fast shipping. $P starts — [CHAR] and more. [DIFF].","Ripping [SET] — [FMT]. [DIFF]. $P starts, no reseals, all cards ship. Bookmark for [TIME] ET.","[CHAR] chase night. [SET] [FMT] at $P. Real odds, clean cards, quick shipping."];
const SHORT_TPL=["$[LOW] pack → pulled the [CHAR]?! ([SET])","I opened $[X] of [SET] to see if it's WORTH IT","the rarest [CHAR] in [SET] just hit the wall","should I rip it or keep it sealed? [SET] [CHAR]"];
const rand=a=>a[Math.floor(Math.random()*a.length)]||'';
const fill=(t,d)=>{const host=(d.host||'').trim();return t.replace(/\[CHAR\]/g,d.char).replace(/\[SET\]/g,d.set).replace(/\[FMT\]/g,d.fmt).replace(/\s*w\/\s*\[HOST\]/gi,host?(' w/ '+host):'').replace(/\[HOST\]/g,host).replace(/\[DIFF\]/g,d.diff).replace(/\[TIME\]/g,d.time||'8:00').replace(/\$P/g,'$'+d.price).replace(/\[LOW\]/g,d.low||'4').replace(/\[X\]/g,d.x||'400').replace(/\s{2,}/g,' ').trim();};

/* ===== Reusable linked-field components (built once, applied from the audit) =====
   entityPicker(id,cfg): a searchable typeahead over a data source (client array OR server query).
     On select it stores {id,label} (the LINK) via cfg.onpick and shows the label with a ✕ to
     change. Server sources (cards/players/sets) use the fast RLS-wrapped search path, debounced
     ~250ms, with a loading state + a per-picker result cache. cfg.freeText allows using a typed
     value that isn't in the source (id=null) so new/legacy free-text still works.
   pickInput(cfg): a type-to-filter combobox (native <datalist>) over a pick-list (user-maintained
     in Lists & Settings) or a fixed array — the searchable picklist for enumerable values. */
const EP={};
function entityPicker(id,cfg){EP[id]=Object.assign({_res:[],_t:null,_q:'',_cache:new Map()},cfg);return `<div id="ep_${id}" class="ep" style="position:relative;min-width:0">${epBody(id)}</div>`;}
function epBody(id){const e=EP[id];if(!e)return'';
 if(e.value&&e.value.label){return `<div class="row" style="gap:6px;align-items:center;flex-wrap:nowrap"><span class="pill" style="margin:0;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.icon||'🔗'} ${esc(e.value.label)}${e.value.id==null?' <span class="lab" style="text-transform:none">(text)</span>':''}</span><button class="btn x sm" title="Change" onclick="epClear('${id}')">✕</button></div>`;}
 return `<input id="epi_${id}" autocomplete="off" placeholder="${esc(e.placeholder||'search…')}" oninput="epInput('${id}',this.value)" onfocus="epInput('${id}',this.value)" onkeydown="if(event.key==='Escape'){var r=document.getElementById('epr_${id}');if(r)r.innerHTML='';}"><div id="epr_${id}" style="position:absolute;left:0;right:0;z-index:50"></div>`;}
function epRender(id){const c=$('ep_'+id);if(c)c.innerHTML=epBody(id);}
function epShell(inner){return `<div style="background:var(--card,#fff);border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.16);max-height:300px;overflow:auto">${inner}</div>`;}
async function epRun(id,q){const e=EP[id];if(!e)return;e._q=q;
 if(e.server&&e._cache.has(q)){e._res=e._cache.get(q);return epResults(id,e._res);}
 let list=e.search(q);if(list&&list.then)list=await list;if(EP[id]!==e||e._q!==q)return;list=list||[];
 if(e.server)e._cache.set(q,list);e._res=list;epResults(id,list);}
function epInput(id,q){const e=EP[id];if(!e)return;const min=e.minChars||1;const rc=$('epr_'+id);e._q=q;
 if((q||'').trim().length<min){if(rc)rc.innerHTML='';e._res=[];return;}
 if(e.server){clearTimeout(e._t);if(rc)rc.innerHTML=epShell('<div style="padding:9px 11px"><span class="lab" style="text-transform:none;letter-spacing:0">⟳ searching…</span></div>');e._t=setTimeout(()=>epRun(id,q),e.debounce||250);}
 else epRun(id,q);}
function epResults(id,list){const el=$('epr_'+id);if(!el)return;const e=EP[id];const q=(e._q||'').trim();
 const free=(e.freeText&&q)?`<div onclick="epPickFree('${id}')" style="padding:7px 10px;cursor:pointer;border-top:1px solid var(--line);color:var(--mut2)">＋ Use “${esc(q)}” as text</div>`:'';
 const rows=list.map((m,i)=>`<div onclick="epPick('${id}',${i})" style="padding:7px 10px;cursor:pointer;border-bottom:1px solid var(--line)" onmouseover="this.style.background='rgba(0,0,0,.05)'" onmouseout="this.style.background=''"><b>${esc(m.label||'—')}</b>${m.sub?` <span class="lab" style="text-transform:none;letter-spacing:0">${esc(m.sub)}</span>`:''}</div>`).join('');
 el.innerHTML=epShell((rows||(free?'':'<div style="padding:9px 11px"><span class="lab" style="text-transform:none;letter-spacing:0">No matches.</span></div>'))+free);}
function epPick(id,i){const e=EP[id];if(!e)return;const m=e._res[i];if(!m)return;e.value={id:m.id,label:m.label};const el=$('epr_'+id);if(el)el.innerHTML='';epRender(id);if(e.onpick)e.onpick(m.id,m.label,m);}
function epPickFree(id){const e=EP[id];if(!e)return;const label=(e._q||'').trim();if(!label)return;e.value={id:null,label};const el=$('epr_'+id);if(el)el.innerHTML='';epRender(id);if(e.onpick)e.onpick(null,label,null);}
function epClear(id){const e=EP[id];if(!e)return;e.value=null;epRender(id);if(e.onclear)e.onclear();setTimeout(()=>{const i=$('epi_'+id);if(i)i.focus();},0);}
function epSetValue(id,value){const e=EP[id];if(!e)return;e.value=value||null;epRender(id);}
/* server search adapters (RLS-wrapped, fast) */
async function dbSetSearch(q){q=(q||'').trim();if(!q)return[];try{const{data}=await sb.from('e10_sets').select('id,name,year,sport').ilike('name','%'+q+'%').order('name').limit(20);return (data||[]).map(s=>({id:s.id,label:s.name,sub:[s.year,s.sport].filter(Boolean).join(' · ')}));}catch(e){return[];}}
async function dbPlayerSearch(q){q=(q||'').trim();if(!q)return[];try{const{data}=await sb.from('e10_players').select('id,name,team,nationality').ilike('name','%'+q+'%').order('name').limit(20);return (data||[]).map(p=>({id:p.id,label:p.name,sub:[p.team,p.nationality].filter(Boolean).join(' · ')}));}catch(e){return[];}}
async function dbTeamSearch(q){q=(q||'').trim();if(!q)return[];try{const{data}=await sb.from('e10_teams').select('id,name,nationality,sport').ilike('name','%'+q+'%').order('name').limit(20);return (data||[]).map(p=>({id:p.id,label:p.name,sub:[p.nationality,p.sport].filter(Boolean).join(' · ')}));}catch(e){return[];}}
function invItemSearch(q){q=(q||'').toLowerCase();return (S.inventory||[]).filter(x=>(x.name||'').toLowerCase().includes(q)).slice(0,24).map(x=>({id:x.id,label:x.name,sub:[x.cat,x.set,'cost '+money(+x.cost||0)].filter(Boolean).join(' · ')}));}
/* pickInput: type-to-filter combobox from a Lists & Settings pick-list (or a fixed array) */
function pickOpts(list){const arr=Array.isArray(list)?list:L(list);return (arr||[]).map(v=>`<option value="${esc(v)}"></option>`).join('');}
function pickInput(cfg){const dl='dl_'+cfg.id;return `<input id="${cfg.id}" list="${dl}" value="${esc(cfg.value==null?'':cfg.value)}" placeholder="${esc(cfg.placeholder||'type or pick…')}" autocomplete="off"${cfg.disabled?' disabled':''}${cfg.style?` style="${cfg.style}"`:''}${cfg.oninput?` oninput="${cfg.oninput}"`:''}${cfg.onchange?` onchange="${cfg.onchange}"`:''}><datalist id="${dl}">${pickOpts(cfg.list)}</datalist>`;}

/* ---------- state ---------- */
const KEY='element10_v2';
let S=JSON.parse(localStorage.getItem(KEY)||'null');
if(!S){S={lists:JSON.parse(JSON.stringify(DEF_LISTS)),streamers:['Trent','Guest 1','Guest 2'],
 todos:[{id:'t1',text:'Lock brand direction + grab handles',done:false,desc:'',comments:[]},{id:'t2',text:'Build first Ceiling Ladder show',done:false,desc:'',comments:[]},{id:'t3',text:'Load week 1 inventory',done:false,desc:'',comments:[]}],
 comments:[{who:'Trent',when:Date.now(),text:'Kicking off the Element 10 build — drop updates here.'}],
 shows:{},breaks:[],attachments:[],checklists:[],inventory:[],dashCfg:{catValue:true,costMarket:true,movement:true},sales:null,user:null};}
if(!('user' in S))S.user=null;
if(!S.inventory)S.inventory=[];if(!S.dashCfg)S.dashCfg={catValue:true,costMarket:true,movement:true};

/* Attaching a model to a show converts its inventory pulls into hard reservations (and detach releases them). */
async function reserveModelToShow(show,model){
 if(!model||!Array.isArray(model.invItems)||!model.invItems.length)return{ok:true,msg:'Break model attached'};
 const showId=show.id,showLabel=(show.name||'Untitled'),streamer=MEID,admin=ROLE==='admin';
 return await cloudCommitShared(base=>{const capped=[];
  model.invItems.forEach(iv=>{const it=base.inventory.find(x=>x.id===iv.itemId);if(!it)return;if(!Array.isArray(it.reservations))it.reservations=[];
   const ex=it.reservations.find(x=>x.showId===showId&&x.streamerUid===streamer);
   const totalRes=it.reservations.reduce((s,x)=>s+(+x.qty||0),0);const freeForThis=(+it.qty||0)-(totalRes-(ex?ex.qty:0));
   const want=+iv.qty||1,grant=admin?want:Math.min(want,Math.max(0,freeForThis));
   if(grant<want)capped.push(it.name);
   if(grant<=0)return;
   if(ex)ex.qty=grant;else it.reservations.push({showId,showLabel,streamerUid:streamer,qty:grant});});
  return{ok:true,msg:capped.length?('Attached · reservations capped by free stock: '+[...new Set(capped)].join(', ')):'Attached · inventory reserved to show'};});
}
async function releaseShowReservations(show,model){const showId=show.id,ids=(model&&model.invItems)?model.invItems.map(x=>x.itemId):null,admin=ROLE==='admin';
 return await cloudCommitShared(base=>{base.inventory.forEach(it=>{if(!Array.isArray(it.reservations))return;
   it.reservations=it.reservations.filter(rz=>{const match=rz.showId===showId&&(!ids||ids.includes(it.id));if(!match)return true;return !(admin||rz.streamerUid===MEID);});});
  return{ok:true,msg:'Released reservations'};});
}

let CS_LAST=null;      // last generated copy set in Copy Studio {type,items}

function allShows(){const out=[];Object.keys(S.shows||{}).forEach(k=>{(S.shows[k]||[]).forEach((s,i)=>{const p=k.split('|');out.push({k,i,id:s.id,label:(s.name||'Untitled')+' · '+p[0]+' '+p[1]});});});return out;}
/* Operational show set = the Universal baseline shows + the current user's own shows — the two
   rows always readable under RLS. Cached so rollups/buy-list are stable regardless of which scope
   tab is selected. The currently-viewed scope is overlaid live from S.shows so edits show at once. */
let OP_SHOWS={universal:null,mine:null};
async function loadOpShows(){
 try{const u=await fetchRow('universal');OP_SHOWS.universal=(u&&u.data&&u.data.shows)||{};}catch(e){OP_SHOWS.universal=OP_SHOWS.universal||{};}
 try{const m=await fetchRow('user:'+MEID);OP_SHOWS.mine=(m&&m.data&&m.data.shows)||{};}catch(e){OP_SHOWS.mine=OP_SHOWS.mine||{};}
}
function opShows(){
 const uni=(SCOPE==='universal')?(S.shows||{}):(OP_SHOWS.universal||{});
 const mine=(SCOPE==='mine')?(S.shows||{}):(OP_SHOWS.mine||{});
 const out=[],seen=new Set();
 [['universal',uni],['mine',mine]].forEach(([src,obj])=>{Object.keys(obj||{}).forEach(k=>{(obj[k]||[]).forEach((s,i)=>{const id=s.id||(src+'|'+k+'|'+i);if(seen.has(id))return;seen.add(id);const p=k.split('|');out.push({s,k,src,label:(s.name||'Untitled')+' · '+p[0]+' '+p[1]});});});});
 return out;
}
function opProjectedProfit(){return opShows().reduce((a,x)=>a+((x.s.breakModel&&x.s.breakModel.economics&&+x.s.breakModel.economics.profit)||0),0);}
function realizedMargin(items){return (items||S.inventory||[]).reduce((a,i)=>a+((+i.soldQty>0)?((+i.soldProceeds||0)-(+i.cost||0)*(+i.soldQty||0)):0),0);}
function streamerLoad(){const m={};opShows().forEach(x=>{const h=x.s.host||'—';const o=m[h]||(m[h]={shows:0,mins:0});o.shows++;o.mins+=(+x.s.dur||0);});return m;}
function showByRef(ref){if(!ref)return null;const p=ref.split('|||');const arr=S.shows[p[0]];if(!arr||!arr[+p[1]])return null;return{k:p[0],i:+p[1],s:arr[+p[1]]};}
function showPickerOptions(sel){return `<option value="">— attach to show —</option>`+allShows().map(x=>`<option value="${x.k}|||${x.i}" ${sel===(x.k+'|||'+x.i)?'selected':''}>${esc(x.label)}</option>`).join('');}
function copyTitleOf(cs){return (cs&&cs.items&&cs.items[0])?(cs.items[0][1]||''):'';}
function copyDescOf(cs){if(!cs||!cs.items)return '';const d=cs.items.find(it=>/option|descr/i.test(it[0]));return d?d[1]:'';}

function bkResolveBand(slot){
 const src=slot.bandSource||'manual';
 if(src==='manual'){
   const o=slot.bandOverride;
   if(o&&((+o.low||0)+(+o.expected||0)+(+o.high||0))>0)return {low:+o.low||0,expected:+o.expected||0,high:+o.high||0,src:'override'};

   if(t)return {low:+t.low||0,expected:+t.expected||0,high:+t.high||0,src:'tier'};
   return {low:0,expected:0,high:0,src:'unset'};

}

function bkAddFromInv(){const el=$('bkInv');if(!el||el.value==='')return;const it=S.inventory[+el.value];if(!it)return;
 const already=BK.invItems.filter(x=>x.itemId===it.id).reduce((s,x)=>s+(+x.qty||0),0);
 if(already+1>invAvailable(it)){toast('No free units of '+it.name+' left ('+invAvailable(it)+' available)');return;}
 const val=+it.value||0,cost=+it.cost||0,qty=1;const slab=/slab|raw|card/i.test(it.cat||'');
 if(slab)BK.chases.push({name:it.name,val,invId:it.id});else BK.products.push({name:it.name,spots:1,val,invId:it.id});
 BK.invItems.push({itemId:it.id,name:it.name,qty,cost,value:val,cat:it.cat,set:it.set});

function balance(items,n){const bins=Array.from({length:n},()=>({sum:0,items:[]}));items.slice().sort((a,b)=>b.val-a.val).forEach(it=>{bins.sort((a,b)=>a.sum-b.sum);bins[0].items.push(it);bins[0].sum+=it.val;});return bins;}
function bkCharGroups(pool){const chars=(S.lists&&S.lists.characters)||[];const groups={};
 pool.forEach(c=>{const nm=(c.name||'');let key=chars.find(ch=>new RegExp('\\b'+ch.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i').test(nm));
  if(!key)key=(nm.split(/[ \-–—/(]/)[0]||'Other').trim()||'Other';
  (groups[key]=groups[key]||{key,cards:[],val:0});groups[key].cards.push({name:c.name,val:+c.val||0});groups[key].val+=(+c.val||0);});
 return Object.values(groups).sort((a,b)=>b.val-a.val);}
function computePlan(){
 const pool=[...BK.chases,...BK.auctions.map(a=>({name:a.name,val:+a.val||0})),...BK.products.map(p=>({name:p.name,val:+p.val||0}))].filter(c=>c&&c.name);
 const poolVal=pool.reduce((s,c)=>s+(+c.val||0),0);
 const fmt=BK.format||'tiered',f=(BK.feesPct==null?9:+BK.feesPct)/100,shipPer=+BK.shipPer||0,P=+BK.cost||0,targetMargin=(BK.targetMargin==null?35:+BK.targetMargin)/100;
 let buckets=[];
 if(fmt==='random'){const N=Math.max(1,+BK.spots||1);for(let i=0;i<N;i++)buckets.push({label:'Spot '+(i+1),cards:[],val:poolVal/N});}
 else if(fmt==='tiered'){if(pool.length){const N=Math.max(1,Math.min(+BK.spots||1,pool.length));balance(pool.map(c=>({name:c.name,val:+c.val||0})),N).forEach((b,i)=>buckets.push({label:b.items.map(x=>x.name).join(' + ')||('Spot '+(i+1)),cards:b.items,val:b.sum}));}}
 else{bkCharGroups(pool).forEach(g=>buckets.push({label:g.key,cards:g.cards,val:g.val}));}
 const spotCount=buckets.length||1,shipTotal=shipPer*spotCount;
 let R;if(BK.priceMode==='price'){R=(+BK.spotPrice||0)*spotCount;}else{const denom=(1-f)-targetMargin;R=denom>0?(P+shipTotal)/denom:(P+shipTotal)*2.5;}
 R=Math.max(R,0);
 const floor=(1-f)>0?Math.max(0,((P/spotCount)+shipPer)/(1-f)):0;
 const sumV=buckets.reduce((s,b)=>s+(+b.val||0),0),floorTotal=floor*spotCount,surplus=Math.max(0,R-floorTotal);
 buckets.forEach(b=>{const w=sumV>0?(b.val/sumV):(1/spotCount);b.price=floor+surplus*w;});
 if(fmt==='random'){const p=Math.max(floor,R/spotCount);buckets.forEach(b=>b.price=p);}
 buckets.forEach(b=>b.price=Math.round(b.price));
 const tl=['S','A','B','C'],byPrice=buckets.slice().sort((a,b)=>b.price-a.price);byPrice.forEach((b,i)=>{b.tier=tl[Math.min(3,Math.floor(i/(byPrice.length/4)))];});
 const revenue=buckets.reduce((s,b)=>s+b.price,0),fees=revenue*f,shipping=shipPer*spotCount,totalCost=P+fees+shipping,net=revenue-totalCost,margin=revenue>0?net/revenue:0,roi=P>0?net/P:0;
 const perSpotNet=buckets.map(b=>b.price*(1-f)-shipPer).sort((a,b)=>b-a);let cum=0,be=0;for(const n of perSpotNet){if(cum>=P)break;cum+=n;be++;}const breakeven=P<=0?0:Math.min(be,spotCount);
 const netAt=r=>revenue*r*(1-f)-P-shipPer*spotCount*Math.min(1,r);
 return {fmt,pool,poolVal,buckets,spotCount,revenue,fees,shipping,totalCost,net,margin,roi,breakeven,floor,P,f,shipPer,cold:netAt(0.8),hot:netAt(1.2),perSpotBuyerVal:poolVal/spotCount};
}

async function clProcess(headers,rows,mode,name){

   if(error){clSmartFallback(headers,rows,name,'Smart import unavailable ('+(error.message||'network error')+'). Using Direct import.');return;}
   if(!data||!data.ok){clSmartFallback(headers,rows,name,(data&&data.message)||'Smart import failed. Using Direct import.');return;}
   const applied=clApplyMapping(headers,rows,data.mapping,name);

   clStage(applied.cards,{name:applied.setName||name,set:applied.setName,summary:applied.summary,flags:applied.flags,unmapped:applied.unmapped,confidence:data.mapping.confidence,notes:data.mapping.notes,mode:'smart'});

function clApplyMapping(headers,rows,mapping,name){

 rows.forEach((r,ri)=>{if(!r||!r.some(c=>(''+(c==null?'':c)).trim()))return;
   const nm=g(r,iName),rarity=g(r,iRar),valRaw=g(r,iVal);let parallel=g(r,iPar);if(/^base$/i.test(parallel))parallel='';

   else{const lc=(nm+' '+rarity+' '+parallel).toLowerCase();cardType=insKw.some(k=>lc.includes(k))?'insert':((parallel||parKw.some(k=>lc.includes(k)))?'parallel':'base');}
   if(parallel&&cardType==='base')cardType='parallel';

function dbCardFilters(q,o){const f=o.filters||{};const s=(o.search||'').trim().toLowerCase();
 /* Tokenize on whitespace and require ALL tokens (AND), each as an ILIKE substring. PostgREST
    ANDs chained .like calls; the AND-of-ILIKEs still uses the e10_cards_search_trgm index. This
    makes "messi black" match a row whose search text contains both, instead of the literal
    phrase "messi black" (which never occurs). search col is pre-lowercased -> .like is fine. */
 if(s)s.split(/\s+/).filter(Boolean).slice(0,6).forEach(tok=>{q=q.like('search','%'+tok+'%');});
 if((f.set||'').trim())q=q.ilike('set_name','%'+f.set.trim()+'%');
 if((f.rarity||'').trim())q=q.ilike('rarity','%'+f.rarity.trim()+'%');
 if((f.parallel||'').trim())q=q.ilike('parallel','%'+f.parallel.trim()+'%');
 if((f.card_type||'').trim())q=q.ilike('card_type','%'+f.card_type.trim()+'%');

 return q;}
async function dbCards(scopeCol,scopeId,o){o=o||{};try{
 let q=sb.from('e10_cards').select('id,num,name,set_name,rarity,value,parallel,card_type,serial,color,rookie,chase,team,team_id,player_id,player:player_id(id,name)').eq(scopeCol,scopeId);
 q=dbCardFilters(q,o);
 /* Always apply the user's sort — filtered OR not. Measured server-side: broad filter + order
    by an indexed column (checklist_id,name,id / ,value,id) returns in ~1ms via index scan;

async function dbEnsureSet(name,sport){name=(name||'').trim();if(!name)return null;try{

}catch(e){return null;}}
async function dbInsertCards(clId,setId,cards,onProgress){let done=0;const B=500;for(let i=0;i<cards.length;i+=B){const chunk=cards.slice(i,i+B).map(c=>({checklist_id:clId,set_id:setId||null,player_id:c.player_id||null,team_id:c.team_id||null,team:c.team||null,num:c.num||null,name:c.name||null,set_name:c.set_name||c.set||null,rarity:c.rarity||null,value:(c.value===''||c.value==null)?null:+c.value,parallel:c.parallel||null,card_type:c.cardType||c.card_type||'base',serial:c.serial||null,color:c.color||null,rookie:c.rookie==null?null:!!c.rookie,chase:!!c.chase,attrs:c.extra||{}}));const{error}=await sb.from('e10_cards').insert(chunk);if(error)throw error;done+=chunk.length;if(onProgress)onProgress(done,cards.length);}return done;}
/* Team resolution on import: dedup by exact (case-insensitive) name against e10_teams — links
   team_id to the existing team, or creates one (admin) so no duplicate teams are made. Mirrors the
   player exact-link/create path; the same lower(name) unique index enforces the dedup server-side. */
async function resolveTeams(cards){const names=[...new Set(cards.map(c=>(c.team||'').trim()).filter(Boolean))];if(!names.length)return;const map={};
 for(let i=0;i<names.length;i+=150){const batch=names.slice(i,i+150);try{const{data}=await sb.from('e10_teams').select('id,name').in('name',batch);(data||[]).forEach(t=>map[t.name.toLowerCase()]=t.id);}catch(e){}}
 const need=names.filter(n=>!(n.toLowerCase() in map));
 for(let i=0;i<need.length;i+=200){const batch=need.slice(i,i+200).map(nm=>({name:nm}));try{const{data}=await sb.from('e10_teams').insert(batch).select('id,name');(data||[]).forEach(t=>map[t.name.toLowerCase()]=t.id);}catch(e){/* likely non-admin (RLS) or unique conflict → refetch to link existing */try{const{data}=await sb.from('e10_teams').select('id,name').in('name',need.slice(i,i+200));(data||[]).forEach(t=>map[t.name.toLowerCase()]=t.id);}catch(_){}}}
 cards.forEach(c=>{const k=(c.team||'').trim().toLowerCase();if(k&&map[k])c.team_id=map[k];});}
/* Resolution: match distinct card names to existing players (case-insensitive exact = confident auto-link);
   surface likely-but-uncertain matches (a player whose name shares the last token) for the user to confirm. */
async function planResolution(cards){const names=[...new Set(cards.map(c=>(c.name||'').trim()).filter(Boolean))];const exact={};
 for(let i=0;i<names.length;i+=150){const batch=names.slice(i,i+150);try{const{data}=await sb.from('e10_players').select('id,name').in('name',batch);(data||[]).forEach(p=>exact[p.name.toLowerCase()]=p);}catch(e){}}
 const linked={},unresolved=[];names.forEach(n=>{const hit=exact[n.toLowerCase()];if(hit)linked[n.toLowerCase()]=hit.id;else unresolved.push(n);});
 const prompts=[];for(const n of unresolved.slice(0,40)){const last=n.split(/[ ,]+/).filter(Boolean).pop();if(!last||last.length<3)continue;try{const{data}=await sb.from('e10_players').select('id,name').ilike('name','%'+last+'%').limit(3);if(data&&data.length)prompts.push({name:n,candidates:data});}catch(e){}}
 return {names,linked,unresolved,prompts};}
async function commitImport(cl,setId,linkMap){toast('Committing '+cl.cards.length+' cards…');
 if(cl._resolve!==false){
   // create new players for names not linked, in bulk
   const linked=Object.assign({},linkMap);const need=[...new Set(cl.cards.map(c=>(c.name||'').trim()).filter(n=>n&&!(n.toLowerCase() in linked)))];
   const sport=(/soccer|nfl|nba|mlb|sport|prizm|topps|panini|football|basketball|baseball|world cup/i.test((cl.name||'')+' '+(cl.set||'')))?'Soccer':null;
   for(let i=0;i<need.length;i+=200){const batch=need.slice(i,i+200).map(nm=>({name:nm,sport:sport}));try{const{data}=await sb.from('e10_players').insert(batch).select('id,name');(data||[]).forEach(p=>linked[p.name.toLowerCase()]=p.id);}catch(e){try{const{data}=await sb.from('e10_players').select('id,name').in('name',need.slice(i,i+200));(data||[]).forEach(p=>linked[p.name.toLowerCase()]=p.id);}catch(_){}}}
   cl.cards.forEach(c=>{c.player_id=linked[(c.name||'').trim().toLowerCase()]||null;});
 } else cl.cards.forEach(c=>{c.player_id=null;});
 await resolveTeams(cl.cards); // link/create team_id for any mapped team column (dedup by name)
 // checklist row
 let clId;try{const{data,error}=await sb.from('e10_checklists').insert({name:cl.name||'Imported checklist',set_id:setId,source:(cl._meta&&cl._meta.mode)||'import'}).select('id').single();if(error)throw error;clId=data.id;}catch(e){toast('Create checklist failed: '+e.message);return;}
 try{await dbInsertCards(clId,setId,cl.cards,(d,t)=>{if(d%2000===0||d===t)toast('Inserted '+d.toLocaleString()+'/'+t.toLocaleString());});}catch(e){toast('Insert failed: '+e.message);return;}
 try{await sb.from('e10_checklists').update({card_count:cl.cards.length}).eq('id',clId);}catch(e){}
 clReviewMode=false;PENDING_CL=null;delete GRIDS['cl:__review__'];toast('Checklist added ('+cl.cards.length.toLocaleString()+' cards)');openServerChecklist(clId,cl.name);}

function validateChecklist(p){const idx=rx=>p.columns.findIndex(c=>new RegExp(rx,'i').test(c));
 const ni=idx('card ?name|^name$|name|title|card'),vi=idx('value|market|price');
 const missing=[];if(ni<0)missing.push('Card Name');
 const errors=[],valid=[];
 p.rows.forEach((rw,i)=>{if(rw.every(c=>!(''+(c==null?'':c)).trim()))return;const rn=i+2,er=[];
   const name=(ni>=0?(rw[ni]||''):'').trim();if(!name)er.push(['Card Name','Card Name is required']);
   if(vi>=0&&(rw[vi]||'').trim()){const v=(rw[vi]||'').trim();const clean=v.replace(/[^0-9.]/g,'');if(clean===''||isNaN(parseFloat(clean)))er.push(['Market Value',`"${v}" is not a number`]);}
   if(er.length)er.forEach(([c,m])=>errors.push({row:rn,col:c,msg:m}));else valid.push(rw);
 });
 return {missing,errors,valid,columns:p.columns};
}
function uploadChecklist(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const p=parseCSV(e.target.result);const res=validateChecklist(p);
 if(res.missing.length){importReport('Checklist upload',`Missing required column(s): ${res.missing.join(', ')}. Download the checklist template and keep its header row.`,null,null);return;}
 const commit=rows=>{S.checklists.push({name:f.name,columns:res.columns,rows});save();renderData();toast('Checklist added ('+rows.length+' rows)');};
 if(res.errors.length){importReport('Checklist upload',null,res.errors,res.valid.length?function(){commit(res.valid);}:null);return;}
 if(!res.valid.length){importReport('Checklist upload','No data rows found in the file.',null,null);return;}
 commit(res.valid);
};r.readAsText(f);inp.value='';}

 const vals=[...new Set(cl.rows.map(r=>r[ci]).filter(v=>v&&v.trim()))];if(!vals.length){toast('No values in that column');return;}

const INVCATS=['Box','Case','ETB / Sealed','Pack','Raw card','Slab','Other'];
const TPG=['PSA','BGS','SGC','CGC','TAG']; // third-party graders
/* Parse a legacy free-text cond like "PSA 9" / "SGC 9.5" into structured grade fields.
   Non-TPG values ("Sealed","LP","NM","PSA mixed") return null and stay in cond — never drop data. */
function parseGrade(cond){const m=(cond||'').trim().match(/^(PSA|BGS|SGC|CGC|TAG)\s*([0-9]{1,2}(?:\.[05])?)$/i);return m?{gradingCompany:m[1].toUpperCase(),grade:m[2]}:null;}
let dataTab='overview';
let exCopyRef=''; // Whatnot Export: which show's attached copy to prefill
/* ===== Reusable configurable-grid engine (drives inventory + checklists from a descriptor) =====
   A grid G = {id, sk (localStorage prefix), cfg, state{cols,sort,filters,views,activeView}}.
   cfg supplies: cols[] (descriptor), defaultCols[], defaultSort, defaultFilters, base(G)->rows,
   filter(row,f)->bool, searchFn(row,q)->bool, listBoxId, colsMenuId, footer(rows,admin), render(),
   onApply(G), migrate(G), viewPrompt. Column: {key,label,type,core,first,sortable,sortVal(row),cell(row,admin,G)}. */
const GRIDS={};
function gLoad(k,def){try{const v=JSON.parse(localStorage.getItem(k));return v==null?def:v;}catch(e){return def;}}
function makeGrid(id,cfg){const sk=cfg.sk;const G={id,sk,cfg,state:{cols:gLoad(sk+'_cols',null),sort:gLoad(sk+'_sort',cfg.defaultSort||{col:cfg.defaultCols[0],dir:1}),filters:Object.assign({},cfg.defaultFilters||{},gLoad(sk+'_filters',{})),views:gLoad(sk+'_views',[]),widths:gLoad(sk+'_widths',{})||{},activeView:-1}};if(cfg.migrate)cfg.migrate(G);GRIDS[id]=G;return G;}
function gColDef(G,k){return G.cfg.cols.find(c=>c.key===k);}
function gVisibleKeys(G){let keys=(Array.isArray(G.state.cols)&&G.state.cols.length?G.state.cols:G.cfg.defaultCols).filter(k=>gColDef(G,k));G.cfg.cols.filter(c=>c.core).forEach(c=>{if(!keys.includes(c.key)){if(c.first)keys.unshift(c.key);else keys.push(c.key);}});return keys;}
function gVisibleCols(G){return gVisibleKeys(G).map(k=>gColDef(G,k));}
function gPersist(G){try{const s=G.sk;localStorage.setItem(s+'_cols',JSON.stringify(gVisibleKeys(G)));localStorage.setItem(s+'_sort',JSON.stringify(G.state.sort));localStorage.setItem(s+'_filters',JSON.stringify(G.state.filters));localStorage.setItem(s+'_views',JSON.stringify(G.state.views));localStorage.setItem(s+'_widths',JSON.stringify(G.state.widths||{}));}catch(e){}}
function gRows(G){let rows=G.cfg.base(G).slice();const f=G.state.filters;const q=(f.search||'').trim().toLowerCase();
 if(q&&G.cfg.searchFn)rows=rows.filter(r=>G.cfg.searchFn(r,q));
 if(G.cfg.filter)rows=rows.filter(r=>G.cfg.filter(r,f));
 const sc=gColDef(G,G.state.sort.col)||gVisibleCols(G)[0],d=G.state.sort.dir,key=sc?sc.sortVal:(_=>0);
 return rows.sort((a,b)=>{const ka=key(a),kb=key(b);return (ka<kb?-1:ka>kb?1:0)*d;});}
/* ===== drag-to-resize columns (shared: every grid built on this engine inherits it) =====
   Widths live in G.state.widths keyed by column key, persisted next to cols/sort/filters/views and
   captured by saved views. Until the user drags a column the grid renders exactly as before (auto
   table layout); the first drag freezes current widths and switches that grid to fixed layout so
   widths hold. Min width 48px. */
let _gResizing=false;
function gWidthsActive(G){return !!(G.state.widths&&Object.keys(G.state.widths).length);}
function gGrip(G,c){return `<span class="colgrip" onmousedown="gResizeStart(event,'${G.id}','${c.key}')" onclick="event.stopPropagation()" title="Drag to resize column"></span>`;}
function gSortTh(G,c){const wa=gWidthsActive(G);const w=(G.state.widths&&G.state.widths[c.key])||(wa?130:0);const wst=w?` style="width:${w}px"`:'';const grip=gGrip(G,c);
 if(!c.sortable)return `<th${wst}>${grip}</th>`;
 const on=G.state.sort.col===c.key;return `<th class="srt${on?' on':''}"${wst} onclick="gSortSet('${G.id}','${c.key}')">${esc(c.label)}<span class="chev">${on?(G.state.sort.dir>0?'▲':'▼'):'↕'}</span>${grip}</th>`;}
function gApplyWidths(G){const box=$(G.cfg.listBoxId);if(!box)return;const table=box.querySelector('table');if(!table)return;const wa=gWidthsActive(G);const cols=gVisibleCols(G);const sum=gSumWidths(G,cols);
 table.style.tableLayout=wa?'fixed':'';table.style.width=wa?(sum+'px'):'';table.style.minWidth=wa?(sum+'px'):'';
 const ths=[...table.querySelectorAll('tr:first-child > th')];
 ths.forEach((t,idx)=>{const ck=cols[idx]&&cols[idx].key;const w=(ck&&G.state.widths&&G.state.widths[ck])||(wa?130:0);t.style.width=w?w+'px':'';});}
function gResizeStart(ev,id,key){ev.preventDefault();ev.stopPropagation();const G=GRIDS[id];if(!G)return;const box=$(G.cfg.listBoxId);const table=box&&box.querySelector('table');if(!table)return;
 _gResizing=true;const cols=gVisibleCols(G),ths=[...table.querySelectorAll('tr:first-child > th')];
 G.state.widths=G.state.widths||{};
 ths.forEach((t,idx)=>{const ck=cols[idx]&&cols[idx].key;if(ck&&!(ck in G.state.widths))G.state.widths[ck]=Math.round(t.getBoundingClientRect().width);}); /* freeze current widths so switching to fixed doesn't jump */
 gApplyWidths(G);
 const startX=ev.clientX,startW=G.state.widths[key]||Math.round((ev.target.closest('th')||{getBoundingClientRect:()=>({width:120})}).getBoundingClientRect().width);
 const move=e=>{G.state.widths[key]=Math.max(48,Math.round(startW+(e.clientX-startX)));gApplyWidths(G);};
 const up=()=>{document.removeEventListener('mousemove',move,true);document.removeEventListener('mouseup',up,true);document.body.style.cursor='';document.body.style.userSelect='';gPersist(G);setTimeout(()=>{_gResizing=false;},0);};
 document.body.style.cursor='col-resize';document.body.style.userSelect='none';
 document.addEventListener('mousemove',move,true);document.addEventListener('mouseup',up,true);}
function gSortSet(id,key){if(_gResizing)return;const G=GRIDS[id];if(!G)return;if(G.state.sort.col===key)G.state.sort.dir*=-1;else G.state.sort={col:key,dir:1};gPersist(G);if(G.cfg.onSort){G.cfg.onSort(G);return;}gRenderList(G);}
function gRenderList(G){const box=$(G.cfg.listBoxId);if(!box)return;gPersist(G);const admin=ROLE==='admin';const rows=gRows(G),cols=gVisibleCols(G);
 const wa=gWidthsActive(G);const sumW=wa?gSumWidths(G,cols):0;
 box.innerHTML=`<div class="egrid wide" style="margin-top:12px"><table${wa?` style="table-layout:fixed;width:${sumW}px;min-width:${sumW}px"`:''}><tr>${cols.map(c=>gSortTh(G,c)).join('')}</tr>${rows.map(i=>`<tr>${cols.map(c=>c.cell(i,admin,G)).join('')}</tr>`).join('')||`<tr><td colspan="${cols.length}" style="color:var(--mut)">No rows match.</td></tr>`}</table></div>${G.cfg.footer?G.cfg.footer(rows,admin):''}`;}
function gSumWidths(G,cols){cols=cols||gVisibleCols(G);const wa=gWidthsActive(G);return cols.reduce((a,c)=>a+((G.state.widths&&G.state.widths[c.key])||(wa?130:0)),0);}
function gColMenuHTML(G){const vis=gVisibleKeys(G),hidden=G.cfg.cols.filter(c=>!vis.includes(c.key));
 const row=(c,idx,shown)=>`<div class="grow"><label style="flex:1;display:flex;align-items:center;gap:6px;margin:0"><input type="checkbox" style="width:auto" ${shown?'checked':''} ${c.core?'disabled':''} onchange="gToggleCol('${G.id}','${c.key}',this.checked)"> ${esc(c.label||'Actions')}${c.core?' <span class="lab">core</span>':''}</label>${(shown&&!c.core)?`<button class="btn x sm" ${idx===0?'disabled':''} onclick="gMoveCol('${G.id}','${c.key}',-1)">▲</button><button class="btn x sm" onclick="gMoveCol('${G.id}','${c.key}',1)">▼</button>`:''}</div>`;
 return `<div class="lab" style="margin-bottom:4px">Shown (order with ▲▼)</div>${vis.map((k,idx)=>row(gColDef(G,k),idx,true)).join('')}${hidden.length?`<div class="lab" style="margin:8px 0 4px">Add column</div>${hidden.map(c=>row(c,0,false)).join('')}`:''}<div class="row" style="margin-top:8px"><button class="btn x sm" onclick="gResetCols('${G.id}')">Reset to default</button></div>`;}
function gRenderCols(G){const el=$(G.cfg.colsMenuId);if(el)el.innerHTML=gColMenuHTML(G);}
function gToggleCol(id,key,on){const G=GRIDS[id];const c=gColDef(G,key);if(!c||c.core)return;let keys=gVisibleKeys(G);if(on){if(!keys.includes(key)){const li=keys.findIndex(k=>gColDef(G,k).core&&!gColDef(G,k).first);keys.splice(li>=0?li:keys.length,0,key);}}else keys=keys.filter(k=>k!==key);G.state.cols=keys;gPersist(G);gRenderCols(G);gRenderList(G);}
function gMoveCol(id,key,dir){const G=GRIDS[id];let keys=gVisibleKeys(G);const i=keys.indexOf(key),j=i+dir;if(i<0||j<0||j>=keys.length||gColDef(G,key).core||gColDef(G,keys[j]).core)return;[keys[i],keys[j]]=[keys[j],keys[i]];G.state.cols=keys;gPersist(G);gRenderCols(G);gRenderList(G);}

function invTotals(){let cost=0,val=0,byCat={},qty=0;const view=invView();view.forEach(i=>{const q=+i.qty||1,c=(+i.cost||0)*q,v=(+i.value||0)*q;cost+=c;val+=v;qty+=q;byCat[i.cat]=(byCat[i.cat]||0)+v;});return{cost,val,byCat,qty,cnt:view.length,gain:val-cost};}
function svgBars(entries){if(!entries.length)return '<div style="color:var(--mut);font-size:13px">No inventory yet.</div>';
 const max=Math.max(...entries.map(e=>e.value),1),bw=230,h=entries.length*30+8;let s=`<svg viewBox="0 0 440 ${h}" width="100%" style="max-width:470px">`;
 entries.forEach((e,i)=>{const y=i*30+6,w=Math.max(2,e.value/max*bw);s+=`<text x="0" y="${y+15}" font-size="12" fill="#6b6d73" font-family="'Inter',sans-serif">${esc(e.label)}</text><rect x="140" y="${y+4}" width="${w}" height="15" rx="4" fill="#0A0B0D"></rect><text x="${146+w}" y="${y+16}" font-size="11" fill="#0A0B0D" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace">${money(e.value)}</text>`;});
 return s+`</svg>`;}
function svgSpark(){const base=invTotals().val||1000,pts=[];for(let i=0;i<12;i++)pts.push(base*(0.92+0.16*Math.sin(i/2)+i/60));
 const max=Math.max(...pts),min=Math.min(...pts),W=440,H=90;const path=pts.map((p,i)=>`${(i/(pts.length-1)*W).toFixed(0)},${(H-((p-min)/(max-min||1))*(H-14)-6).toFixed(0)}`).join(' ');
 return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:470px"><polyline points="${path}" fill="none" stroke="#1F5EFF" stroke-width="2" stroke-dasharray="5 4"/></svg><div class="lab" style="margin-top:6px;color:var(--red)">⚠ Illustrative sample — not live data. Connect a price source (TCGplayer / PriceCharting) to populate.</div>`;}

function invRollup(items){items=items||invView();let cost=0,market=0,committed=0,free=0,aging=0;items.forEach(i=>{const q=+i.qty||0,v=+i.value||0,c=+i.cost||0;cost+=c*q;market+=v*q;committed+=v*invReserved(i);free+=v*invAvailable(i);if(invAge(i)>30&&invAvailable(i)>0)aging+=v*q;});return{cost,market,gain:market-cost,committed,free,aging};}

async function reserveUnits(itemId,showRef,qty){

  const avail=Math.max(0,(+it.qty||0)-(it.reservations||[]).reduce((s,x)=>s+(+x.qty||0),0));
  if(!admin&&qty>avail)return{ok:false,msg:'Only '+avail+' free right now — reservation blocked'};
  if(!Array.isArray(it.reservations))it.reservations=[];
  const ex=it.reservations.find(x=>x.showId===showId&&x.streamerUid===streamer);
  if(ex)ex.qty+=qty;else it.reservations.push({showId,showLabel,streamerUid:streamer,qty});
  return{ok:true,msg:'Reserved '+qty+' → '+showLabel};});
 toast(res.ok?res.msg:('Reserve failed: '+res.msg));return res;
}
async function releaseReservation(itemId,showId,streamerUid){

  const it=base.inventory.find(x=>x.id===itemId);if(!it)return{ok:false,msg:'Item not found'};

}
async function markSold(itemId,sellQty,proceeds){

  const it=base.inventory.find(x=>x.id===itemId);if(!it)return{ok:false,msg:'Item not found'};
  const reserved=(it.reservations||[]).reduce((s,x)=>s+(+x.qty||0),0);const avail=Math.max(0,(+it.qty||0)-reserved);
  if(!admin&&sellQty>avail)return{ok:false,msg:'Only '+avail+' free to sell (rest reserved)'};

}

function rollRandom(p){const pool=(p.pool||[]).filter(c=>c.name);const n=Math.max(1,p.count||5);const out=[];if(!pool.length)return out;
 for(let k=0;k<n;k++){const tot=pool.reduce((s,c)=>s+(+c.weight||1),0);let r=Math.random()*tot,pick=pool[0];for(const c of pool){r-=(+c.weight||1);if(r<=0){pick=c;break;}}out.push(pick);}return out;}
function launchOpen(id){const p=(S.repacks||[]).find(x=>x.id===id);if(!p)return;const cards=(p.mode==='random'?rollRandom(p):(p.cards||[]).slice()).filter(c=>c&&c.name);
 if(!cards.length){toast('Add cards first');return;}
 try{localStorage.setItem('e10_open',JSON.stringify({product:{name:p.name,kind:p.kind,price:p.price,chase:p.chase},cards}));}catch(e){toast('Could not stage opener');return;}

 const payload={comments:base.comments,todos:base.todos,streamers:base.streamers,lists:base.lists,attachments:base.attachments,checklists:base.checklists,inventory:base.inventory,repacks:base.repacks};

 }
 return `<div class="out" style="margin-top:8px;padding:12px;border-left:3px solid #0a8a4a"><div class="row" style="justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
   <div style="min-width:0;flex:1"><div style="font-weight:700;font-size:15px">${i+1}. ${esc(sl.label||'Spot')} <span style="color:#0a8a4a">✓ sold</span></div>
     <div class="lab" style="text-transform:none;letter-spacing:0;font-size:12.5px">👤 <b>${esc(sl.buyer_handle||'?')}</b>${sl.buyer_uid?' 🔗':''} · <b>${money(+sl.price||0)}</b>${band?(' · '+band):''}</div></div>
   <div class="row" style="gap:6px"><button class="btn sm" onclick="liveMarkSold('${sl.id}')">Edit</button><button class="btn sm" onclick="liveReopen('${sl.id}')">Reopen</button></div></div></div>`;
}
async function dbBuyerSearch(q){if(!LIVE.session)return[];try{const{data}=await sb.rpc('e10_buyer_suggest',{p_session:LIVE.session.id,p_q:q||''});return (data||[]).map(x=>({id:x.id||null,label:x.label,sub:x.sub==='roster'?'in roster':'past buyer'}));}catch(e){return[];}}
function liveMarkSold(id){const sl=LIVE.slots.find(x=>x.id===id);if(!sl)return;
 const band=(sl.band_expected!=null)?(' · exp '+money(+sl.band_expected||0)):'';
 $('modal').innerHTML=`<h3 style="font-size:17px">${sl.state==='sold'?'Edit sold':'Sold'} — ${esc(sl.label||'Spot')}</h3>
  <div class="lab" style="margin:2px 0 12px;text-transform:none;letter-spacing:0">${esc(sl.method||'auction')}${band}</div>
  <label>Winner — Whatnot handle</label>${entityPicker('soldBuyer',{icon:'👤',server:true,minChars:1,debounce:180,freeText:true,placeholder:'search roster / past buyers, or type a new handle…',value:(sl.buyer_handle?{id:sl.buyer_uid||null,label:sl.buyer_handle}:null),search:dbBuyerSearch,onpick:()=>{},onclear:()=>{}})}
  <label style="margin-top:12px">Hammer price $</label><input id="soldPrice" type="number" inputmode="decimal" value="${sl.price!=null?sl.price:''}" placeholder="0" style="font-size:22px;padding:12px;width:100%">
  <div class="row" style="margin-top:16px;gap:8px"><button class="btn v" style="flex:1;padding:14px;font-size:15px" onclick="liveConfirmSold('${id}')">✓ Confirm sold</button><button class="btn" onclick="closeM()">Cancel</button></div>`;
 $('ov').style.display='flex';
 setTimeout(()=>{const inp=$('epi_soldBuyer');if(inp)inp.focus();},60);
}
async function liveConfirmSold(id){const sl=LIVE.slots.find(x=>x.id===id);if(!sl)return;
 const e=EP['soldBuyer'],picked=e&&e.value,raw=($('epi_soldBuyer')||{}).value;
 const handle=((picked&&picked.label)||(raw||'')).trim();
 const buyerUid=(picked&&picked.label&&picked.label.trim()===handle)?(picked.id||null):null;
 const price=+(($('soldPrice')&&$('soldPrice').value)||0)||0;
 if(!handle){toast('Enter a winner handle');const inp=$('epi_soldBuyer');if(inp)inp.focus();return;}
 const patch={buyer_handle:handle,buyer_uid:buyerUid,price,state:'sold',sold_at:new Date().toISOString(),updated_at:new Date().toISOString()};
 try{const{error}=await sb.from('e10_break_slots').update(patch).eq('id',id);if(error)throw error;}catch(err){toast(err.message);return;}
 Object.assign(sl,patch);await liveEvent('spot_sold',id,{buyer_handle:handle,buyer_uid:buyerUid,price,team_id:sl.team_id,player_id:sl.player_id,label:sl.label});
 closeM();renderLive();toast('Sold to '+handle+' · '+money(price));
}
async function liveReopen(id){const sl=LIVE.slots.find(x=>x.id===id);if(!sl)return;
 try{const{error}=await sb.from('e10_break_slots').update({state:'available',sold_at:null,updated_at:new Date().toISOString()}).eq('id',id);if(error)throw error;}catch(e){toast(e.message);return;}
 sl.state='available';sl.sold_at=null;await liveEvent('spot_reopened',id,{label:sl.label});renderLive();toast('Reopened '+(sl.label||'spot'));
}
async function liveStartFromFormat(modelId){const model=(S.breaks||[]).find(b=>b.id===modelId);if(!model){toast('Model not found');return;}
 if(!canEditScoped())return roGuard();
 if(LIVE.session){go('live');toast('End the current live session first');return;}
 const rs=(model.ruleSlots||[]);if(!rs.length){toast('This model has no formatted spots — build slots in the planner first.');return;}
 const tb=model.tierBands||[],proj=modelProjection(model);
 let cardMap={};
 if(model.checklistId){try{const payload=rs.map(s=>({name:s.name||'',include:s.include||[],exclude:s.exclude||[],remainder:!!s.remainder}));
   const{data}=await sb.rpc('e10_slot_cards',{p_checklist:model.checklistId,p_slots:payload,p_limit:60});
   (data||[]).forEach(x=>{cardMap[x.i]={count:x.count,cards:x.cards||[]};});}catch(e){}}
 const{data:sess,error}=await sb.from('e10_break_sessions').insert({streamer_uid:MEID,name:model.name+' — live',
   format_id:model.id,break_type:model.breakType||null,cost:proj.cost,proj_low:proj.low,proj_expected:proj.exp,proj_high:proj.high}).select().maybeSingle();
 if(error){toast('Could not start: '+error.message);return;}
 LIVE.session=sess;LIVE.slots=[];await liveEvent('session_started',null,{name:sess.name,format_id:model.id});
 for(let i=0;i<rs.length;i++){const s=rs[i],take=modelTake(s,tb),tierName=(tb.find(t=>t.id===s.tierId)||{}).name||'';
   const teamC=(s.include||[]).find(c=>c.field==='team'&&c.valueId),playerC=(s.include||[]).find(c=>c.field==='player'&&c.valueId),cm=cardMap[i]||{count:null,cards:[]};
   const ins={session_id:sess.id,label:s.name||('Spot '+(i+1)),position:i,method:s.method||'$1auction',tier:tierName,
     band_low:take.low,band_expected:take.expected,band_high:take.high,
     team_id:teamC?teamC.valueId:null,player_id:playerC?playerC.valueId:null,
     price:((s.method==='fixed')?(+s.price||0):null),
     plan:{formatSlotId:s.id,breakType:model.breakType||null,tierName,remainder:!!s.remainder,cardCount:cm.count,cards:cm.cards}};
   try{const{data:sl}=await sb.from('e10_break_slots').insert(ins).select().maybeSingle();if(sl)LIVE.slots.push(sl);}catch(e){}}
 LIVE_SEED=null;liveSubscribe();go('live');renderLive();toast('Live break started — '+LIVE.slots.length+' formatted spots');
}
/* projection of a SAVED model (pure; mirrors phase-2 computeProjection, reads through the same band shape) */
function modelBand(slot,tierBands){const o=slot.bandOverride;
 if(o&&((+o.low||0)+(+o.expected||0)+(+o.high||0))>0)return {low:+o.low||0,expected:+o.expected||0,high:+o.high||0};
 const t=(tierBands||[]).find(t=>t.id===slot.tierId);if(t)return {low:+t.low||0,expected:+t.expected||0,high:+t.high||0};
 return {low:0,expected:0,high:0};}
function modelTake(slot,tierBands){if((slot.method||'$1auction')==='fixed'){const p=+slot.price||0;return {low:p,expected:p,high:p};}return modelBand(slot,tierBands);}
function modelProjection(model){const slots=(model.ruleSlots||[]),tb=model.tierBands||[];const takes=slots.map(s=>modelTake(s,tb));
 return {low:takes.reduce((a,t)=>a+t.low,0),exp:takes.reduce((a,t)=>a+t.expected,0),high:takes.reduce((a,t)=>a+t.high,0),cost:+((model.inputs&&model.inputs.cost)||model.cost||0),slotCount:slots.length};}
/* ===== Buyer-grouped fulfillment / ship list — flips sold spots by-buyer, across sessions ===== */
let FULFILL={groups:{},sess:{}};
async function renderFulfill(){const el=$('sec-fulfill');if(!el)return;if(!sb){el.innerHTML='<div class="card">Connecting…</div>';return;}
 el.innerHTML=`<div class="hero"><div><h1>Ship — buyer fulfillment</h1><div class="sub">Every won spot grouped by buyer, across all your breaks</div></div><button class="btn sm" onclick="renderFulfill()">↻ Refresh</button></div><div id="fulfillBody"><div class="card"><div class="lab" style="text-transform:none;letter-spacing:0">Loading…</div></div></div>`;
 let sessions=[];try{const{data}=await sb.from('e10_break_sessions').select('id,name,created_at,cost,streamer_uid').order('created_at',{ascending:false});sessions=(data||[]).filter(s=>ROLE==='admin'||s.streamer_uid===MEID);}catch(e){}
 FULFILL.sess={};sessions.forEach(s=>FULFILL.sess[s.id]=s);
 const sids=sessions.map(s=>s.id);
 const body=$('fulfillBody');if(!body)return;
 if(!sids.length){body.innerHTML='<div class="card"><div class="lab" style="text-transform:none;letter-spacing:0">No break sessions yet. Start one from a saved format in the Break planner (▶ Live).</div></div>';return;}
 let slots=[];try{const{data}=await sb.from('e10_break_slots').select('*').in('session_id',sids).eq('state','sold').order('sold_at',{ascending:false});slots=data||[];}catch(e){}
 const groups={};
 slots.forEach(sl=>{const key=sl.buyer_uid?('u:'+sl.buyer_uid):('h:'+(sl.buyer_handle||'').trim().toLowerCase());if(key==='h:')return;
   (groups[key]=groups[key]||{key,handle:sl.buyer_handle||'(no handle)',lines:[],total:0});
   const g=groups[key];g.lines.push(sl);g.total+=(+sl.price||0);if((!g.handle||g.handle==='(no handle)')&&sl.buyer_handle)g.handle=sl.buyer_handle;});
 FULFILL.groups=groups;
 const arr=Object.values(groups).sort((a,b)=>b.total-a.total);
 if(!arr.length){body.innerHTML='<div class="card"><div class="lab" style="text-transform:none;letter-spacing:0">No sold spots yet. As you mark spots sold in a live break, buyers roll up here into pack-and-ship lists.</div></div>';return;}
 const grand=arr.reduce((a,g)=>a+g.total,0),lineCount=slots.length;
 let h=`<div class="card" style="margin-bottom:12px"><div class="row" style="gap:14px;flex-wrap:wrap"><div class="metric"><div class="n">${arr.length}</div><div class="l">Buyers</div></div><div class="metric"><div class="n">${lineCount}</div><div class="l">Spots won</div></div><div class="metric"><div class="n">${money(grand)}</div><div class="l">Total hammer</div></div></div></div>`;
 arr.forEach(g=>{h+=fulfillBuyerHTML(g);});
 body.innerHTML=h;
}
function fulfillBuyerHTML(g){const st=g.lines.map(l=>l.ship_state||'open');
 const allShipped=st.every(s=>s==='shipped'),allPacked=st.every(s=>s==='packed'||s==='shipped');
 const badge=allShipped?['#0a8a4a','shipped']:(allPacked?['#b8860b','packed']:['#8a8f98','open']);
 let h=`<div class="card" style="margin-bottom:12px"><div class="row" style="justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
   <h3 style="font-size:16px">👤 ${esc(g.handle)} <span class="pill" style="margin-left:6px;background:${badge[0]}22;color:${badge[0]};border-color:${badge[0]}">${badge[1]}</span></h3>
   <div class="row" style="gap:6px;align-items:center"><b>${money(g.total)}</b> · ${g.lines.length} spot${g.lines.length===1?'':'s'}
     <button class="btn sm" onclick="shipBuyerAll('${g.key}','packed')">Mark all packed</button><button class="btn v sm" onclick="shipBuyerAll('${g.key}','shipped')">Mark all shipped</button></div></div>
   <div class="egrid wide" style="margin-top:8px"><table><tr><th>Show / date</th><th>Spot</th><th>Cards to pull</th><th>Hammer</th><th>Status</th><th>Tracking / note</th></tr>`;
 g.lines.forEach(l=>{const sess=FULFILL.sess[l.session_id]||{};const dt=sess.created_at?new Date(sess.created_at).toLocaleDateString():'';
   const cards=(l.plan&&l.plan.cards)||[],cc=(l.plan&&l.plan.cardCount);
   const cardTxt=cards.length?(cards.slice(0,4).map(c=>esc(c.name)).join(', ')+((cc&&cc>cards.length)?(' +'+(cc-cards.length)):(cards.length>4?' …':''))):(l.plan&&l.plan.remainder?'Field / remainder':'—');
   h+=`<tr><td>${esc(sess.name||'—')}<div class="lab" style="text-transform:none;letter-spacing:0;font-size:11px">${dt}</div></td>
     <td><b>${esc(l.label||'')}</b>${l.tier?`<div class="lab" style="text-transform:none;letter-spacing:0;font-size:11px">${esc(l.tier)}</div>`:''}</td>
     <td class="lab" style="text-transform:none;letter-spacing:0;font-size:12px;max-width:260px">${cardTxt}</td>
     <td class="mono">${money(+l.price||0)}</td>
     <td><select onchange="shipSetLine('${l.id}','ship_state',this.value)">${['open','packed','shipped'].map(x=>`<option ${((l.ship_state||'open')===x)?'selected':''}>${x}</option>`).join('')}</select></td>
     <td><input value="${esc(l.ship_note||'')}" placeholder="tracking #" style="width:150px;font-size:12px" onchange="shipSetLine('${l.id}','ship_note',this.value)"></td></tr>`;});
 return h+`</table></div></div>`;
}
async function shipSetLine(id,field,val){const patch={updated_at:new Date().toISOString()};patch[field]=(val===''?null:val);
 try{const{error}=await sb.from('e10_break_slots').update(patch).eq('id',id);if(error)throw error;}catch(e){toast(e.message);return;}
 // update in-memory so a status re-render reflects it without a full refetch
 Object.values(FULFILL.groups).forEach(g=>g.lines.forEach(l=>{if(l.id===id)l[field]=patch[field];}));
 if(field==='ship_state')renderFulfill();else toast('Saved');
}
async function shipBuyerAll(key,state){const g=FULFILL.groups[key];if(!g)return;
 try{const ids=g.lines.map(l=>l.id);const{error}=await sb.from('e10_break_slots').update({ship_state:state,updated_at:new Date().toISOString()}).in('id',ids);if(error)throw error;}catch(e){toast(e.message);return;}
 g.lines.forEach(l=>l.ship_state=state);renderFulfill();toast('Buyer marked '+state);
}
boot();
</script></body></html>
