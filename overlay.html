<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=1080,initial-scale=1">
<title>Element 10 — Live Overlay (1080×1920)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
/* Designed for a Whatnot vertical browser source: EXACTLY 1080x1920, transparent except panels.
   Compression-hardened for ~3 Mbps: solid fills, thick borders, big bold type, no hairlines,
   no blur/backdrop-filter, no fine gradients, high contrast. Min readable size ~26px. */
:root{--volt:#C6FF3A;--ink:#0A0B0D;--red:#E8332B;--gold:#FFD23A;--cyan:#37C0FF;--grey:#AEB6C0;
 --panel:#0A0B0D;--panel2:#12151B;--line:#FFFFFF;--font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1080px;height:1920px;background:transparent;font-family:var(--font);color:#fff;overflow:hidden;-webkit-font-smoothing:antialiased}
#stage{position:fixed;left:0;top:0;width:1080px;height:1920px;overflow:hidden}
.hide{display:none!important}
/* ---- shared chunky panel + type ---- */
.panel{background:var(--panel);border:5px solid #fff;border-radius:22px}
.panel.volt{border-color:var(--volt)}
.brand{font-weight:900;text-transform:uppercase;letter-spacing:.02em;line-height:1}
.brand b{background:var(--volt);color:#000;padding:0 10px;border-radius:8px}
.up{text-transform:uppercase}
.mono{font-variant-numeric:tabular-nums}
/* pos helpers use absolute px on the 1080x1920 stage */
.abs{position:absolute}
/* ---- name-plates (A) ---- */
.plate{position:absolute;background:var(--panel);border:5px solid var(--volt);border-radius:16px;padding:12px 22px;font-weight:800;font-size:36px;color:#fff;max-width:420px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plate .dot{color:var(--volt)}
/* ---- ticker (A) ---- */
#aTicker{position:absolute;left:0;top:980px;width:1080px;height:78px;background:var(--volt);color:#000;display:flex;align-items:center;overflow:hidden}
#aTicker .brandbar{background:#000;color:#fff;height:100%;display:flex;align-items:center;padding:0 22px;font-size:34px;font-weight:900}
#aTicker .tk{white-space:nowrap;font-weight:800;font-size:34px;padding-left:24px;text-transform:uppercase;letter-spacing:.02em}
/* ---- current spot bar (shared) ---- */
.nowbar{position:absolute;background:var(--panel);border:5px solid var(--volt);border-radius:20px;padding:16px 22px;display:flex;flex-direction:column;justify-content:center}
.nowbar .lab{font-size:26px;font-weight:900;color:var(--volt);letter-spacing:.06em}
.nowbar .nm{font-size:60px;font-weight:900;line-height:1;margin-top:4px;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nowbar .meta{font-size:30px;font-weight:800;color:#fff;margin-top:8px}
.nowbar .meta .t{color:#000;background:var(--volt);padding:1px 10px;border-radius:8px}
/* ---- stash band (shared) ---- */
.stash{position:absolute;border-radius:20px;display:flex;align-items:center;gap:22px;padding:16px 26px}
.stash.on{background:var(--volt);color:#000;border:5px solid #000}
.stash.off{background:var(--panel);color:var(--grey);border:5px solid #3a3f47;padding:10px 20px}
.stash .big{font-size:56px;font-weight:900;text-transform:uppercase;letter-spacing:.01em;line-height:1}
.stash .sub{font-size:30px;font-weight:800}
.stash.off .big{font-size:30px}
/* ---- trade badge (shared) ---- */
.trade{position:absolute;background:var(--red);color:#fff;border:5px solid #fff;border-radius:16px;padding:12px 22px;display:flex;align-items:center;gap:12px;font-weight:900;font-size:38px;text-transform:uppercase;letter-spacing:.02em;white-space:nowrap}
.trade .pulse{width:22px;height:22px;border-radius:50%;background:#fff;animation:blink 1s steps(2) infinite}
@keyframes blink{50%{opacity:.2}}
/* ---- status placard cards (A) — laminated-sign look: thick border, hard offset shadow, tilt, pop-in ---- */
#placards{position:absolute;left:40px;top:1084px;width:452px;display:flex;flex-direction:column;gap:22px}
.placard{border:8px solid #000;border-radius:20px;padding:18px 24px;box-shadow:13px 13px 0 rgba(0,0,0,.62);transform:rotate(var(--rot,0deg));transform-origin:center}
.placard .pl-big{font-weight:900;text-transform:uppercase;line-height:.9;font-size:52px;letter-spacing:-.01em}
.placard .pl-sub{font-weight:800;font-size:23px;margin-top:8px;text-transform:uppercase;letter-spacing:.01em}
.placard.pl-stash{background:var(--volt);color:#000}
.placard.pl-case{background:var(--gold);color:#000}
.placard.pl-trade{background:var(--red);color:#fff;border-color:#fff}
.placard.pop{animation:placpop .5s cubic-bezier(.2,1.55,.4,1) both}
@keyframes placpop{0%{transform:scale(.55) rotate(var(--rot,0deg));opacity:0}70%{transform:scale(1.06) rotate(var(--rot,0deg))}100%{transform:scale(1) rotate(var(--rot,0deg));opacity:1}}
/* ---- chase board (A) — live cross-off ---- */
#chaseboard{position:absolute;right:32px;top:1076px;width:476px;height:652px;background:var(--panel);border:6px solid var(--volt);border-radius:20px;overflow:hidden}
#chaseboard .cb-hd{padding:16px 20px 12px;border-bottom:5px solid var(--volt)}
#chaseboard .cb-title{font-weight:900;text-transform:uppercase;font-size:30px;color:var(--volt);line-height:1}
#chaseboard .cb-count{font-weight:900;font-size:46px;color:#fff;margin-top:4px;line-height:1}
#chaseboard .cb-count b{color:var(--volt)}
#chaseboard .cb-scroll{position:absolute;left:0;right:0;top:132px;bottom:8px;overflow:hidden}
/* ---- chase rows (shared) ---- */
.chase-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:3px solid rgba(255,255,255,.14)}
.chase-row .chip{flex:0 0 auto;min-width:82px;text-align:center;font-weight:900;font-size:26px;color:#000;border-radius:10px;padding:6px 8px}
.chase-row .nm{flex:1;min-width:0;font-weight:800;font-size:30px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chase-row .hittag{flex:0 0 auto;background:var(--red);color:#fff;font-weight:900;font-size:22px;padding:5px 12px;border-radius:8px;letter-spacing:.04em}
.chase-row.hit{opacity:.42}
.chase-row.hit .nm{text-decoration:line-through}
.chase-row.hit .chip{background:#4a5058!important;color:#c7ccd2}
/* rail (A) auto-scroll */
#aChase{position:absolute;right:24px;top:1064px;width:332px;height:596px;overflow:hidden}
.hd{font-weight:900;text-transform:uppercase;font-size:32px;color:var(--volt);padding:10px 16px;letter-spacing:.04em;position:relative;z-index:2;background:var(--panel)}
#aChase .scrollbox{position:absolute;left:0;right:0;top:54px;bottom:6px;overflow:hidden}
#bChase .scrollbox{position:absolute;left:22px;right:22px;top:62px;bottom:12px;overflow:hidden}
.track{will-change:transform}
.track.scroll{animation:railscroll var(--dur,30s) linear infinite}
@keyframes railscroll{from{transform:translateY(0)}to{transform:translateY(-50%)}}
/* ---- layout B top band ---- */
#bTop{position:absolute;left:0;top:0;width:1080px;height:812px;background:var(--panel);border-bottom:6px solid var(--volt)}
#bHead{height:150px;display:flex;align-items:center;justify-content:space-between;padding:0 30px}
#bHead .brand{font-size:52px}
#bHead .show{font-size:34px;font-weight:900;text-transform:uppercase;color:var(--volt);max-width:660px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#bRotate{position:absolute;left:0;top:150px;width:1080px;height:662px;overflow:hidden}
#bGrid,#bChase{position:absolute;inset:0;padding:14px 22px;opacity:0;transition:opacity .5s;pointer-events:none}
#bGrid.on,#bChase.on{opacity:1}
#bGrid .spotsleft{font-size:56px;font-weight:900;text-transform:uppercase;color:#fff}
#bGrid .spotsleft b{color:var(--volt);font-size:64px}
.teamgrid{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;align-content:flex-start}
.cell{flex:0 0 auto;min-width:160px;max-width:380px;border-radius:14px;padding:12px 18px;font-weight:900;font-size:30px;border:4px solid;display:flex;align-items:center;gap:10px;text-transform:uppercase}
.cell.open{background:var(--volt);color:#000;border-color:#000}
.cell.gone{background:#20242B;color:#6d7580;border-color:#2f353d;text-decoration:line-through}
.cell.gone .mk{color:var(--red);-webkit-text-decoration:none;text-decoration:none}
#bChase .list{margin-top:6px}
#bChase .chase-row{padding:15px 18px}
#bChase .chase-row .nm{font-size:36px}
#bChase .chase-row .chip{font-size:32px;min-width:120px}
/* ---- sold flash (shared) ---- */
#sold{position:absolute;left:40px;right:40px;top:1140px;background:var(--volt);color:#000;border:7px solid #000;border-radius:24px;padding:26px 30px;text-align:center;display:none;box-shadow:0 0 0 6px var(--volt)}
#sold.show{display:block;animation:pop .45s cubic-bezier(.2,1.4,.4,1)}
#sold .won{font-size:84px;font-weight:900;text-transform:uppercase;line-height:.98;letter-spacing:-.01em}
#sold .amt{font-size:64px;font-weight:900;margin-top:6px}
#sold .who{display:inline-block;background:#000;color:var(--volt);padding:2px 16px;border-radius:12px}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
/* ---- case banner (shared, existing behavior) ---- */
#caseBanner{position:absolute;left:0;top:0;width:1080px;height:110px;display:none;justify-content:center;align-items:center;gap:16px;background:var(--gold);color:#000;font-weight:900;font-size:64px;text-transform:uppercase;letter-spacing:.03em;border-bottom:6px solid #000;animation:capulse 1s ease-in-out infinite}
#caseBanner.on{display:flex}
@keyframes capulse{50%{filter:brightness(1.2)}}
/* ---- auth ---- */
#auth{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(4,5,8,.94);z-index:50}
#auth .box{background:#0d0f13;border:4px solid var(--volt);border-radius:18px;padding:30px;width:520px}
#auth .brand{font-size:34px}#auth .msg{color:#9aa0a6;font-size:20px;margin:14px 0}
#auth input{width:100%;padding:16px;border-radius:10px;border:3px solid #333;background:#15181d;color:#fff;margin:8px 0;font-size:22px}
#auth button{width:100%;padding:16px;border-radius:999px;border:none;background:var(--volt);color:#000;font-weight:900;cursor:pointer;margin-top:8px;font-size:22px;font-family:inherit}
#auth .err{color:var(--red)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head><body>
<div id="stage"><div id="layout"></div><div id="caseBanner">🔥 CASE HIT 🔥</div><div id="sold"></div></div>
<div id="auth"><div class="box">
  <div class="brand up">ELEMENT<b>10</b></div>
  <div class="msg">Sign in as the streamer to run this overlay. This browser source stays signed in.</div>
  <input id="em" type="email" placeholder="Email" autocomplete="username"><input id="pw" type="password" placeholder="Password" autocomplete="current-password">
  <button onclick="doLogin()">Sign in</button>
  <div class="msg err" id="amsg"></div>
</div></div>
<script>
const SB_URL='https://ddhkkumiyidorzmajwde.supabase.co';
const SB_KEY='sb_publishable_wRoaFNiqpZJaEJkQvLpnUw_7bpcXllv';
const $=id=>document.getElementById(id);
const esc=s=>{s=(s==null?'':''+s);return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));};
const P=new URLSearchParams(location.search);
const CODE=P.get('code')||'';
const LAYOUT=(P.get('layout')||'graphics').toLowerCase()==='oncam'?'oncam':'graphics';
const money=n=>'$'+Math.round(+n||0).toLocaleString();
let sb=null,SESSION=null,SLOTS=[],CHASE=[],chan=null,PREV=null,ROT=0,rotTimer=null;

async function doLogin(){const email=$('em').value.trim(),password=$('pw').value;
 const{error}=await sb.auth.signInWithPassword({email,password});if(error){$('amsg').textContent=error.message;}else start();}

/* ---------- data ---------- */
async function load(){
 if(!CODE){$('layout').innerHTML=frame('No session code in the link.');return;}
 const{data,error}=await sb.from('e10_break_sessions').select('*').eq('share_code',CODE).maybeSingle();
 if(error||!data){$('layout').innerHTML=frame('Session not found — check the code, or sign in as the streamer.');return;}
 SESSION=data;await loadSlots();await loadChase();subscribe();PREV=stateMap();render();
}
async function loadSlots(){const{data}=await sb.from('e10_break_slots').select('*').eq('session_id',SESSION.id).order('position');SLOTS=data||[];}
async function loadChase(){CHASE=[];const cid=SESSION&&SESSION.checklist_id;if(!cid)return;
 try{const{data}=await sb.from('e10_cards').select('id,name,value,num,parallel').eq('checklist_id',cid).eq('chase',true).order('value',{ascending:false}).limit(15);CHASE=data||[];}catch(e){CHASE=[];}}
function hitSet(){return new Set((SESSION&&SESSION.chases_hit)||[]);}
function stateMap(){const m={};SLOTS.forEach(s=>m[s.id]=s.state);return m;}
function subscribe(){if(chan)sb.removeChannel(chan);
 chan=sb.channel('ov_'+SESSION.id)
  .on('postgres_changes',{event:'*',schema:'public',table:'e10_break_slots',filter:'session_id=eq.'+SESSION.id},async()=>{await loadSlots();detectSold();render();})
  .on('postgres_changes',{event:'*',schema:'public',table:'e10_break_sessions',filter:'id=eq.'+SESSION.id},async p=>{const before=SESSION?SESSION.checklist_id:null;if(p.new){SESSION=p.new;}if(SESSION.checklist_id!==before)await loadChase();render();})
  .subscribe();}
function detectSold(){if(!PREV){PREV=stateMap();return;}
 SLOTS.forEach(s=>{const was=PREV[s.id];if(was&&was!=='sold'&&s.state==='sold'&&(s.buyer_handle||s.price!=null))flashSold(s);});
 PREV=stateMap();}

/* ---------- helpers ---------- */
function cfg(){return (SESSION&&SESSION.overlay_cfg)||{};}
function activeSlot(){return SLOTS.find(s=>s.id===(SESSION&&SESSION.active_slot_id));}
function chaseChipColor(v){v=+v||0;return v>=200?'#FFD23A':(v>=75?'#C6FF3A':(v>=25?'#37C0FF':'#AEB6C0'));}
function caseOn(){return (SESSION&&SESSION.case_hit)||SLOTS.some(s=>s.case_hit);}
function frame(msg){return `<div class="panel" style="position:absolute;left:40px;top:900px;width:1000px;padding:30px 34px"><div class="brand up" style="font-size:40px">ELEMENT<b>10</b></div><div style="font-size:30px;font-weight:800;margin-top:14px;color:#fff">${esc(msg)}</div></div>`;}

/* ---------- module renderers (return HTML) ---------- */
function nowbarHTML(x,y,w){const a=activeSlot();
 if(!a){return `<div class="nowbar" style="left:${x}px;top:${y}px;width:${w}px;border-color:#3a3f47"><div class="lab" style="color:var(--grey)">ON THE BLOCK</div><div class="nm" style="color:var(--grey);font-size:44px">Auction open</div></div>`;}
 const exp=(a.band_expected!=null&&+a.band_expected>0)?('<span class="t">TARGET ~'+money(a.band_expected)+'</span>'):'';
 const meth=a.method?(a.method==='$1auction'?'$1 AUCTION':(a.method==='fixed'?('FIXED '+money(a.price)):'AUCTION')):'';
 return `<div class="nowbar" style="left:${x}px;top:${y}px;width:${w}px"><div class="lab">● ON THE BLOCK NOW</div><div class="nm">${esc(a.label||'Spot')}</div><div class="meta">${meth?esc(meth)+' &nbsp; ':''}${exp}</div></div>`;}
function stashHTML(x,y,w){const on=SESSION&&SESSION.stash_or_pass;
 if(on)return `<div class="stash on" style="left:${x}px;top:${y}px;width:${w}px"><div class="big">STASH OR PASS?</div><div class="sub">Cast your vote in the app 👉</div></div>`;
 return `<div class="stash off" style="left:${x}px;top:${y}px;width:${w}px"><div class="big">STASH-OR-PASS: OFF</div></div>`;}
function tradeHTML(x,y){if(!(SESSION&&SESSION.trade_open))return '';
 return `<div class="trade" style="left:${x}px;top:${y}px"><span class="pulse"></span>TRADE BLOCK OPEN</div>`;}
function chaseRowsHTML(list,hits){if(!list.length)return `<div class="chase-row"><div class="nm" style="color:var(--grey)">No chase list on this product.</div></div>`;
 hits=hits||new Set();
 return list.map(c=>{const col=chaseChipColor(c.value),hit=hits.has(c.id);return `<div class="chase-row ${hit?'hit':''}"><div class="chip" style="background:${col}">${(+c.value>0)?money(c.value):'CHASE'}</div><div class="nm">${esc(c.name||'')}</div>${hit?'<div class="hittag">HIT</div>':''}</div>`;}).join('');}
let prevPlac=new Set();
function placardsHTML(){const items=[];
 if(SESSION.stash_or_pass)items.push({k:'stash',big:'STASH<br>OR PASS?',sub:'cast your vote in the app',rot:-2.5});
 if(SESSION.case_hit_open||SESSION.case_hit)items.push({k:'case',big:'CASE<br>HIT!',sub:'live case-hit box in play',rot:1.8});
 if(SESSION.trade_open)items.push({k:'trade',big:'TRADE BLOCK<br>OPEN',sub:'DM to deal on cam',rot:-1.6});
 if(!items.length){prevPlac=new Set();return '';}
 const rows=items.map(i=>{const isNew=!prevPlac.has(i.k);return `<div class="placard pl-${i.k} ${isNew?'pop':''}" style="--rot:${i.rot}deg"><div class="pl-big">${i.big}</div><div class="pl-sub">${esc(i.sub)}</div></div>`;}).join('');
 prevPlac=new Set(items.map(i=>i.k));
 return `<div id="placards">${rows}</div>`;}
function chaseBoardHTML(){const hits=hitSet();
 const total=CHASE.length,hitCount=CHASE.filter(c=>hits.has(c.id)).length,remaining=Math.max(0,total-hitCount);
 const rows=chaseRowsHTML(CHASE,hits),many=CHASE.length>8;
 return `<div id="chaseboard"><div class="cb-hd"><div class="cb-title">🎯 Chases on the board</div><div class="cb-count"><b>${remaining}</b> LEFT <span style="font-size:26px;color:var(--grey)">/ ${total} chases</span></div></div>
   <div class="cb-scroll"><div class="track ${many?'scroll':''}" style="--dur:${Math.max(18,CHASE.length*2.4)}s">${rows}${many?rows:''}</div></div></div>`;}
function teamsGridHTML(){const open=SLOTS.filter(s=>s.state!=='sold').length;
 const cells=SLOTS.map(s=>{const gone=s.state==='sold';return `<div class="cell ${gone?'gone':'open'}">${gone?'<span class="mk">✓</span>':'●'} <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.label||'Spot')}</span></div>`;}).join('');
 return `<div class="spotsleft">SPOTS LEFT: <b>${open}</b> <span style="font-size:34px;color:var(--grey)">/ ${SLOTS.length}</span></div><div class="teamgrid">${cells||'<div class="cell open">Add spots</div>'}</div>`;}

/* ---------- sold flash ---------- */
let soldT=null;
function flashSold(s){const el=$('sold');if(!el)return;
 el.innerHTML=`<div class="won"><span class="who">${esc(s.buyer_handle||'WINNER')}</span> WON!</div><div class="amt">${money(s.price)} · ${esc(s.label||'Spot')}</div>`;
 el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
 clearTimeout(soldT);soldT=setTimeout(()=>{el.classList.remove('show');},4800);}

/* ---------- layout render (swaps only #layout; #caseBanner/#sold persist so an active flash survives) ---------- */
function render(){if(!SESSION)return;
 if(LAYOUT==='oncam')renderA();else renderB();
 $('caseBanner').classList.toggle('on',!!caseOn());
}
function renderA(){const c=cfg();
 $('layout').innerHTML=`
  ${c.handleLeft?`<div class="plate" style="left:28px;top:876px"><span class="dot">◆</span> ${esc(c.handleLeft)}</div>`:''}
  ${c.handleRight?`<div class="plate" style="right:28px;top:876px"><span class="dot">◆</span> ${esc(c.handleRight)}</div>`:''}
  <div id="aTicker"><div class="brandbar up">ELEMENT<b style="background:var(--volt);color:#000;padding:0 8px;border-radius:6px">10</b></div><div class="tk">${esc((c.showTitle||SESSION.name||'LIVE BREAK'))}${c.ticker?('  •  '+esc(c.ticker)):''}</div></div>
  ${placardsHTML()}
  ${chaseBoardHTML()}
  ${nowbarHTML(24,1740,1032)}`;
}
function renderB(){const c=cfg();
 $('layout').innerHTML=`
  <div id="bTop">
    <div id="bHead"><div class="brand up">ELEMENT<b>10</b></div><div class="show">${esc(c.showTitle||SESSION.name||'LIVE BREAK')}</div></div>
    <div id="bRotate">
      <div id="bGrid" class="${ROT===0?'on':''}">${teamsGridHTML()}</div>
      <div id="bChase" class="${ROT===1?'on':''}"><div class="hd">🔥 CHASE BOARD · ${Math.max(0,CHASE.length-CHASE.filter(c=>hitSet().has(c.id)).length)} LEFT</div><div class="scrollbox"><div class="track ${CHASE.length>9?'scroll':''}" style="--dur:${Math.max(18,CHASE.length*2.4)}s">${chaseRowsHTML(CHASE,hitSet())}${CHASE.length>9?chaseRowsHTML(CHASE,hitSet()):''}</div></div></div>
    </div>
  </div>
  ${nowbarHTML(24,1456,1032)}
  ${stashHTML(24,1622,1032)}
  ${tradeHTML(24,1784)}`;
 startRotation();
}
function startRotation(){if(LAYOUT!=='graphics')return;if(rotTimer)clearInterval(rotTimer);
 // only rotate if there is a chase board to rotate to
 if(!CHASE.length){ROT=0;const g=$('bGrid'),h=$('bChase');if(g)g.classList.add('on');if(h)h.classList.remove('on');return;}
 rotTimer=setInterval(()=>{ROT=ROT?0:1;const g=$('bGrid'),h=$('bChase');if(!g||!h){clearInterval(rotTimer);return;}g.classList.toggle('on',ROT===0);h.classList.toggle('on',ROT===1);},8000);}

/* ---------- boot ---------- */
function start(){$('auth').style.display='none';load();}
(async function(){
 if(!window.supabase){$('stage').innerHTML=frame('Connection library failed to load.');return;}
 sb=window.supabase.createClient(SB_URL,SB_KEY);
 const{data:{session}}=await sb.auth.getSession();
 if(!session){$('auth').style.display='flex';return;}
 start();
})();
</script>
</body></html>
