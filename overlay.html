<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Element 10 — Live Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--volt:#C6FF3A;--ink:#0A0B0D;--red:#E8332B;--gold:#ffd23a}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:transparent;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:#fff;overflow:hidden}
#wrap{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:26px;gap:14px}
.panel{background:rgba(6,8,11,.82);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:16px 18px;backdrop-filter:blur(6px);max-width:640px}
.brand{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;font-weight:700;font-size:22px;text-transform:uppercase;letter-spacing:.04em}
.brand b{background:var(--volt);color:#000;padding:0 7px;border-radius:5px}
.title{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;font-weight:700;text-transform:uppercase;font-size:26px;line-height:1.05;margin-top:6px}
.flags{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.flag{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;font-weight:700;font-size:13px;padding:7px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06)}
.flag.on{background:var(--volt);color:#000;border-color:var(--volt)}
.flag.pass{background:rgba(255,255,255,.06);color:#9aa0a6}
.grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.spot{min-width:60px;padding:9px 12px;border-radius:10px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;font-size:13px;font-weight:700;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.05);display:flex;flex-direction:column;gap:2px}
.spot .n{font-size:10px;opacity:.6}
.spot.available{background:rgba(198,255,58,.16);border-color:rgba(198,255,58,.5);color:#eaffb0}
.spot.sold{opacity:.4;text-decoration:line-through;color:#c7ccd2}
.spot.held{background:rgba(255,210,58,.16);border-color:rgba(255,210,58,.5);color:#ffe9a3}
.spot.hit{border-color:var(--gold);box-shadow:0 0 16px 2px rgba(255,210,58,.5)}
.count{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;font-size:13px;color:#c7ccd2;margin-top:10px}
.count b{color:var(--volt)}
#caseBanner{position:fixed;top:0;left:0;right:0;display:none;justify-content:center;align-items:center;gap:12px;padding:16px;background:linear-gradient(90deg,rgba(255,210,58,.0),rgba(255,210,58,.92),rgba(255,210,58,.0));color:#0a0b0d;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;font-weight:700;font-size:30px;text-transform:uppercase;letter-spacing:.04em;animation:pulse 1.1s ease-in-out infinite}
#caseBanner.on{display:flex}
@keyframes pulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}
#auth{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(4,5,8,.92)}
#auth .box{background:#0d0f13;border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:22px;width:320px}
#auth input{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#15181d;color:#fff;margin:6px 0}
#auth button{width:100%;padding:10px;border-radius:999px;border:none;background:var(--volt);color:#000;font-weight:700;cursor:pointer;margin-top:6px;font-family:inherit}
.msg{color:#9aa0a6;font-size:12px;margin-top:8px}.err{color:var(--red)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head><body>
<div id="caseBanner">🔥 CASE HIT 🔥</div>
<div id="wrap" style="display:none">
  <div class="panel">
    <div class="brand">ELEMENT<b>10</b></div>
    <div class="title" id="title">Live Break</div>
    <div class="flags" id="flags"></div>
    <div class="grid" id="grid"></div>
    <div class="count" id="count"></div>
  </div>
</div>
<div id="auth"><div class="box">
  <div class="brand" style="font-size:20px">ELEMENT<b>10</b></div>
  <div class="msg">Sign in as the streamer to run this overlay. This browser source stays signed in.</div>
  <input id="em" type="email" placeholder="Email"><input id="pw" type="password" placeholder="Password">
  <button onclick="doLogin()">Sign in</button>
  <div class="msg err" id="amsg"></div>
</div></div>
<script>
const SB_URL='https://ddhkkumiyidorzmajwde.supabase.co';
const SB_KEY='sb_publishable_wRoaFNiqpZJaEJkQvLpnUw_7bpcXllv';
const $=id=>document.getElementById(id);
const esc=s=>{s=(s==null?'':''+s);return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));};
const CODE=new URLSearchParams(location.search).get('code')||'';
let sb=null,SESSION=null,SLOTS=[],chan=null;

async function doLogin(){const email=$('em').value.trim(),password=$('pw').value;
 const{error}=await sb.auth.signInWithPassword({email,password});if(error){$('amsg').textContent=error.message;}else start();}

async function load(){
 if(!CODE){$('title').textContent='No session code';$('wrap').style.display='flex';return;}
 const{data,error}=await sb.from('e10_break_sessions').select('*').eq('share_code',CODE).maybeSingle();
 if(error||!data){$('title').textContent='Session not found (check the code / sign in)';$('wrap').style.display='flex';return;}
 SESSION=data;await loadSlots();subscribe();render();$('wrap').style.display='flex';
}
async function loadSlots(){const{data}=await sb.from('e10_break_slots').select('*').eq('session_id',SESSION.id).order('position');SLOTS=data||[];}
function subscribe(){if(chan)sb.removeChannel(chan);
 chan=sb.channel('ov_'+SESSION.id)
  .on('postgres_changes',{event:'*',schema:'public',table:'e10_break_slots',filter:'session_id=eq.'+SESSION.id},async()=>{await loadSlots();render();})
  .on('postgres_changes',{event:'*',schema:'public',table:'e10_break_sessions',filter:'id=eq.'+SESSION.id},p=>{if(p.new){SESSION=p.new;render();}})
  .subscribe();
}
function render(){
 $('title').textContent=SESSION.name||'Live Break';
 const caseOn=SESSION.case_hit||SLOTS.some(s=>s.case_hit);
 $('caseBanner').classList.toggle('on',!!caseOn);
 $('flags').innerHTML=`<span class="flag ${SESSION.stash_or_pass?'on':'pass'}">STASH-OR-PASS: ${SESSION.stash_or_pass?'ON':'OFF'}</span>`+(caseOn?`<span class="flag on">🔥 CASE HIT</span>`:'');
 $('grid').innerHTML=SLOTS.map((s,i)=>`<div class="spot ${s.state} ${s.case_hit?'hit':''}"><span class="n">#${i+1}</span>${esc(s.label||('Spot '+(i+1)))}</div>`).join('')||'<div class="count">No spots yet.</div>';
 const avail=SLOTS.filter(s=>s.state==='available').length,sold=SLOTS.filter(s=>s.state==='sold').length;
 $('count').innerHTML=`<b>${avail}</b> spots available · ${sold} gone · ${SLOTS.length} total`;
}
(async function(){
 if(!window.supabase){$('title').textContent='Library failed to load';$('wrap').style.display='flex';return;}
 sb=window.supabase.createClient(SB_URL,SB_KEY);
 const{data:{session}}=await sb.auth.getSession();
 if(!session){$('auth').style.display='flex';return;}
 start();
})();
function start(){$('auth').style.display='none';load();}
</script>
</body></html>
