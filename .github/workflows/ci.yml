name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege by default; jobs widen only what they need (A5.1 item 6).
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Per-ref concurrency: PRs/branches cancel their own stale runs; deploys serialize separately (on `pages`).
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true
    env:
      # CI-local test credentials — the stack is an EPHEMERAL local Supabase, so these are not secrets.
      E10_ADMIN_EMAIL: e10adm@example.com
      E10_ADMIN_PW: CiLocal!23456
      E10_MEMBER_EMAIL: e10mem@example.com
      E10_MEMBER_PW: CiLocal!23456
      E10_GATE_EMAIL: e10gate@example.com
      E10_GATE_PW: CiLocal!23456
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22   # supabase-js 2.110+ needs a native WebSocket (Node 22+)
      - name: Install test deps
        working-directory: tests
        run: npm ci   # lockfile-exact, reproducible
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1   # pinned to the tested CLI version (not `latest`)
      - name: Start local Supabase (proves A1 reproducibility on a clean stack)
        run: supabase start
      - name: Provision local test users
        run: node tests/provision_local_users.js
      - name: Pure-helper suites
        run: |
          node tests/genname_test.js
          node tests/idemkey_test.js
          node tests/merge_test.js
          node tests/schema_gate_test.js   # the "gate bites" comparator proof (fail-closed on mismatch/error/null)
      - name: Local integration + RLS-adversarial suites
        run: |
          node tests/m31_test.js
          node tests/m32_test.js
          node tests/genname_persist_test.js
          # rls_test = the roles/permissions engine (admin/member/viewer isolation, INSERT...RETURNING,
          # onboarding-RPC gating). Its 3 fixtures + argv ids come from provision_rls_users.js (stdout = the
          # ids; logs go to stderr). No e10_role_permissions seed needed — the empty table is a deny-list
          # (all caps allowed), matching production exactly.
          RLS_IDS=$(node tests/provision_rls_users.js)
          node tests/rls_test.js $RLS_IDS
      - name: Browser suites (headless)
        run: |
          node tests/picker_test.js
          node tests/genname_ui_test.js
          node tests/m32_ui_test.js
          node tests/live_flow_test.js
          node tests/m4_realtime_test.js
      - name: A6a.1 org-core tests (handle-verify race + module_bundle)
        # Runs while the provisioned members still exist (before the db reset below), so the verify-race cases
        # (which need a platform-admin identity) execute rather than skip.
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -v ON_ERROR_STOP=1 -f tests/a6a1_verify_bundle_test.sql
      - name: Schema reproducibility (re-apply migrations cleanly)
        run: supabase db reset
      - name: Default-privileges regression probe (born-locked; zero anon-executable functions)
        # Guards the A5.1a invariant against regression on every push (psql ships on ubuntu-latest runners).
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -v ON_ERROR_STOP=1 -f tests/probe_defpriv.sql

  # Live PRODUCTION contract gate — runs on main ONLY, before deploy, and GATES it. Proves the to-be-deployed
  # client's SCHEMA_VERSION matches live e10_schema_version(). Uses the protected `production` environment's
  # least-privilege gate account (no org membership). Proves CONTRACT compatibility, NOT migration completeness.
  schema-gate:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install test deps
        working-directory: tests
        run: npm ci
      - name: Live production schema gate (blocks deploy on client/DB contract mismatch)
        env:
          E10_ALLOW_PROD: "1"
          E10_ANON: ${{ secrets.E10_ANON }}
          E10_SCHEMA_GATE_EMAIL: ${{ secrets.E10_SCHEMA_GATE_EMAIL }}
          E10_SCHEMA_GATE_PW: ${{ secrets.E10_SCHEMA_GATE_PW }}
        run: node tests/schema_gate_live.js

  deploy:
    needs: [test, schema-gate]   # BOTH the test job and the live schema gate must pass
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage WEB ASSETS ONLY (never tests/, supabase/, docs/, .github/)
        run: |
          mkdir -p dist
          cp index.html open.html overlay.html companion.html .nojekyll dist/
          echo "Published files:" && ls -la dist/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5
